          skipped = Path("Results/diagnostics/egress_skip.txt").exists()
          timed_out = Path("Results/diagnostics/probe_timeout.txt").exists()
          fresh_absolute_timed_out = Path(
              "Results/diagnostics/fresh_rechallenge_absolute_timeout.jsonl"
          ).exists()
          fresh_idle_timed_out = Path(
              "Results/diagnostics/fresh_rechallenge_idle_timeout.jsonl"
          ).exists()
          fresh_policy_skipped = Path(
              "Results/diagnostics/fresh_rechallenge_policy_skip.txt"
          ).exists()

          ads_profile_policy = os.environ.get("ADS_PROFILE_POLICY_INPUT", "")
          if ads_profile_policy not in {
              "round_robin", "historical_top_ab_v1", "historical_top_v1"
          }:
              ads_profile_policy = None
          ads_profile_arm = str(ads_fetch.get("selection_arm") or "") or None
          if ads_profile_arm not in {None, "round_robin", "top_v1", "non_top_control"}:
              ads_profile_arm = None
          if ads_profile_arm is None:
              try:
                  matrix_slot = int(os.environ.get("ATTEMPT", "0"))
              except ValueError:
                  matrix_slot = 0
              if ads_profile_policy == "historical_top_ab_v1" and matrix_slot > 0:
                  ads_profile_arm = "top_v1" if matrix_slot % 2 else "non_top_control"
              elif ads_profile_policy == "historical_top_v1":
                  ads_profile_arm = "top_v1"
              elif ads_profile_policy == "round_robin":
                  ads_profile_arm = "round_robin"
          try:
              ads_profile_selected_index = int(ads_fetch["selected_index"])
              ads_profile_source_slot = int(ads_fetch["profile_source_slot"])
          except (KeyError, TypeError, ValueError):
              ads_profile_selected_index = None
              ads_profile_source_slot = None
          ads_template_sha256 = str(ads_fetch.get("template_sha256") or "")
          if not re.fullmatch(r"[0-9a-f]{64}", ads_template_sha256):
              ads_template_sha256 = None

          fresh_session_restart_policy = os.environ.get(
              "FRESH_SESSION_RESTART_POLICY_INPUT", ""
          )
          if fresh_session_restart_policy not in {"off", "fresh_ab_v1", "fresh_all_v1"}:
              fresh_session_restart_policy = None
          fresh_session_restart_arm = str(session_restart.get("arm") or "") or None

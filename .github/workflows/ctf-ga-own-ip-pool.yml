                  matrix_slot = int(os.environ.get("ATTEMPT", "0"))
              except ValueError:
                  matrix_slot = 0
              if fresh_session_restart_policy == "fresh_ab_v1" and matrix_slot > 0:
                  fresh_session_restart_arm = (
                      "restart_treatment" if matrix_slot % 2 else "single_session_control"
                  )
              elif fresh_session_restart_policy == "fresh_all_v1":
                  fresh_session_restart_arm = "restart_treatment"
          fresh_session_restart_attempted = session_restart.get("restart_attempted") is True
          fresh_session_first_fresh = session_restart.get("first_fresh_policy_skip") is True
          fresh_session_recovered_strict = session_restart.get("recovered_strict") is True
          fresh_session_second_fresh = session_restart.get("second_fresh_policy_skip") is True
          fresh_session_second_riskblock = session_restart.get("second_riskblock_marker") is True

          pre_first_hold_warmup_policy = os.environ.get(
              "PRE_FIRST_HOLD_WARMUP_POLICY_INPUT", ""
          )
          if pre_first_hold_warmup_policy not in {
              "fixed_input", "warmup_ab_14s_22s_v1",
              "warmup_14s_v1", "warmup_22s_v1",
          }:
              pre_first_hold_warmup_policy = None
          pre_first_hold_warmup_arm = str(warmup.get("arm") or "") or None
          if pre_first_hold_warmup_arm not in {
              None, "fixed_input", "warmup_14s_treatment", "warmup_22s_control",
          }:
              pre_first_hold_warmup_arm = None
          try:
              pre_first_hold_warmup_ms = int(warmup["effective_ms"])
          except (KeyError, TypeError, ValueError):
              pre_first_hold_warmup_ms = None
          if pre_first_hold_warmup_ms is not None and not (
              0 <= pre_first_hold_warmup_ms <= 45000
          ):
              pre_first_hold_warmup_ms = None
          pre_first_hold_warmup_applied = warmup.get("applied_to_probe") is True
          if pre_first_hold_warmup_arm is None:
              try:
                  matrix_slot = int(os.environ.get("ATTEMPT", "0"))
              except ValueError:
                  matrix_slot = 0
              if pre_first_hold_warmup_policy == "warmup_ab_14s_22s_v1" and matrix_slot > 0:
                  profile_index = (matrix_slot - 1) % 35
                  profile_cycle = (matrix_slot - 1) // 35
                  if (profile_index + profile_cycle) % 2 == 0:
                      pre_first_hold_warmup_arm = "warmup_14s_treatment"
                      pre_first_hold_warmup_ms = 14000
                  else:
                      pre_first_hold_warmup_arm = "warmup_22s_control"
                      pre_first_hold_warmup_ms = 22000
              elif pre_first_hold_warmup_policy == "warmup_14s_v1":
                  pre_first_hold_warmup_arm = "warmup_14s_treatment"
                  pre_first_hold_warmup_ms = 14000
              elif pre_first_hold_warmup_policy == "warmup_22s_v1":
                  pre_first_hold_warmup_arm = "warmup_22s_control"
                  pre_first_hold_warmup_ms = 22000
              elif pre_first_hold_warmup_policy == "fixed_input":
                  pre_first_hold_warmup_arm = "fixed_input"
                  try:
                      value = os.environ.get("PRE_FIRST_HOLD_WARMUP_INPUT_MS", "")
                      pre_first_hold_warmup_ms = int(value) if value else None
                  except ValueError:
                      pre_first_hold_warmup_ms = None

          signup_country_policy = os.environ.get("SIGNUP_COUNTRY_POLICY_INPUT", "")
          if signup_country_policy not in {
              "source_default", "country_ab_us_lk_v1",
              "country_us_v1", "country_lk_v1",
          }:
              signup_country_policy = None
          signup_country_arm = str(signup_country.get("arm") or "") or None
          if signup_country_arm not in {
              None, "source_default", "country_us_treatment", "country_lk_control",
          }:
              signup_country_arm = None
          signup_country_code = str(signup_country.get("country_code") or "") or None
          if signup_country_code not in {None, "US", "LK"}:
              signup_country_code = None
          signup_country_applied = signup_country.get("applied_to_probe") is True
          if signup_country_arm is None:
              try:
                  matrix_slot = int(os.environ.get("ATTEMPT", "0"))
              except ValueError:
                  matrix_slot = 0
              if signup_country_policy == "country_ab_us_lk_v1" and matrix_slot > 0:
                  profile_index = (matrix_slot - 1) % 35
                  profile_cycle = (matrix_slot - 1) // 35
                  if (profile_index + profile_cycle) % 2 == 0:
                      signup_country_arm = "country_us_treatment"
                      signup_country_code = "US"
                  else:
                      signup_country_arm = "country_lk_control"
                      signup_country_code = "LK"
              elif signup_country_policy == "country_us_v1":
                  signup_country_arm = "country_us_treatment"
                  signup_country_code = "US"
              elif signup_country_policy == "country_lk_v1":
                  signup_country_arm = "country_lk_control"
                  signup_country_code = "LK"
              elif signup_country_policy == "source_default":
                  signup_country_arm = "source_default"
                  signup_country_code = None

          signup_dob_policy = os.environ.get("SIGNUP_DOB_POLICY_INPUT", "")
          if signup_dob_policy not in {
              "source_default", "dob_ab_random_default_v1",
              "dob_random_v1", "dob_default_v1",
          }:
              signup_dob_policy = None
          signup_dob_arm = str(signup_dob.get("arm") or "") or None
          if signup_dob_arm not in {
              None, "source_default", "dob_random_treatment", "dob_jan1_control",
          }:
              signup_dob_arm = None
          signup_dob_mode = str(signup_dob.get("mode") or "") or None
          if signup_dob_mode not in {None, "random", "source_default"}:
              signup_dob_mode = None
          signup_dob_applied = signup_dob.get("applied_to_probe") is True
          if signup_dob_arm is None:
              try:
                  matrix_slot = int(os.environ.get("ATTEMPT", "0"))
              except ValueError:
                  matrix_slot = 0
              if signup_dob_policy == "dob_ab_random_default_v1" and matrix_slot > 0:
                  profile_index = (matrix_slot - 1) % 35
                  profile_cycle = (matrix_slot - 1) // 35
                  if (profile_index + profile_cycle) % 2 == 0:
                      signup_dob_arm = "dob_random_treatment"
                      signup_dob_mode = "random"
                  else:
                      signup_dob_arm = "dob_jan1_control"
                      signup_dob_mode = "source_default"
              elif signup_dob_policy == "dob_random_v1":
                  signup_dob_arm = "dob_random_treatment"
                  signup_dob_mode = "random"
              elif signup_dob_policy == "dob_default_v1":
                  signup_dob_arm = "dob_jan1_control"
                  signup_dob_mode = "source_default"
              elif signup_dob_policy == "source_default":
                  signup_dob_arm = "source_default"
                  signup_dob_mode = None

          email_domain_policy = os.environ.get("EMAIL_DOMAIN_POLICY_INPUT", "")
          if email_domain_policy not in {
              "source_default", "domain_ab_hotmail_outlook_v1",
              "domain_hotmail_v1", "domain_outlook_v1",
          }:
              email_domain_policy = None
          email_domain_arm = str(email_domain.get("arm") or "") or None
          if email_domain_arm not in {
              None, "source_default", "hotmail_treatment", "outlook_control",
          }:
              email_domain_arm = None
          email_domain_value = str(email_domain.get("domain") or "") or None
          if email_domain_value not in {None, "hotmail.com", "outlook.com"}:
              email_domain_value = None
          email_domain_applied = email_domain.get("applied_to_probe") is True
          if email_domain_arm is None:
              try:
                  matrix_slot = int(os.environ.get("ATTEMPT", "0"))
              except ValueError:
                  matrix_slot = 0
              if email_domain_policy == "domain_ab_hotmail_outlook_v1" and matrix_slot > 0:
                  profile_index = (matrix_slot - 1) % 35
                  profile_cycle = (matrix_slot - 1) // 35
                  if (profile_index + profile_cycle) % 2 == 0:
                      email_domain_arm = "hotmail_treatment"
                      email_domain_value = "hotmail.com"
                  else:
                      email_domain_arm = "outlook_control"
                      email_domain_value = "outlook.com"
              elif email_domain_policy == "domain_hotmail_v1":
                  email_domain_arm = "hotmail_treatment"
                  email_domain_value = "hotmail.com"
              elif email_domain_policy == "domain_outlook_v1":
                  email_domain_arm = "outlook_control"
                  email_domain_value = "outlook.com"
              elif email_domain_policy == "source_default":
                  email_domain_arm = "source_default"
                  email_domain_value = None

          # Publish only aggregate-safe coordinator timings so queue regressions
          # can be diagnosed from redacted verdicts without decrypting evidence.
          # Restrict parsing to the canonical live-probe log because the same
          # coordinator line is mirrored into wrapper logs.
          coordinator_final_wait_ms = []
          coordinator_final_gap_ms = []
          coordinator_pattern = re.compile(
              r"\[Coordinator\] stage=final seq=\d+ lease=\S+ "
              r"wait_ms=(\d+) gap_ms=(\d+) reused=False"
          )
          for log_path in Path("Results/protocol_runtime").glob("*_live_probe.log"):
              try:
                  log_text = log_path.read_text(encoding="utf-8", errors="replace")
              except Exception:
                  continue
              for match in coordinator_pattern.finditer(log_text):
                  coordinator_final_wait_ms.append(int(match.group(1)))
                  coordinator_final_gap_ms.append(int(match.group(2)))

          result_values = []
          for key in ("network_collector_results", "route_collector_results", "route_merged_results"):
              value = row.get(key) or []
              if isinstance(value, list):
                  result_values.extend(str(item) for item in value)
          accepted_result0 = any(item == "0" or item.endswith("|0") for item in result_values)
          session_initial_accepted_result0 = accepted_result0 or fresh_session_first_fresh
          post_success_rechallenge = bool(row.get("risk_verify_post_success_challenge"))
          # Historical GA baseline classifiers predate the create_200 field,
          # but emit create_account_200 only after strict response-body checks
          # (HTTP 200 plus non-empty signinName and slt). Keep compatibility
          # without weakening the newer classifier.
          strict_success = row.get("verdict") == "create_account_200"
          explicit_riskblock = bool(row.get("riskblock"))
          # A successful CreateAccount response only establishes that the
          # mailbox was created.  It does not establish that Microsoft will
          # issue a usable OAuth/Graph token afterwards (service-abuse mode is
          # the concrete counterexample).  Keep the protocol verdict intact
          # for experiment comparability, but expose the post-create account
          # lifecycle separately so dashboards and batch counts cannot equate
          # "strict_success" with a usable mailbox.
          graph_import_attempted = bool(ingest.get("attempted"))
          graph_import_ok = ingest.get("success") is True
          graph_import_attempts = int(ingest.get("retry") or 0)
          graph_import_error = str(ingest.get("error_code") or "")
          allowed_ingest_errors = {
              "input_invalid", "oauth_failed", "token_validation_failed",
              "imap_probe_failed", "graph_probe_failed", "platform_config_error",
          }
          if graph_import_error not in allowed_ingest_errors:
              graph_import_error = None
          if not strict_success:
              account_lifecycle = "not_created"
          elif graph_import_ok:
              account_lifecycle = "graph_healthy"
          elif graph_import_attempted:
              account_lifecycle = "created_graph_unhealthy"
          else:
              account_lifecycle = "created_graph_unverified"
          multi_probe_slot = (
              os.environ.get("VARIANT", "").startswith("paired_")
              or os.environ.get("PER_IP_MAX_REGISTRATIONS", "1") != "1"
          )

          # Classification is intentionally based on decisive facts rather than
          # only `verdict`: the private classifier currently gives LIVE_TIMEOUT
          # precedence over a collector result|0 followed by a risk rechallenge.
          if multi_probe_slot:
              category = "technical_failure"
              reason = "multi_probe_slot_requires_per_probe_verdicts"
          elif strict_success:
              category = "strict_success"
              reason = "strict_create_account_body"
          elif skipped:
              category = "ip_skipped"
              reason = "egress_denylist"
          elif accepted_result0 and explicit_riskblock:
              category = "technical_pass_ip_blocked"
              reason = "collector_result0_then_explicit_riskblock"
          elif explicit_riskblock:
              category = "ip_riskblock"
              reason = "explicit_riskblock"
          elif accepted_result0 and fresh_absolute_timed_out:
              category = "technical_failure"
              reason = "collector_result0_then_fresh_absolute_timeout"
          elif fresh_absolute_timed_out:
              category = "technical_failure"
              reason = "fresh_absolute_timeout_before_accepted_checkpoint"
          elif accepted_result0 and fresh_idle_timed_out:
              category = "technical_failure"
              reason = "collector_result0_then_fresh_idle_timeout"
          elif fresh_idle_timed_out:
              category = "technical_failure"
              reason = "fresh_idle_timeout_before_accepted_checkpoint"
          elif accepted_result0 and fresh_policy_skipped:
              category = "post_proof_rechallenge"
              reason = "collector_result0_then_production_fast_fail"
          elif accepted_result0 and post_success_rechallenge:
              # A repeated challenge is not evidence of an IP block. Keep it
              # visible as a post-proof technical outcome instead of turning a
              # collector result|0 into an inferred IP diagnosis.
              category = "post_proof_rechallenge"
              reason = "collector_result0_then_rechallenge_without_riskblock"
          else:
              category = "technical_failure"
              if not row:
                  reason = "missing_classification"
              elif accepted_result0 and timed_out:
                  reason = "collector_result0_then_live_timeout_without_riskblock"
              elif timed_out:
                  reason = "probe_timeout_before_accepted_checkpoint"
              else:
                  reason = str(row.get("verdict") or "unclassified_failure")

          # Keep this artifact public-safe: no IP, email, account fields, URLs,
          # filenames, proxy names, raw errors, request bodies, or log excerpts.
          safe = {
              "schema": 1,
              "attempt": os.environ.get("ATTEMPT", ""),
              "variant": os.environ.get("VARIANT", ""),
              "network_mode": os.environ.get("NETWORK_MODE", ""),
              "runner": os.environ.get("RUNNER_LABEL", ""),
              "orchestration_id": os.environ.get("ORCHESTRATION_ID", ""),
              "ads_profile_policy": ads_profile_policy,
              "ads_profile_arm": ads_profile_arm,
              "ads_profile_selected_index": ads_profile_selected_index,
              "ads_profile_source_slot": ads_profile_source_slot,
              "ads_template_sha256": ads_template_sha256,
              "fresh_session_restart_policy": fresh_session_restart_policy,
              "fresh_session_restart_arm": fresh_session_restart_arm,
              "fresh_session_restart_attempted": fresh_session_restart_attempted,
              "fresh_session_initial_accepted_result0": session_initial_accepted_result0,
              "fresh_session_first_fresh": fresh_session_first_fresh,
              "fresh_session_recovered_strict": fresh_session_recovered_strict,
              "fresh_session_second_fresh": fresh_session_second_fresh,
              "fresh_session_second_riskblock": fresh_session_second_riskblock,
              "pre_first_hold_warmup_policy": pre_first_hold_warmup_policy,
              "pre_first_hold_warmup_arm": pre_first_hold_warmup_arm,
              "pre_first_hold_warmup_ms": pre_first_hold_warmup_ms,
              "pre_first_hold_warmup_applied": pre_first_hold_warmup_applied,
              "signup_country_policy": signup_country_policy,
              "signup_country_arm": signup_country_arm,
              "signup_country_code": signup_country_code,
              "signup_country_applied": signup_country_applied,
              "signup_dob_policy": signup_dob_policy,
              "signup_dob_arm": signup_dob_arm,
              "signup_dob_mode": signup_dob_mode,
              "signup_dob_applied": signup_dob_applied,
              "email_domain_policy": email_domain_policy,
              "email_domain_arm": email_domain_arm,
              "email_domain": email_domain_value,
              "email_domain_applied": email_domain_applied,
              "coordinator_mode": os.environ.get("COORDINATOR_MODE", ""),
              "max_parallel": int(os.environ.get("MAX_PARALLEL", "0")),
              "runtime_mode": os.environ.get("RUNTIME_MODE", ""),
              "probe_timeout_minutes": int(os.environ.get("PROBE_TIMEOUT_MINUTES", "0")),
              "job_timeout_minutes": int(os.environ.get("JOB_TIMEOUT_MINUTES", "0")),
              "probe_exit_code": os.environ.get("PROBE_EXIT_CODE", ""),
              "category": category,
              "reason": reason,
              "strict_success": strict_success,
              "account_lifecycle": account_lifecycle,
              "graph_import_attempted": graph_import_attempted,
              "graph_import_ok": graph_import_ok,
              "graph_import_attempts": graph_import_attempts,
              "graph_import_error_code": graph_import_error,
              "explicit_riskblock": explicit_riskblock,
              "accepted_result0": accepted_result0,
              "post_success_rechallenge": post_success_rechallenge,
              "fresh_rechallenge_absolute_timed_out": fresh_absolute_timed_out,
              "fresh_rechallenge_idle_timed_out": fresh_idle_timed_out,
              "fresh_rechallenge_policy_skipped": fresh_policy_skipped,
              "human_loaded": int(row.get("human_loaded") or 0),
              "human_success": int(row.get("human_success") or 0),
              "create_request": bool(row.get("create_request")),
              "probe_timed_out": timed_out,
              "coordinator_final_reservations": len(coordinator_final_wait_ms),
              "coordinator_final_wait_ms": coordinator_final_wait_ms,
              "coordinator_final_gap_ms": sorted(set(coordinator_final_gap_ms)),
          }
          out = Path("public-safe-verdict") / f"verdict-{safe['attempt']}.json"
          out.write_text(json.dumps(safe, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(safe, ensure_ascii=False))
          PY

      - name: Upload redacted verdict artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ga-safe-verdict-${{ github.run_id }}-${{ matrix.attempt }}
          path: public-safe-verdict/*.json
          if-no-files-found: error
          retention-days: 14

      - name: Encrypt evidence before public artifact upload
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${RESULTS_ENCRYPTION_CERT_B64:-}"
          mkdir -p public-artifacts .public-encryption
          printf '%s' "$RESULTS_ENCRYPTION_CERT_B64" | base64 -d > .public-encryption/results_public_cert.pem
          tar -C Results -czf .public-encryption/results.tar.gz .
          openssl cms -encrypt -binary -aes-256-cbc \
            -in .public-encryption/results.tar.gz \
            -out public-artifacts/evidence-${{ github.run_id }}-${{ matrix.attempt }}.cms \
            -outform DER \
            .public-encryption/results_public_cert.pem
          rm -rf .public-encryption

      - name: Upload encrypted evidence artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ga-encrypted-${{ inputs.variant }}-${{ github.run_id }}-${{ matrix.attempt }}
          path: public-artifacts/*.cms
          if-no-files-found: error
          retention-days: 3

      - name: Enforce no non-IP technical failure for exact release variants
        if: ${{ always() && startsWith(inputs.variant, 'release_5s_success_') }}
        shell: bash
        run: |
          set -euo pipefail
          verdict=$(ls -t public-safe-verdict/verdict-*.json 2>/dev/null | head -n1 || true)
          if [ -z "$verdict" ]; then
            echo "technical failure: no public-safe verdict"
            exit 1
          fi
          VERDICT_PATH="$verdict" python - <<'PY'
          import json
          import os
          from pathlib import Path
          row = json.loads(Path(os.environ['VERDICT_PATH']).read_text(encoding='utf-8'))
          category = str(row.get('category') or '')
          acceptable = category in {
              'strict_success',
              'technical_pass_ip_blocked',
              'ip_riskblock',
              'ip_skipped',
          }
          print(json.dumps({
              'category': category,
              'reason': row.get('reason'),
              'strict_success': row.get('strict_success'),
              'accepted_result0': row.get('accepted_result0'),
              'explicit_riskblock': row.get('explicit_riskblock'),
              'acceptable_for_non_ip_goal': acceptable,
          }, ensure_ascii=False))
          raise SystemExit(0 if acceptable else 1)
          PY

  summarize:
    if: ${{ always() }}
    needs: own-ip-probe
    runs-on: ubuntu-22.04
    steps:
      - name: Download redacted slot verdicts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: ga-safe-verdict-${{ github.run_id }}-*
          path: safe-verdicts
          merge-multiple: true

      - name: Evaluate non-IP path goal
        shell: bash
        env:
          EXPECTED_SLOTS_JSON: ${{ inputs.node_slots_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from collections import Counter
          from pathlib import Path

          try:
              expected = len(json.loads(os.environ["EXPECTED_SLOTS_JSON"]))
          except Exception:
              expected = 0

          rows = []
          for path in sorted(Path("safe-verdicts").glob("verdict-*.json")):
              try:
                  rows.append(json.loads(path.read_text(encoding="utf-8")))
              except Exception:
                  pass

          counts = Counter(str(row.get("category") or "missing") for row in rows)
          missing = max(0, expected - len(rows))
          post_proof_rechallenge = counts["post_proof_rechallenge"]
          technical = (
              counts["technical_failure"]
              + post_proof_rechallenge
              + counts["missing"]
              + missing
          )
          strict = counts["strict_success"]
          technical_pass_ip_blocked = counts["technical_pass_ip_blocked"]
          checkpoint = strict + technical_pass_ip_blocked
          ip_limited = counts["ip_riskblock"] + counts["ip_skipped"] + technical_pass_ip_blocked

          if technical:
              conclusion = "technical_failure"
              goal_met = False
          elif checkpoint:
              # At least one slot proved the non-IP path through collector
              # result|0 (or strict CreateAccount), and every other slot was
              # either equally successful or stopped by an explicit IP gate.
              conclusion = "strict_success" if strict else "technical_pass_ip_blocked"
              goal_met = True
          else:
              conclusion = "inconclusive_ip_only"
              goal_met = False

          summary = {
              "expected_slots": expected,
              "received_verdicts": len(rows),
              "strict_success": strict,
              "ip_limited": ip_limited,
              "technical_pass_ip_blocked": technical_pass_ip_blocked,
              "post_proof_rechallenge": post_proof_rechallenge,
              "technical_failure": technical,
              "decisive_non_ip_checkpoint": checkpoint,
              "goal_met": goal_met,
              "conclusion": conclusion,
          }
          print(json.dumps(summary, ensure_ascii=False, indent=2))

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write("## GA non-IP path verdict\n\n")
                  fh.write("```json\n")
                  fh.write(json.dumps(summary, ensure_ascii=False, indent=2))
                  fh.write("\n```\n")
                  fh.write("\ntechnical_pass_ip_blocked requires an explicit riskBlock after collector result|0. A rechallenge or live timeout without explicit riskBlock is not classified as an IP problem.\n")

          # Do not report a green workflow when every IP was blocked before a
          # decisive checkpoint, or when any non-IP technical failure remains.
          sys.exit(0 if goal_met else 1)
          PY

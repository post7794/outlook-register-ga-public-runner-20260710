name: CTF GA own IP pool probe

on:
  workflow_dispatch:
    inputs:
      node_slots_json:
        description: "JSON matrix labels; in proxy mode they select pool slots, in GA-own-IP mode each label starts a fresh runner"
        required: true
        default: "[1,2,3,4,5]"
      network_mode:
        description: "Use the fresh GA runner egress directly or route through the configured proxy pool"
        required: true
        default: "ga_own_ip"
        type: choice
        options:
          - ga_own_ip
          - proxy_pool
      variant:
        description: "Probe variant to run on each fresh GA egress IP"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - historical_ga_success_default
          - historical_ga_highrate_336a973
          - historical_ga_fresh_rechallenge
          - online_ads_ga_fresh_rechallenge
          - online_ads_ga_fresh_5s_recovery
          - online_ads_ga_5s_hold_transplant
          - offline_ads_like_ga_fresh_rechallenge
          - offline_ads_pool_ga_fresh_rechallenge
          - semiprotocol_5s_stable
          - semiprotocol_5s_historical_firstpass
          - semiprotocol_5s_histfp_no_inject_knp
          - release_5s_success_baseline
          - release_5s_success_attempt2
          - paired_5s_then_thin
          - paired_thin_then_5s
          - natural_legacy
          - ui_natural
      runner:
        description: "Ubuntu runner label for the GA egress pool"
        required: true
        default: "ubuntu-22.04"
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04
          - ubuntu-22.04
      timeout_minutes:
        description: "Per-job timeout minutes"
        required: true
        default: "25"
      probe_timeout_minutes:
        description: "Live probe timeout inside each job; timed-out bad IPs still upload evidence"
        required: true
        default: "12"
      fresh_absolute_timeout_seconds:
        description: "Hard deadline in seconds from the first accepted result|0 across all fresh-rechallenge attempts and rounds; 0 disables"
        required: true
        default: "60"
      per_ip_max_registrations:
        description: "Repeat successful registrations on the same GA egress IP until first non-success, capped here. Use 1 for legacy one-shot probing."
        required: true
        default: "1"
      egress_prefix_denylist:
        description: "Optional comma-separated bad egress IP prefixes to skip before touching the target, e.g. 20.,52. Recommended file: config/egress_prefix_denylist.recommended.txt. Over-provision candidates (e.g. 1..36) when denylist is non-empty so skipped IPs do not starve live count."
        required: false
        default: "4.,13.,20.,40.,52.,68."
      pre_first_hold_warmup_ms:
        description: "Override captcha pre-first-hold warmup in ms; empty uses config default"
        required: false
        default: ""
      slot_stagger_seconds:
        description: "Stagger only probe-bound slots after denylist: delay=((attempt-1)%max_parallel)*seconds. Use 10-15 for speed, 30 for max isolation, 0 for concurrent."
        required: true
        default: "12"
      coordinator_mode:
        description: "Coordinator policy after denylist. final_only allows concurrent entry but still serializes decisive captcha finals."
        required: true
        default: "off"
        type: choice
        options:
          - "off"
          - entry
          - entry_final
          - final_only
      max_parallel:
        description: "Maximum simultaneous matrix jobs; 20 is the verified sweet point with final_only and a 15s coordinator gap."
        required: true
        default: "20"
      runtime_mode:
        description: "Runtime bootstrap: legacy installs apt/pip per live slot; prebuilt restores the validated dependency/font/browser cache."
        required: true
        default: "prebuilt"
        type: choice
        options:
          - legacy
          - prebuilt
      runtime_cache_revision:
        description: "Prebuilt cache revision created by build-ga-runtime-cache.yml. Bump when Python, browser, or fonts change."
        required: true
        default: "v1"
      stop_on_rechallenge:
        description: "Override historical wrapper to stop stale proof fallback when risk/verify requests a fresh HumanCaptcha"
        required: true
        default: "0"
      primary_final_variant:
        description: "Optional retry candidate promoted before the first real collector fetch"
        required: false
        default: ""
      proxy_pool_file:
        description: "Optional checked-in private-source mihomo YAML. If empty, the optional CTF_PROXY_SUBSCRIPTION_URL Actions Secret is used."
        required: false
        default: ""
permissions:
  contents: read

jobs:
  own-ip-probe:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix:
        attempt: ${{ fromJSON(inputs.node_slots_json) }}
    env:
      PYTHONIOENCODING: utf-8
      CLOAKBROWSER_SUPPRESS_FONT_WARNING: "1"
      CTF_PROXY_SUBSCRIPTION_URL: ${{ secrets.CTF_PROXY_SUBSCRIPTION_URL }}
      ADS_PROFILE_API_URL: ${{ secrets.ADS_PROFILE_API_URL }}
      RESULTS_ENCRYPTION_CERT_B64: ${{ vars.RESULTS_ENCRYPTION_CERT_B64 }}
      OUTLOOK_REAL_FINAL_PRIMARY_VARIANT: ${{ inputs.primary_final_variant }}
      GA_COORDINATOR_URL: ${{ vars.GA_COORDINATOR_URL }}
      GA_COORDINATOR_TOKEN: ${{ secrets.GA_COORDINATOR_TOKEN }}
      GA_COORDINATOR_MODE: ${{ inputs.coordinator_mode }}
      GA_COORDINATOR_SLOT: ${{ matrix.attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ inputs.variant == 'historical_ga_success_default' && 'f8c9c0ea377a08b4c5c10a05c0558cda85d5a01a' || inputs.variant == 'historical_ga_highrate_336a973' && '336a97312e3e89219ad6179b196bfa99239cb13e' || inputs.variant == 'historical_ga_fresh_rechallenge' && '96787a7561f5e4b8786c2fda9cf3f8f1da0035bf' || inputs.variant == 'online_ads_ga_fresh_rechallenge' && '31dfe0e28e5da13645a455dba6737c19346faf63' || inputs.variant == 'online_ads_ga_fresh_5s_recovery' && 'b80b75375a0925b0fa3e80f962f7014ecfe5d495' || inputs.variant == 'online_ads_ga_5s_hold_transplant' && '01086ae6d319a8bbf019ddb34267edd59ac7ec31' || (inputs.variant == 'release_5s_success_baseline' || inputs.variant == 'release_5s_success_attempt2') && '00b68437e041cbdcee2be209a18d7a5592f4c2dd' || (inputs.variant == 'offline_ads_like_ga_fresh_rechallenge' || inputs.variant == 'offline_ads_pool_ga_fresh_rechallenge') && '0838ef3a52c6eb337b0847762757d282b36b9e5e' || vars.PRIVATE_SOURCE_REF }}
          ssh-key: ${{ secrets.PRIVATE_SOURCE_DEPLOY_KEY }}
          persist-credentials: false
          clean: true

      - name: Verify historical GA success baseline
        if: ${{ inputs.variant == 'historical_ga_success_default' }}
        shell: bash
        run: |
          set -euo pipefail
          expected=f8c9c0ea377a08b4c5c10a05c0558cda85d5a01a
          actual=$(git rev-parse HEAD)
          echo "expected=$expected actual=$actual"
          test "$actual" = "$expected"
          python3 - <<'PY'
          from pathlib import Path
          requirements = {
              line.strip() for line in Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          }
          assert "cloakbrowser==0.4.8" in requirements, sorted(requirements)
          assert Path("run_xvfb_natural_1920.sh").is_file()
          PY
          echo "historical_ga_success_source=$actual"

      - name: Verify historical high-rate GA baseline
        if: ${{ inputs.variant == 'historical_ga_highrate_336a973' }}
        shell: bash
        run: |
          set -euo pipefail
          expected=336a973
          actual=$(git rev-parse --short=7 HEAD)
          echo "expected=$expected actual=$actual"
          test "$actual" = "$expected"
          grep -Fxq 'cloakbrowser==0.4.8' requirements.txt
          test -f run_xvfb_natural_1920.sh
          echo "historical_ga_highrate_source=$(git rev-parse HEAD)"

      - name: Verify fresh rechallenge source
        if: ${{ inputs.variant == 'historical_ga_fresh_rechallenge' }}
        shell: bash
        run: |
          set -euo pipefail
          expected=96787a7561f5e4b8786c2fda9cf3f8f1da0035bf
          actual=$(git rev-parse HEAD)
          echo "expected=$expected actual=$actual"
          test "$actual" = "$expected"
          python3 - <<'PY'
          from pathlib import Path
          requirements = {line.strip() for line in Path("requirements.txt").read_text(encoding="utf-8").splitlines()}
          assert "cloakbrowser==0.4.8" in requirements
          controller = Path("controllers/base_controller.py").read_text(encoding="utf-8")
          wrapper = Path("run_xvfb_natural_1920.sh").read_text(encoding="utf-8")
          config = Path("config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json").read_text(encoding="utf-8")
          assert "fresh_rechallenge_start" in controller
          assert "OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_STOP_ON_RECHALLENGE=1" in wrapper
          assert '"hold_retries": 3' in config
          PY

      - name: Verify online ADS source
        if: ${{ inputs.variant == 'online_ads_ga_fresh_rechallenge' || inputs.variant == 'online_ads_ga_fresh_5s_recovery' || inputs.variant == 'online_ads_ga_5s_hold_transplant' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.variant }}" = "online_ads_ga_fresh_5s_recovery" ]; then
            expected=b80b75375a0925b0fa3e80f962f7014ecfe5d495
          elif [ "${{ inputs.variant }}" = "online_ads_ga_5s_hold_transplant" ]; then
            expected=01086ae6d319a8bbf019ddb34267edd59ac7ec31
          else
            expected=31dfe0e28e5da13645a455dba6737c19346faf63
          fi
          actual=$(git rev-parse HEAD)
          echo "expected=$expected actual=$actual"
          test "$actual" = "$expected"
          test -f tools/fetch_ads_profile_template.py
          test -f ads_like_cloak_profile_generator.py
          grep -q '_wait_for_ga_coordinator' controllers/patchright_controller.py
          grep -q 'minimal_natural_hold' protocol_runtime_probe.py
          grep -q -- '--final-proof-normalizer minimal_natural_hold' run_xvfb_natural_1920.sh
          if [ "${{ inputs.variant }}" = "online_ads_ga_5s_hold_transplant" ]; then
            test -f run_xvfb_natural_5s_transplant_1920.sh
            grep -q -- '--time-warp-wall-ms 6500' run_xvfb_natural_5s_transplant_1920.sh
            grep -q -- '--final-proof-normalizer minimal_natural_hold' run_xvfb_natural_5s_transplant_1920.sh
            grep -q -- '--disable-synthetic-u0' run_xvfb_natural_5s_transplant_1920.sh
          fi
          if [ "${{ inputs.variant }}" = "online_ads_ga_fresh_5s_recovery" ]; then
            test -f run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--mode natural_then_time_warp_hold' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--time-warp-install-mode early' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--time-warp-wall-ms 6500' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--normalize-px1200-timing on' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--align-px561-timing-from-px1200' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--inject-knp-sandbox-event' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--exact-knp-wait-ms 1600' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--exact-knp-fallback-grace-ms 1600' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--synthetic-u0-lead-ms 650' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--min-runtime-hook-ready-frames 6' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--min-knp-prestart-ok 5' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--require-chctx-runtime-ready' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--prehold-readiness-gate-ms 1800' run_xvfb_natural_fresh_5s_1920.sh
            grep -q -- '--wait-after-ms 45000' run_xvfb_natural_fresh_5s_1920.sh
            grep -q 'FRESH_RECHALLENGE_ROUNDS:-3' run_xvfb_natural_fresh_5s_1920.sh
            grep -q 'return fallback()' protocol_runtime_probe.py
            grep -q 'captcha phase=initial handler=natural' protocol_runtime_probe.py
            grep -q 'captcha phase=fresh handler=time_warp_hold' protocol_runtime_probe.py
            grep -q 'fresh runtime route hook armed before shell' protocol_runtime_probe.py
            grep -q 'fresh_rechallenge_prepare' controllers/base_controller.py
            python3 - <<'PY'
          import ast
          import re
          from pathlib import Path

          source = Path("protocol_runtime_probe.py").read_text(encoding="utf-8")
          parser_flags = set()
          for node in ast.walk(ast.parse(source)):
              if not (
                  isinstance(node, ast.Call)
                  and isinstance(node.func, ast.Attribute)
                  and node.func.attr == "add_argument"
              ):
                  continue
              for arg in node.args:
                  if (
                      isinstance(arg, ast.Constant)
                      and isinstance(arg.value, str)
                      and arg.value.startswith("--")
                  ):
                      parser_flags.add(arg.value)

          wrapper = Path("run_xvfb_natural_fresh_5s_1920.sh").read_text(encoding="utf-8")
          wrapper_flags = set(re.findall(r"^\s+(--[a-z0-9-]+)(?:\s|\\)", wrapper, re.MULTILINE))
          unknown = sorted(wrapper_flags - parser_flags)
          assert not unknown, f"unknown protocol_runtime_probe flags: {unknown}"
          print({"wrapper_flags": len(wrapper_flags), "unknown": unknown})
          PY
          fi
          grep -q 'FRESH_RECHALLENGE_ROUNDS' controllers/base_controller.py
          grep -q 'fresh_rechallenge_hold_budget' controllers/base_controller.py
          grep -q 'FRESH_BARE_SENSOR' controllers/base_controller.py
          grep -q 'FRESH_ABSOLUTE_TIMEOUT_SECONDS' controllers/base_controller.py
          grep -q 'FreshRechallengeAbsoluteDeadline' controllers/base_controller.py
          grep -q 'fresh_rechallenge_absolute_timeout' controllers/base_controller.py
          grep -q 'AbortController' controllers/base_controller.py
          grep -q 'fresh_absolute_deadline.remaining_ms' controllers/base_controller.py
          grep -q '_protocol_takeover_fresh_timeout_check' controllers/patchright_controller.py
          test -f controllers/fresh_rechallenge_watchdog.py
          test -f tests/test_fresh_rechallenge_watchdog.py
          python3 -m unittest tests.test_fresh_rechallenge_watchdog
          test -n "${ADS_PROFILE_API_URL:-}"
          # Fresh-rechallenge isolation contract from P0 slot13 vs result0_rechallenge diffs.
          # Grep the file directly. "echo "$huge" | grep -q" under pipefail can
          # fail with Broken pipe when grep exits early after a match.
          grep -q 'fresh_rechallenge_isolation_reset' controllers/base_controller.py
          grep -q 'synthetic_pt_markers' controllers/base_controller.py
          if grep -q 'pt_round=2&pt_ts=' controllers/base_controller.py; then
            echo "unexpected synthetic pt_round/pt_ts append still present" >&2
            exit 1
          fi

      - name: Verify exact 5s release source
        if: ${{ inputs.variant == 'release_5s_success_baseline' || inputs.variant == 'release_5s_success_attempt2' }}
        shell: bash
        run: |
          set -euo pipefail
          expected=00b68437e041cbdcee2be209a18d7a5592f4c2dd
          actual=$(git rev-parse HEAD)
          echo "expected=$expected actual=$actual"
          test "$actual" = "$expected"
          test -f config.release-5s-success-ga.json
          test -f run_xvfb_release_5s_success_baseline.sh
          test -f run_xvfb_release_5s_success_attempt2.sh
          grep -q -- '--time-warp-wall-ms 6500' run_xvfb_release_5s_success_attempt2.sh
          grep -q -- '--time-warp-server-challenge-rounds 8' run_xvfb_release_5s_success_attempt2.sh
          grep -q -- '--time-warp-retry-visible-challenge-after-ms 7000' run_xvfb_release_5s_success_attempt2.sh
          grep -q -- '--real-final-neutral-w0-success' run_xvfb_release_5s_success_attempt2.sh

      - name: Verify offline ADS-like source
        if: ${{ inputs.variant == 'offline_ads_like_ga_fresh_rechallenge' }}
        shell: bash
        run: |
          set -euo pipefail
          expected=0838ef3a52c6eb337b0847762757d282b36b9e5e
          actual=$(git rev-parse HEAD)
          echo "expected=$expected actual=$actual"
          test "$actual" = "$expected"
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          ua = str((data.get('context') or {}).get('user_agent') or '')
          args = [str(x) for x in ((data.get('cloakbrowser') or {}).get('args') or [])]
          ads = data.get('ads_like_profile') or {}
          assert 'Chrome/146.0.7680.177' in ua, ua
          assert '--no-sandbox' not in args, args
          assert any(x.startswith('--fingerprint=') for x in args), args
          assert str(ads.get('seed') or '') == '96290', ads
          print(json.dumps({'ua': ua, 'cloak_args': args, 'ads_source': ads.get('source'), 'seed': ads.get('seed')}, ensure_ascii=False))
          PY
          grep -q '_wait_for_ga_coordinator' controllers/patchright_controller.py
          grep -q 'minimal_natural_hold' protocol_runtime_probe.py
          grep -q 'FRESH_RECHALLENGE_ROUNDS' controllers/base_controller.py

      - name: Verify offline ADS profile pool source
        if: ${{ inputs.variant == 'offline_ads_pool_ga_fresh_rechallenge' }}
        shell: bash
        run: |
          set -euo pipefail
          expected=0838ef3a52c6eb337b0847762757d282b36b9e5e
          actual=$(git rev-parse HEAD)
          test "$actual" = "$expected"
          test -f config.ads_offline_profile_pool.json
          test -f tools/fetch_ads_profile_template.py
          python3 - <<'PY'
          import json
          data = json.load(open('config.ads_offline_profile_pool.json', encoding='utf-8'))
          assert len(data.get('profiles') or []) >= 20
          text = json.dumps(data, ensure_ascii=False).lower()
          for forbidden in ('cookie', 'password', 'user_proxy_config', 'proxy_password', 'login_cookie'):
              assert forbidden not in text, forbidden
          print({'offline_profile_count': len(data['profiles'])})
          PY
          grep -q '_wait_for_ga_coordinator' controllers/patchright_controller.py
          grep -q 'minimal_natural_hold' protocol_runtime_probe.py

      # Capture egress + denylist BEFORE heavy setup/stagger so bad prefixes exit in ~1 min.
      - name: Capture GA egress
        id: egress
        shell: bash
        env:
          EGRESS_PREFIX_DENYLIST: ${{ inputs.egress_prefix_denylist }}
        run: |
          set -euxo pipefail
          mkdir -p Results/diagnostics
          ip="$(curl -fsS --max-time 10 https://api.ipify.org 2>/dev/null || true)"
          export GA_PUBLIC_IP="$ip"
          python3 - <<'PY'
          import json
          import os
          import re
          data = {
              "attempt": ${{ matrix.attempt }},
              "variant": "${{ inputs.variant }}",
              "network_mode": "${{ inputs.network_mode }}",
              "runner": "${{ inputs.runner }}",
              "runner_os": "${{ runner.os }}",
              "runner_arch": "${{ runner.arch }}",
              "public_ip": os.environ.get("GA_PUBLIC_IP", ""),
              "egress_prefix_denylist": os.environ.get("EGRESS_PREFIX_DENYLIST", ""),
          }
          with open("Results/diagnostics/ga_egress.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print(json.dumps(data, ensure_ascii=False))

          ip = data.get("public_ip") or ""
          raw = os.environ.get("EGRESS_PREFIX_DENYLIST", "")
          prefixes = [p.strip() for p in raw.split(",") if p.strip()]
          matched = ""
          for prefix in prefixes:
              token = prefix
              if re.fullmatch(r"\d{1,3}", token):
                  token += "."
              if ip == token.rstrip(".") or ip.startswith(token):
                  matched = prefix
                  break
          github_output = os.environ.get("GITHUB_OUTPUT")
          if matched:
              reason = f"egress_prefix_denylist matched prefix={matched} ip={ip}"
              with open("Results/diagnostics/egress_skip.txt", "w", encoding="utf-8") as f:
                  f.write(reason + "\n")
              print(reason)
              if github_output:
                  with open(github_output, "a", encoding="utf-8") as f:
                      f.write("should_probe=false\n")
                      f.write(f"skip_reason={reason}\n")
          elif github_output:
              with open(github_output, "a", encoding="utf-8") as f:
                  f.write("should_probe=true\n")
          PY

      - name: Restore precompiled GA runtime
        if: ${{ steps.egress.outputs.should_probe != 'false' && inputs.runtime_mode == 'prebuilt' }}
        id: runtime-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .venv
            ~/.cloakbrowser
            ~/.local/share/fonts/ga-runtime
          key: ${{ runner.os }}-${{ runner.arch }}-ga-runtime-${{ inputs.runtime_cache_revision }}-py310-cloak048
          fail-on-cache-miss: true

      - name: Validate precompiled GA runtime
        if: ${{ steps.egress.outputs.should_probe != 'false' && inputs.runtime_mode == 'prebuilt' }}
        shell: bash
        run: |
          set -euxo pipefail
          . .venv/bin/activate
          python - <<'PY'
          import importlib.metadata as md
          expected = {
              'cloakbrowser': '0.4.8',
              'playwright': '1.53.0',
              'patchright': '1.61.2',
          }
          for package, wanted in expected.items():
              actual = md.version(package)
              print(f'{package}={actual}')
              if actual != wanted:
                  raise SystemExit(f'{package}: expected {wanted}, got {actual}')
          PY
          chrome=$(ls -1d "$HOME"/.cloakbrowser/chromium-*/chrome 2>/dev/null | tail -1)
          test -x "$chrome"
          "$chrome" --version
          test -d "$HOME/.local/share/fonts/ga-runtime"
          fc-cache -f "$HOME/.local/share/fonts/ga-runtime"
          fc-match 'Segoe UI' | head -1
          fc-match 'Calibri' | head -1

      - name: System dependencies
        if: ${{ steps.egress.outputs.should_probe != 'false' && inputs.runtime_mode == 'legacy' }}
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xauth ca-certificates curl unzip fontconfig software-properties-common \
            fonts-liberation fonts-noto fonts-noto-cjk fonts-crosextra-carlito fonts-crosextra-caladea
          sudo apt-get install -y --no-install-recommends fonts-selawik || true
          sudo add-apt-repository -y multiverse || true
          sudo apt-get update || true
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections || true
          sudo apt-get install -y --no-install-recommends ttf-mscorefonts-installer || true
          fc-cache -f

      - name: Python environment
        if: ${{ steps.egress.outputs.should_probe != 'false' && inputs.runtime_mode == 'legacy' }}
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          set +e
          python -m cloakbrowser install
          cb_code=$?
          set -e
          if [ "$cb_code" -ne 0 ]; then
            echo "cloakbrowser install exited $cb_code; checking extracted binary"
            test -x "$(ls -1d "$HOME"/.cloakbrowser/chromium-*/chrome 2>/dev/null | tail -1)"
          fi

      - name: Install Windows-like font family aliases
        if: ${{ steps.egress.outputs.should_probe != 'false' && inputs.runtime_mode == 'legacy' }}
        shell: bash
        run: |
          set -euxo pipefail
          . .venv/bin/activate
          python - <<'PY'
          from fontTools.ttLib import TTFont
          from pathlib import Path

          out = Path.home() / ".local/share/fonts/windows-ctf"
          out.mkdir(parents=True, exist_ok=True)

          def pick(*paths):
              return next((Path(p) for p in paths if Path(p).exists()), None)

          default_src = pick(
              '/usr/share/fonts/truetype/liberation2/LiberationSans-Regular.ttf',
              '/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf',
              '/usr/share/fonts/truetype/msttcorefonts/Arial.ttf',
              '/usr/share/fonts/truetype/crosextra/Carlito-Regular.ttf',
          )
          selawik_src = pick(
              '/usr/share/fonts/truetype/selawik/Selawik.ttf',
              '/usr/share/fonts/truetype/selawik/Selawik-Regular.ttf',
          ) or default_src
          calibri_src = pick(
              '/usr/share/fonts/truetype/crosextra/Carlito-Regular.ttf',
              '/usr/share/fonts/truetype/msttcorefonts/Arial.ttf',
          ) or default_src
          msgothic_src = pick(
              '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc',
              '/usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc',
          ) or default_src
          if not default_src:
              raise SystemExit('no base font found')

          def set_name(font, name_id, value):
              font['name'].setName(value, name_id, 3, 1, 0x409)
              font['name'].setName(value, name_id, 1, 0, 0)

          families = [
              ('Segoe UI', 'Regular', selawik_src),
              ('Segoe UI Light', 'Regular', selawik_src),
              ('Calibri', 'Regular', calibri_src),
              ('Cambria', 'Regular', pick('/usr/share/fonts/truetype/crosextra/Caladea-Regular.ttf') or calibri_src),
              ('Marlett', 'Regular', default_src),
              ('MS UI Gothic', 'Regular', msgothic_src),
              ('Franklin Gothic', 'Regular', default_src),
          ]
          for family, subfamily, src in families:
              try:
                  font = TTFont(str(src))
              except Exception as exc:
                  if exc.__class__.__name__ == 'TTLibFileIsCollectionError':
                      font = TTFont(str(src), fontNumber=0)
                  else:
                      raise
              full = f'{family} {subfamily}'
              ps = ''.join(ch for ch in full if ch.isalnum())
              set_name(font, 1, family)
              set_name(font, 2, subfamily)
              set_name(font, 4, full)
              set_name(font, 6, ps)
              set_name(font, 16, family)
              set_name(font, 17, subfamily)
              font.save(str(out / f'{ps}.ttf'))
          PY
          fc-cache -f "$HOME/.local/share/fonts"
          fc-match 'Segoe UI' | head -1
          fc-match 'Calibri' | head -1

      - name: Normalize shell scripts
        if: ${{ steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        run: |
          set -euxo pipefail
          sed -i 's/\r$//' run_xvfb_*.sh
          chmod +x run_xvfb_*.sh

      - name: Enable fresh HumanCaptcha rechallenge handling
        if: ${{ inputs.stop_on_rechallenge == '1' && steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          test -f run_xvfb_natural_1920.sh
          sed -i 's/OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_STOP_ON_RECHALLENGE=0/OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_STOP_ON_RECHALLENGE=1/' run_xvfb_natural_1920.sh
          grep -n 'OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_STOP_ON_RECHALLENGE=1' run_xvfb_natural_1920.sh

      - name: Fetch and apply online ADS fingerprint
        if: ${{ (inputs.variant == 'online_ads_ga_fresh_rechallenge' || inputs.variant == 'online_ads_ga_fresh_5s_recovery' || inputs.variant == 'online_ads_ga_5s_hold_transplant') && steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ads-online/generated Results/diagnostics
          python3 tools/fetch_ads_profile_template.py \
            --api-base "$ADS_PROFILE_API_URL" \
            --slot "${{ matrix.attempt }}" \
            --out .ads-online/profile.json | tee Results/diagnostics/ads_online_fetch.json
          python3 ads_like_cloak_profile_generator.py \
            --source-json .ads-online/profile.json \
            --base-config config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json \
            --out-dir .ads-online/generated \
            --profile-root ./profiles \
            --prefix "ga-ads-slot-${{ matrix.attempt }}" \
            --count 1 \
            --seed-mode derived \
            --window-size 1920,1080 \
            --hold-retries 3 \
            --chromium-version 146.0.7680.177
          generated=$(find .ads-online/generated -maxdepth 1 -type f -name 'config.ctf.runtime.*.json' ! -name '*manifest*' | head -n1)
          test -n "$generated"
          cp "$generated" config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path("config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          ua = str((data.get("context") or {}).get("user_agent") or "")
          args = [str(x) for x in ((data.get("cloakbrowser") or {}).get("args") or [])]
          assert "Chrome/146.0.7680.177" in ua, ua
          assert "--no-sandbox" not in args, args
          assert str((data.get("ads_like_profile") or {}).get("source")) == "offline AdsPower profile JSON"
          print(json.dumps({"ua": ua, "cloak_args": args, "seed": (data.get("ads_like_profile") or {}).get("seed")}, ensure_ascii=False))
          PY

      - name: Apply offline ADS profile-pool fingerprint
        if: ${{ inputs.variant == 'offline_ads_pool_ga_fresh_rechallenge' && steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ads-offline/generated Results/diagnostics
          python3 tools/fetch_ads_profile_template.py \
            --offline-pool config.ads_offline_profile_pool.json \
            --slot "${{ matrix.attempt }}" \
            --out .ads-offline/profile.json | tee Results/diagnostics/ads_offline_select.json
          python3 ads_like_cloak_profile_generator.py \
            --source-json .ads-offline/profile.json \
            --base-config config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json \
            --out-dir .ads-offline/generated \
            --profile-root ./profiles \
            --prefix "ga-offline-ads-slot-${{ matrix.attempt }}" \
            --count 1 \
            --seed-mode derived \
            --window-size 1920,1080 \
            --hold-retries 3 \
            --chromium-version 146.0.7680.177
          generated=$(find .ads-offline/generated -maxdepth 1 -type f -name 'config.ctf.runtime.*.json' ! -name '*manifest*' | head -n1)
          test -n "$generated"
          cp "$generated" config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json
          python3 - <<'PY'
          import json
          p = 'config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json'
          data = json.load(open(p, encoding='utf-8'))
          ua = str((data.get('context') or {}).get('user_agent') or '')
          args = [str(x) for x in ((data.get('cloakbrowser') or {}).get('args') or [])]
          ads = data.get('ads_like_profile') or {}
          seeds = [x.split('=', 1)[1] for x in args if x.startswith('--fingerprint=')]
          assert 'Chrome/146.0.7680.177' in ua, ua
          assert '--no-sandbox' not in args, args
          assert len(seeds) == 1 and len(seeds[0]) == 5, seeds
          assert ads.get('source') == 'offline AdsPower profile JSON', ads
          print(json.dumps({'ua': ua, 'seed': seeds[0], 'source': ads.get('source')}, ensure_ascii=False))
          PY

      - name: Diversify exact-release Cloak fingerprint per fresh runner
        if: ${{ (inputs.variant == 'release_5s_success_baseline' || inputs.variant == 'release_5s_success_attempt2') && steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        env:
          GA_SLOT: ${{ matrix.attempt }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os
          from pathlib import Path

          path = Path("config.release-5s-success-ga.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          material = f"{os.environ.get('GITHUB_RUN_ID','')}:{os.environ['GA_SLOT']}"
          seed = 10000 + int(hashlib.sha256(material.encode()).hexdigest()[:8], 16) % 90000
          cloak = data.setdefault("cloakbrowser", {})
          args = [str(value) for value in (cloak.get("args") or [])]
          args = [value for value in args if not value.startswith("--fingerprint=")]
          args.insert(0, f"--fingerprint={seed}")
          cloak["args"] = args
          profile = data.setdefault("ads_like_profile", {})
          profile["seed"] = str(seed)
          profile["source"] = "GA per-run deterministic seed"
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps({"fingerprint_seed": seed, "slot": os.environ["GA_SLOT"]}))
          PY

      - name: Start subscription proxy
        if: ${{ inputs.network_mode == 'proxy_pool' && steps.egress.outputs.should_probe != 'false' && (env.CTF_PROXY_SUBSCRIPTION_URL != '' || inputs.proxy_pool_file != '') }}
        shell: bash
        env:
          PROXY_SUBSCRIPTION_URL: ${{ env.CTF_PROXY_SUBSCRIPTION_URL }}
          PROXY_POOL_FILE: ${{ inputs.proxy_pool_file }}
        run: |
          set -euo pipefail
          mkdir -p Results/diagnostics .mihomo-ga
          . .venv/bin/activate
          source_args=()
          if [ -n "$PROXY_SUBSCRIPTION_URL" ]; then
            source_args=(--url "$PROXY_SUBSCRIPTION_URL")
          else
            test -f "$PROXY_POOL_FILE"
            source_args=(--config "$PROXY_POOL_FILE")
          fi

          python tools/setup_ga_subscription_proxy.py \
            "${source_args[@]}" \
            --node-slot "${{ matrix.attempt }}" \
            --out-dir .mihomo-ga \
            --http-port 17890 \
            --socks-port 17891 \
            --controller-port 19090 | tee Results/diagnostics/proxy_select.txt

          # Pin the release asset used by the verified proxy runs. Querying the
          # GitHub releases API independently from 20 jobs can hit the unauthenticated
          # rate limit and drop a matrix slot before its live probe starts.
          asset_url="https://github.com/MetaCubeX/mihomo/releases/download/v1.19.28/mihomo-linux-amd64-v1-v1.19.28.gz"
          echo "mihomo_asset=$asset_url" >> Results/diagnostics/proxy_select.txt
          curl -fsSL "$asset_url" -o .mihomo-ga/mihomo.gz
          gzip -dc .mihomo-ga/mihomo.gz > .mihomo-ga/mihomo
          chmod +x .mihomo-ga/mihomo
          nohup .mihomo-ga/mihomo -d .mihomo-ga -f .mihomo-ga/config.yaml > Results/diagnostics/mihomo.log 2>&1 &
          echo "$!" > Results/diagnostics/mihomo.pid
          sleep 2
          for i in $(seq 1 20); do
            if curl -fsS --max-time 8 -x http://127.0.0.1:17890 https://api.ipify.org > Results/diagnostics/proxy_public_ip.txt 2>>Results/diagnostics/proxy_curl.err; then
              break
            fi
            sleep 2
          done
          proxy_ip="$(cat Results/diagnostics/proxy_public_ip.txt 2>/dev/null || true)"
          python - <<'PY'
          import json
          from pathlib import Path
          selected = {}
          try:
              selected = json.loads(Path(".mihomo-ga/selected_proxy.json").read_text(encoding="utf-8"))
          except Exception as exc:
              selected = {"selected_error": repr(exc)}
          proxy_ip = Path("Results/diagnostics/proxy_public_ip.txt").read_text(encoding="utf-8", errors="replace").strip() if Path("Results/diagnostics/proxy_public_ip.txt").exists() else ""
          selected["proxy_public_ip"] = proxy_ip
          selected["proxy_ready"] = bool(proxy_ip)
          Path("Results/diagnostics/ga_proxy_egress.json").write_text(json.dumps(selected, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps({"proxy_ready": bool(proxy_ip), "proxy_public_ip": proxy_ip, "selected_index": selected.get("selected_index"), "selected_name": selected.get("selected_name")}, ensure_ascii=False))
          PY
          cat Results/diagnostics/ga_proxy_egress.json
          echo "OUTLOOK_PROXY_URL=http://127.0.0.1:17890" >> "$GITHUB_ENV"

      - name: Stagger live target entry
        if: ${{ inputs.coordinator_mode == 'off' && inputs.network_mode == 'ga_own_ip' && steps.egress.outputs.should_probe != 'false' && fromJSON(inputs.slot_stagger_seconds) > 0 }}
        shell: bash
        run: |
          set -euo pipefail
          # Wave stagger: only spread across max_parallel lanes so slot 36 does not
          # wait (35 * stagger) after denylist already discarded many candidates.
          attempt=${{ matrix.attempt }}
          max_p=${{ fromJSON(inputs.max_parallel) }}
          step=${{ fromJSON(inputs.slot_stagger_seconds) }}
          if [ "$max_p" -lt 1 ]; then max_p=1; fi
          wave=$(( (attempt - 1) % max_p ))
          delay=$(( wave * step ))
          echo "slot=$attempt wave=$wave max_parallel=$max_p stagger_seconds=$delay"
          sleep "$delay"

      - name: Record sanitized registration browser environment
        if: ${{ steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        env:
          GA_SLOT: ${{ matrix.attempt }}
          GA_VARIANT: ${{ inputs.variant }}
          GA_NETWORK_MODE: ${{ inputs.network_mode }}
          GA_PUBLIC_IP: ${{ env.GA_PUBLIC_IP }}
        run: |
          set -euo pipefail
          . .venv/bin/activate
          python3 - <<'PY'
          import hashlib
          import importlib.metadata
          import json
          import os
          import subprocess
          from pathlib import Path

          release_variant = os.environ.get('GA_VARIANT', '').startswith('release_5s_success_')
          source = Path(
              'config.release-5s-success-ga.json'
              if release_variant else
              'config.ctf.runtime.protocol1s-adssafe-stab-5-xvfb-linux-1920-20260707.manual.json'
          )
          data = json.loads(source.read_text(encoding='utf-8'))
          context = dict(data.get('context') or {})
          cloak = dict(data.get('cloakbrowser') or {})
          manifest = {
              # This is intentionally a launchable, non-secret subset of the
              # exact config. It contains no profile directory, AdsPower ID,
              # cookie, proxy credential, or account identifier.
              'context': context,
              'cloakbrowser': cloak,
              'patchright': {'use_cloakbrowser': bool((data.get('patchright') or {}).get('use_cloakbrowser'))},
              'proxy': '',
              'recovery_provenance': {
                  'schema': 1,
                  'source_sha': subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip(),
                  'slot': os.environ.get('GA_SLOT', ''),
                  'variant': os.environ.get('GA_VARIANT', ''),
                  'network_mode': os.environ.get('GA_NETWORK_MODE', ''),
                  'xvfb_screen': '1920x1200x24' if release_variant else '2560x1440x24',
                  'cloakbrowser_version': importlib.metadata.version('cloakbrowser'),
                  'source_config_sha256': hashlib.sha256(source.read_bytes()).hexdigest(),
                  # Keep egress comparable without persisting an address in
                  # the artifact; a proxy itself must be supplied separately.
                  'egress_sha256': hashlib.sha256(os.environ.get('GA_PUBLIC_IP', '').encode()).hexdigest(),
                  'proxy_was_configured': bool(data.get('proxy')) or bool(os.environ.get('OUTLOOK_PROXY_URL')),
              },
          }
          out = Path('Results/diagnostics/registration_browser_env.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          # Safe confirmation only; do not print headers, UA, fingerprints, or
          # any persistent-profile data into the public runner log.
          print(json.dumps({'recorded': True, 'schema': 1, 'proxy_was_configured': manifest['recovery_provenance']['proxy_was_configured']}))
          PY

      - name: Reserve globally coordinated live entry
        if: ${{ (inputs.coordinator_mode == 'entry' || inputs.coordinator_mode == 'entry_final') && inputs.network_mode == 'ga_own_ip' && steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        env:
          GA_SLOT: ${{ matrix.attempt }}
        run: |
          set -euo pipefail
          test -n "${GA_COORDINATOR_URL:-}"
          test -n "${GA_COORDINATOR_TOKEN:-}"
          mkdir -p Results/diagnostics
          payload=$(python3 - <<'PY'
          import json, os
          print(json.dumps({
              "stage": "entry",
              "request_id": f"{os.environ['GITHUB_RUN_ID']}:{os.environ['GA_SLOT']}:entry",
              "run_id": os.environ["GITHUB_RUN_ID"],
              "slot": os.environ["GA_SLOT"],
          }, separators=(",", ":")))
          PY

          )
          response=$(curl -fsS --retry 4 --retry-all-errors --connect-timeout 8 --max-time 20 \
            -A 'github-actions-ga-coordinator/1.0' \
            -H "Authorization: Bearer ${GA_COORDINATOR_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "${GA_COORDINATOR_URL%/}/v1/reservations")
          printf '%s\n' "$response" | tee Results/diagnostics/ga_coordinator_entry.json
          wait_ms=$(python3 -c 'import json,sys,time; print(max(0,int(json.load(sys.stdin)["scheduled_at_ms"])-int(time.time()*1000)))' <<<"$response")
          echo "coordinator_wait_ms=$wait_ms slot=$GA_SLOT"
          python3 -c 'import sys,time; time.sleep(max(0,int(sys.argv[1]))/1000)' "$wait_ms"

      - name: Run no-proxy live probe on GA own IP
        if: ${{ steps.egress.outputs.should_probe != 'false' }}
        id: live
        shell: bash
        env:
          OUTLOOK_CAPTCHA_PRE_FIRST_HOLD_WARMUP_MS: ${{ inputs.pre_first_hold_warmup_ms }}
          OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_FRESH_ABSOLUTE_TIMEOUT_SECONDS: ${{ inputs.fresh_absolute_timeout_seconds }}
        run: |
          set +e
          mkdir -p Results/diagnostics
          private_console="Results/diagnostics/public_runner_private_console.log"
          echo "GA_OWN_IP_ATTEMPT=${{ matrix.attempt }}"
          echo "NETWORK_MODE=${{ inputs.network_mode }}"
          echo "OUTLOOK_CAPTCHA_PRE_FIRST_HOLD_WARMUP_MS=${OUTLOOK_CAPTCHA_PRE_FIRST_HOLD_WARMUP_MS:-config-default}"
          echo "per_ip_max_registrations=${{ inputs.per_ip_max_registrations }}"
          variant="${{ inputs.variant }}"
          echo "probe_timeout_minutes=${{ inputs.probe_timeout_minutes }}"
          echo "fresh_absolute_timeout_seconds=${OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_FRESH_ABSOLUTE_TIMEOUT_SECONDS}"
          if [ "$variant" = "paired_5s_then_thin" ] || [ "$variant" = "paired_thin_then_5s" ]; then
            if [ "${{ inputs.per_ip_max_registrations }}" -ne 1 ]; then
              echo "paired variants require per_ip_max_registrations=1" >&2
              exit 2
            fi
            if [ "$variant" = "paired_5s_then_thin" ]; then
              labels=(five_seconds thin)
              commands=(./run_xvfb_semiprotocol_5s_1920.sh ./run_xvfb_natural_1920.sh)
            else
              labels=(thin five_seconds)
              commands=(./run_xvfb_natural_1920.sh ./run_xvfb_semiprotocol_5s_1920.sh)
            fi
            : > "$private_console"
            ec=0
            for i in 0 1; do
              echo "[PUBLIC_AB] begin order=$i variant=${labels[$i]}" | tee -a "$private_console"
              timeout --foreground "${{ inputs.probe_timeout_minutes }}m" "${commands[$i]}" \
                >>"$private_console" 2>&1
              one_ec=$?
              echo "[PUBLIC_AB] end order=$i variant=${labels[$i]} exit_code=$one_ec" | tee -a "$private_console"
              if [ "$one_ec" = "124" ]; then
                echo "paired_${labels[$i]}_probe_timeout" > "Results/diagnostics/paired_${labels[$i]}_probe_timeout.txt"
              fi
            done
          else
            cmd=()
            if [ "$variant" = "semiprotocol_5s_stable" ]; then
              cmd=(./run_xvfb_semiprotocol_5s_1920.sh)
            elif [ "$variant" = "semiprotocol_5s_historical_firstpass" ]; then
              cmd=(./run_xvfb_semiprotocol_5s_historical_firstpass_1920.sh)
            elif [ "$variant" = "semiprotocol_5s_histfp_no_inject_knp" ]; then
              cmd=(./run_xvfb_semiprotocol_5s_histfp_no_inject_knp_1920.sh)
            elif [ "$variant" = "release_5s_success_baseline" ]; then
              cmd=(./run_xvfb_release_5s_success_baseline.sh)
            elif [ "$variant" = "release_5s_success_attempt2" ]; then
              cmd=(./run_xvfb_release_5s_success_attempt2.sh)
            elif [ "$variant" = "ui_natural" ]; then
              cmd=(./run_xvfb_ui_natural_1920.sh)
            elif [ "$variant" = "natural_legacy" ]; then
              cmd=(./run_xvfb_natural_legacy_1920.sh)
            elif [ "$variant" = "online_ads_ga_5s_hold_transplant" ]; then
              cmd=(./run_xvfb_natural_5s_transplant_1920.sh)
            elif [ "$variant" = "online_ads_ga_fresh_5s_recovery" ]; then
              cmd=(./run_xvfb_natural_fresh_5s_1920.sh)
            elif [ "$variant" = "historical_ga_success_default" ] || [ "$variant" = "historical_ga_highrate_336a973" ] || [ "$variant" = "historical_ga_fresh_rechallenge" ] || [ "$variant" = "online_ads_ga_fresh_rechallenge" ] || [ "$variant" = "offline_ads_like_ga_fresh_rechallenge" ] || [ "$variant" = "offline_ads_pool_ga_fresh_rechallenge" ]; then
              cmd=(./run_xvfb_natural_1920.sh)
            else
              cmd=(./run_xvfb_natural_1920.sh)
            fi
            if [ "${{ inputs.per_ip_max_registrations }}" -gt 1 ]; then
              python3 tools/run_ga_ip_capacity_loop.py \
                --variant "$variant" \
                --max-registrations "${{ inputs.per_ip_max_registrations }}" \
                --probe-timeout-minutes "${{ inputs.probe_timeout_minutes }}" \
                >"$private_console" 2>&1
              ec=$?
            else
              timeout --foreground "${{ inputs.probe_timeout_minutes }}m" "${cmd[@]}" \
                >"$private_console" 2>&1
              ec=$?
              if [ "$ec" = "124" ]; then
                echo "[GAOwnIP] probe timed out after ${{ inputs.probe_timeout_minutes }}m"
                echo "probe_timeout" > Results/diagnostics/probe_timeout.txt
              fi
            fi
          fi
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "public_safe_probe_summary:"
          grep -E "\[PUBLIC_AB\]|outlook_register result=|riskblock|collector_minus1|real final result\|-1|CreateAccount strict success|probe timed out|fresh rechallenge absolute timeout|fresh rechallenge no progress|fresh rechallenge idle timeout" "$private_console" 2>/dev/null \
            | sed -E 's/[[:alnum:]._%+-]+@(outlook|hotmail)\.com/<redacted-email>/g' \
            | tail -40 || true
          # Matrix attempts are allowed to fail individually. The summarize job
          # evaluates redacted per-slot verdicts and rejects technical failures
          # or an all-IP-blocked run with no decisive non-IP checkpoint.
          exit 0

      - name: Summarize attempt without publishing credentials
        if: ${{ always() }}
        shell: bash
        run: |
          set +e
          echo "## GA attempt ${{ matrix.attempt }}" >> "$GITHUB_STEP_SUMMARY"
          echo "variant=${{ inputs.variant }}" >> "$GITHUB_STEP_SUMMARY"
          echo "probe_exit_code=${{ steps.live.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          latest=$(ls -t Results/network/*.jsonl 2>/dev/null | head -n1 || true)
          if [ -n "$latest" ]; then
            . .venv/bin/activate
            python classify_protocol_run.py "$latest" > /tmp/private_classification.json 2>/dev/null || true
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          p = Path('/tmp/private_classification.json')
          if p.exists():
              try:
                  row = json.loads(p.read_text(encoding='utf-8'))
              except Exception:
                  row = {}
              safe = {k: row.get(k) for k in (
                  'verdict', 'create_200', 'create_request', 'riskblock',
                  'human_loaded', 'human_success', 'captcha_close_minus1',
                  'score0_no_result0_timeout', 'iframe_bootstrap_stall',
                  'button_locate_timeout', 'live_timeout',
                  'strict_success', 'proof_accepted', 'technical_pass',
                  'ip_limited_after_proof', 'repeated_risk_challenge',
                  'outcome_class'
              )}
              print('```json')
              print(json.dumps(safe, ensure_ascii=False, indent=2))
              print('```')
          PY
          fi

      - name: Import successful account into outlookEmail
        if: ${{ always() && steps.egress.outputs.should_probe != 'false' }}
        shell: bash
        env:
          # Keep the ingestion credential out of the probe and every other
          # process launched from the checked-out private source.
          OUTLOOK_EMAIL_BASE_URL: ${{ vars.OUTLOOK_EMAIL_BASE_URL }}
          OUTLOOK_EMAIL_API_KEY: ${{ secrets.OUTLOOK_EMAIL_API_KEY }}
        run: |
          set +e
          mkdir -p Results/diagnostics
          safe_result="Results/diagnostics/outlook_email_ingest.json"
          request_file="${RUNNER_TEMP}/outlook-email-ingest-request-${{ matrix.attempt }}.json"
          response_file="${RUNNER_TEMP}/outlook-email-ingest-response-${{ matrix.attempt }}.json"
          rm -f "$request_file" "$response_file"
          trap 'rm -f "$request_file" "$response_file"' EXIT
          if [ -z "${OUTLOOK_EMAIL_BASE_URL:-}" ] || [ -z "${OUTLOOK_EMAIL_API_KEY:-}" ]; then
            printf '%s\n' '{"attempted":false,"reason":"integration_not_configured"}' > "$safe_result"
            exit 0
          fi
          case "$OUTLOOK_EMAIL_BASE_URL" in
            https://*) ;;
            *)
              printf '%s\n' '{"attempted":false,"reason":"invalid_https_base_url"}' > "$safe_result"
              exit 0
              ;;
          esac
          source_file=""
          for candidate in Results/unlogged_email.txt Results/logged_email.txt; do
            if [ -s "$candidate" ]; then source_file="$candidate"; break; fi
          done
          if [ -z "$source_file" ]; then
            printf '%s\n' '{"attempted":false,"reason":"no_registered_account"}' > "$safe_result"
            exit 0
          fi
          if ! SOURCE_FILE="$source_file" REQUEST_FILE="$request_file" python3 - <<'PY'
          import json, os
          from pathlib import Path
          lines = [x.strip() for x in Path(os.environ['SOURCE_FILE']).read_text(encoding='utf-8').splitlines() if x.strip()]
          email, sep, password = lines[-1].partition(': ')
          if not sep or '@' not in email or not password:
              raise SystemExit('invalid private result format')
          Path(os.environ['REQUEST_FILE']).write_text(json.dumps({
              'email': email.strip(),
              'password': password,
              'mode': 'graph',
              'remark': 'ga-run-${{ github.run_id }}-slot-${{ matrix.attempt }}',
          }), encoding='utf-8')
          PY
          then
            printf '%s\n' '{"attempted":true,"success":false,"reason":"invalid_private_result"}' > "$safe_result"
            exit 0
          fi
          success=false
          # The panel's hourly nginx reconciliation has produced a measured
          # ~75s window where this exact route returns 404.  Cover that window
          # without retrying permanent OAuth/Graph application failures.
          for retry in 1 2 3 4 5; do
            rm -f "$response_file"
            http_code=$(curl -sS --connect-timeout 10 --max-time 120 \
              -o "$response_file" -w '%{http_code}' \
              -H "X-API-Key: ${OUTLOOK_EMAIL_API_KEY}" \
              -H 'Content-Type: application/json' \
              --data-binary @"$request_file" \
              "${OUTLOOK_EMAIL_BASE_URL%/}/api/external/outlook/import-authorize" || true)
            if HTTP_CODE="$http_code" RETRY="$retry" RESPONSE_FILE="$response_file" python3 - <<'PY'
          import json, os
          from pathlib import Path
          try:
              row = json.loads(Path(os.environ['RESPONSE_FILE']).read_text(encoding='utf-8'))
          except Exception:
              row = {}
          http_code = os.environ.get('HTTP_CODE', '')
          ok = http_code.isdigit() and 200 <= int(http_code) < 300 and row.get('success') is True
          allowed_error_codes = {
              'input_invalid', 'oauth_failed', 'token_validation_failed',
              'imap_probe_failed', 'graph_probe_failed', 'platform_config_error',
          }
          error_code = str(row.get('error_code') or '')
          if error_code not in allowed_error_codes:
              error_code = None
          safe = {
              'attempted': True,
              'success': ok,
              'http_code': http_code,
              'retry': int(os.environ.get('RETRY', '0')),
              'account_id': row.get('account_id') if ok else None,
              'created': row.get('created') if ok else None,
              'error_code': error_code if not ok else None,
          }
          Path('Results/diagnostics/outlook_email_ingest.json').write_text(
              json.dumps(safe, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          raise SystemExit(0 if ok else 1)
          PY
            then
              success=true
              break
            fi
            case "$http_code" in
              000|404|408|425|429|5??) ;;
              *) break ;;
            esac
            if [ "$retry" -lt 5 ]; then sleep 25; fi
          done
          echo "outlookEmail integration attempted success=$success"
          exit 0

      - name: Build redacted machine-readable verdict
        if: ${{ always() }}
        shell: bash
        env:
          ATTEMPT: ${{ matrix.attempt }}
          VARIANT: ${{ inputs.variant }}
          NETWORK_MODE: ${{ inputs.network_mode }}
          RUNNER_LABEL: ${{ inputs.runner }}
          PER_IP_MAX_REGISTRATIONS: ${{ inputs.per_ip_max_registrations }}
          PROBE_EXIT_CODE: ${{ steps.live.outputs.exit_code }}
        run: |
          set +e
          mkdir -p public-safe-verdict
          latest=$(ls -t Results/network/*.jsonl 2>/dev/null | head -n1 || true)
          if [ -n "$latest" ] && [ -f classify_protocol_run.py ]; then
            . .venv/bin/activate 2>/dev/null || true
            python classify_protocol_run.py "$latest" > /tmp/private_classification.json 2>/dev/null || true
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load_json(path):
              try:
                  return json.loads(Path(path).read_text(encoding="utf-8"))
              except Exception:
                  return {}

          row = load_json("/tmp/private_classification.json")
          ingest = load_json("Results/diagnostics/outlook_email_ingest.json")
          skipped = Path("Results/diagnostics/egress_skip.txt").exists()
          timed_out = Path("Results/diagnostics/probe_timeout.txt").exists()
          fresh_absolute_timed_out = Path(
              "Results/diagnostics/fresh_rechallenge_absolute_timeout.jsonl"
          ).exists()
          fresh_idle_timed_out = Path(
              "Results/diagnostics/fresh_rechallenge_idle_timeout.jsonl"
          ).exists()

          result_values = []
          for key in ("network_collector_results", "route_collector_results", "route_merged_results"):
              value = row.get(key) or []
              if isinstance(value, list):
                  result_values.extend(str(item) for item in value)
          accepted_result0 = any(item == "0" or item.endswith("|0") for item in result_values)
          post_success_rechallenge = bool(row.get("risk_verify_post_success_challenge"))
          # Historical GA baseline classifiers predate the create_200 field,
          # but emit create_account_200 only after strict response-body checks
          # (HTTP 200 plus non-empty signinName and slt). Keep compatibility
          # without weakening the newer classifier.
          strict_success = row.get("verdict") == "create_account_200"
          explicit_riskblock = bool(row.get("riskblock"))
          # A successful CreateAccount response only establishes that the
          # mailbox was created.  It does not establish that Microsoft will
          # issue a usable OAuth/Graph token afterwards (service-abuse mode is
          # the concrete counterexample).  Keep the protocol verdict intact
          # for experiment comparability, but expose the post-create account
          # lifecycle separately so dashboards and batch counts cannot equate
          # "strict_success" with a usable mailbox.
          graph_import_attempted = bool(ingest.get("attempted"))
          graph_import_ok = ingest.get("success") is True
          graph_import_error = str(ingest.get("error_code") or "")
          allowed_ingest_errors = {
              "input_invalid", "oauth_failed", "token_validation_failed",
              "imap_probe_failed", "graph_probe_failed", "platform_config_error",
          }
          if graph_import_error not in allowed_ingest_errors:
              graph_import_error = None
          if not strict_success:
              account_lifecycle = "not_created"
          elif graph_import_ok:
              account_lifecycle = "graph_healthy"
          elif graph_import_attempted:
              account_lifecycle = "created_graph_unhealthy"
          else:
              account_lifecycle = "created_graph_unverified"
          multi_probe_slot = (
              os.environ.get("VARIANT", "").startswith("paired_")
              or os.environ.get("PER_IP_MAX_REGISTRATIONS", "1") != "1"
          )

          # Classification is intentionally based on decisive facts rather than
          # only `verdict`: the private classifier currently gives LIVE_TIMEOUT
          # precedence over a collector result|0 followed by a risk rechallenge.
          if multi_probe_slot:
              category = "technical_failure"
              reason = "multi_probe_slot_requires_per_probe_verdicts"
          elif strict_success:
              category = "strict_success"
              reason = "strict_create_account_body"
          elif skipped:
              category = "ip_skipped"
              reason = "egress_denylist"
          elif accepted_result0 and explicit_riskblock:
              category = "technical_pass_ip_blocked"
              reason = "collector_result0_then_explicit_riskblock"
          elif explicit_riskblock:
              category = "ip_riskblock"
              reason = "explicit_riskblock"
          elif accepted_result0 and fresh_absolute_timed_out:
              category = "technical_failure"
              reason = "collector_result0_then_fresh_absolute_timeout"
          elif fresh_absolute_timed_out:
              category = "technical_failure"
              reason = "fresh_absolute_timeout_before_accepted_checkpoint"
          elif accepted_result0 and fresh_idle_timed_out:
              category = "technical_failure"
              reason = "collector_result0_then_fresh_idle_timeout"
          elif fresh_idle_timed_out:
              category = "technical_failure"
              reason = "fresh_idle_timeout_before_accepted_checkpoint"
          elif accepted_result0 and post_success_rechallenge:
              # A repeated challenge is not evidence of an IP block. Keep it
              # visible as a post-proof technical outcome instead of turning a
              # collector result|0 into an inferred IP diagnosis.
              category = "post_proof_rechallenge"
              reason = "collector_result0_then_rechallenge_without_riskblock"
          else:
              category = "technical_failure"
              if not row:
                  reason = "missing_classification"
              elif accepted_result0 and timed_out:
                  reason = "collector_result0_then_live_timeout_without_riskblock"
              elif timed_out:
                  reason = "probe_timeout_before_accepted_checkpoint"
              else:
                  reason = str(row.get("verdict") or "unclassified_failure")

          # Keep this artifact public-safe: no IP, email, account fields, URLs,
          # filenames, proxy names, raw errors, request bodies, or log excerpts.
          safe = {
              "schema": 1,
              "attempt": os.environ.get("ATTEMPT", ""),
              "variant": os.environ.get("VARIANT", ""),
              "network_mode": os.environ.get("NETWORK_MODE", ""),
              "runner": os.environ.get("RUNNER_LABEL", ""),
              "probe_exit_code": os.environ.get("PROBE_EXIT_CODE", ""),
              "category": category,
              "reason": reason,
              "strict_success": strict_success,
              "account_lifecycle": account_lifecycle,
              "graph_import_attempted": graph_import_attempted,
              "graph_import_ok": graph_import_ok,
              "graph_import_error_code": graph_import_error,
              "explicit_riskblock": explicit_riskblock,
              "accepted_result0": accepted_result0,
              "post_success_rechallenge": post_success_rechallenge,
              "fresh_rechallenge_absolute_timed_out": fresh_absolute_timed_out,
              "fresh_rechallenge_idle_timed_out": fresh_idle_timed_out,
              "human_loaded": int(row.get("human_loaded") or 0),
              "human_success": int(row.get("human_success") or 0),
              "create_request": bool(row.get("create_request")),
              "probe_timed_out": timed_out,
          }
          out = Path("public-safe-verdict") / f"verdict-{safe['attempt']}.json"
          out.write_text(json.dumps(safe, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(safe, ensure_ascii=False))
          PY

      - name: Upload redacted verdict artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ga-safe-verdict-${{ github.run_id }}-${{ matrix.attempt }}
          path: public-safe-verdict/*.json
          if-no-files-found: error
          retention-days: 14

      - name: Encrypt evidence before public artifact upload
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${RESULTS_ENCRYPTION_CERT_B64:-}"
          mkdir -p public-artifacts .public-encryption
          printf '%s' "$RESULTS_ENCRYPTION_CERT_B64" | base64 -d > .public-encryption/results_public_cert.pem
          tar -C Results -czf .public-encryption/results.tar.gz .
          openssl cms -encrypt -binary -aes-256-cbc \
            -in .public-encryption/results.tar.gz \
            -out public-artifacts/evidence-${{ github.run_id }}-${{ matrix.attempt }}.cms \
            -outform DER \
            .public-encryption/results_public_cert.pem
          rm -rf .public-encryption

      - name: Upload encrypted evidence artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ga-encrypted-${{ inputs.variant }}-${{ github.run_id }}-${{ matrix.attempt }}
          path: public-artifacts/*.cms
          if-no-files-found: error
          retention-days: 3

      - name: Enforce no non-IP technical failure for exact release variants
        if: ${{ always() && startsWith(inputs.variant, 'release_5s_success_') }}
        shell: bash
        run: |
          set -euo pipefail
          verdict=$(ls -t public-safe-verdict/verdict-*.json 2>/dev/null | head -n1 || true)
          if [ -z "$verdict" ]; then
            echo "technical failure: no public-safe verdict"
            exit 1
          fi
          VERDICT_PATH="$verdict" python - <<'PY'
          import json
          import os
          from pathlib import Path
          row = json.loads(Path(os.environ['VERDICT_PATH']).read_text(encoding='utf-8'))
          category = str(row.get('category') or '')
          acceptable = category in {
              'strict_success',
              'technical_pass_ip_blocked',
              'ip_riskblock',
              'ip_skipped',
          }
          print(json.dumps({
              'category': category,
              'reason': row.get('reason'),
              'strict_success': row.get('strict_success'),
              'accepted_result0': row.get('accepted_result0'),
              'explicit_riskblock': row.get('explicit_riskblock'),
              'acceptable_for_non_ip_goal': acceptable,
          }, ensure_ascii=False))
          raise SystemExit(0 if acceptable else 1)
          PY

  summarize:
    if: ${{ always() }}
    needs: own-ip-probe
    runs-on: ubuntu-22.04
    steps:
      - name: Download redacted slot verdicts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: ga-safe-verdict-${{ github.run_id }}-*
          path: safe-verdicts
          merge-multiple: true

      - name: Evaluate non-IP path goal
        shell: bash
        env:
          EXPECTED_SLOTS_JSON: ${{ inputs.node_slots_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from collections import Counter
          from pathlib import Path

          try:
              expected = len(json.loads(os.environ["EXPECTED_SLOTS_JSON"]))
          except Exception:
              expected = 0

          rows = []
          for path in sorted(Path("safe-verdicts").glob("verdict-*.json")):
              try:
                  rows.append(json.loads(path.read_text(encoding="utf-8")))
              except Exception:
                  pass

          counts = Counter(str(row.get("category") or "missing") for row in rows)
          missing = max(0, expected - len(rows))
          post_proof_rechallenge = counts["post_proof_rechallenge"]
          technical = (
              counts["technical_failure"]
              + post_proof_rechallenge
              + counts["missing"]
              + missing
          )
          strict = counts["strict_success"]
          technical_pass_ip_blocked = counts["technical_pass_ip_blocked"]
          checkpoint = strict + technical_pass_ip_blocked
          ip_limited = counts["ip_riskblock"] + counts["ip_skipped"] + technical_pass_ip_blocked

          if technical:
              conclusion = "technical_failure"
              goal_met = False
          elif checkpoint:
              # At least one slot proved the non-IP path through collector
              # result|0 (or strict CreateAccount), and every other slot was
              # either equally successful or stopped by an explicit IP gate.
              conclusion = "strict_success" if strict else "technical_pass_ip_blocked"
              goal_met = True
          else:
              conclusion = "inconclusive_ip_only"
              goal_met = False

          summary = {
              "expected_slots": expected,
              "received_verdicts": len(rows),
              "strict_success": strict,
              "ip_limited": ip_limited,
              "technical_pass_ip_blocked": technical_pass_ip_blocked,
              "post_proof_rechallenge": post_proof_rechallenge,
              "technical_failure": technical,
              "decisive_non_ip_checkpoint": checkpoint,
              "goal_met": goal_met,
              "conclusion": conclusion,
          }
          print(json.dumps(summary, ensure_ascii=False, indent=2))

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write("## GA non-IP path verdict\n\n")
                  fh.write("```json\n")
                  fh.write(json.dumps(summary, ensure_ascii=False, indent=2))
                  fh.write("\n```\n")
                  fh.write("\ntechnical_pass_ip_blocked requires an explicit riskBlock after collector result|0. A rechallenge or live timeout without explicit riskBlock is not classified as an IP problem.\n")

          # Do not report a green workflow when every IP was blocked before a
          # decisive checkpoint, or when any non-IP technical failure remains.
          sys.exit(0 if goal_met else 1)
          PY

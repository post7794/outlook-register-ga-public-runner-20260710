          latest=$(ls -t Results/network/*.jsonl 2>/dev/null | head -n1 || true)
          if [ -n "$latest" ] && [ -f classify_protocol_run.py ]; then
            . .venv/bin/activate 2>/dev/null || true
            python classify_protocol_run.py "$latest" > /tmp/private_classification.json 2>/dev/null || true
          fi
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          def load_json(path):
              try:
                  return json.loads(Path(path).read_text(encoding="utf-8"))
              except Exception:
                  return {}

          row = load_json("/tmp/private_classification.json")
          ingest = load_json("Results/diagnostics/outlook_email_ingest.json")
          ads_fetch = load_json("Results/diagnostics/ads_online_fetch.json")
          session_restart = load_json("Results/diagnostics/fresh_session_restart.json")
          warmup = load_json("Results/diagnostics/pre_first_hold_warmup.json")
          signup_country = load_json("Results/diagnostics/signup_country_policy.json")
          signup_dob = load_json("Results/diagnostics/signup_dob_policy.json")

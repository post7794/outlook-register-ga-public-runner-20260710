name: CTF GA automatic service-abuse recovery (public runner)

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Whole fresh-runner timeout"
        required: true
        default: "30"
      lease_ttl_seconds:
        description: "Coordinator lease TTL; must cover browser recovery and writeback"
        required: true
        default: "1500"
      max_candidates:
        description: "Oldest quarantined service-abuse accounts offered to the coordinator"
        required: true
        default: "500"
      job_slots_json:
        description: "Bounded fresh-runner slots; use [1] normally or [1..20] for a batch"
        required: true
        default: "[1]"
      recovery_network_mode:
        description: "Microsoft transport: direct GA runner egress or isolated curated proxy pool"
        required: true
        default: "ga_own_ip"
      proxy_pool_slot_offset:
        description: "Zero-based curated proxy-pool wave offset (0-1000)"
        required: true
        default: "0"
      recovery_human_mode:
        description: "HumanCaptcha execution path: natural10 production control or exact5s historical recovery path"
        required: true
        default: "natural10"
      exact5s_release_mode:
        description: "Exact5s release backend: historical cdp_up control or paired page_up treatment"
        required: true
        default: "cdp_up"
      exact5s_move_steps:
        description: "Exact5s dense pressed-move count (1-24); 24 is the historical control"
        required: true
        default: "24"
      exact5s_hold_attempts:
        description: "Maximum physical holds per rendered exact5s challenge (1-2)"
        required: true
        default: "1"
      exact5s_final_xghm_target:
        description: "Experimental final XGhm target; 0 preserves live values"
        required: true
        default: "0"
      exact5s_final_xghm_start_index:
        description: "Zero-based exact5s final index where the XGhm target begins (0-7)"
        required: true
        default: "1"
      natural_final_proof_mode:
        description: "Natural-hold final PX561 treatment: minimal, ads_safe, or off control"
        required: true
        default: "minimal"
      natural_w0_bridge:
        description: "Exercise the verified neutral-final to W0 bridge while keeping a natural 10s hold"
        required: true
        default: "false"
      natural_force_w0_after_minus1:
        description: "Experimental: force synthetic W0 result0 after a live final result-1 to reach another bounded host challenge"
        required: true
        default: "false"
      natural_server_challenge_rounds:
        description: "Maximum fresh Microsoft HumanCaptcha rounds after accepted result|0 (1-8)"
        required: true
        default: "1"
      recovery_source_ref:
        description: "Pinned private recovery-control source commit"
        required: true
        default: "042d934e8fcf01070adbde875220af110bc8f1b3"
      egress_prefix_denylist:
        description: "Known-bad GA egress prefixes skipped before an account lease is acquired"
        required: false
        default: "4.,13.,20.,40.,52.,68.,74.249."
  schedule:
    - cron: "7,22,37,52 * * * *"

concurrency:
  group: service-abuse-auto-recovery
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recover:
    name: recover (${{ matrix.slot }})
    if: github.event_name == 'workflow_dispatch' || vars.SERVICE_ABUSE_AUTO_ENABLED == 'true'
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        slot: ${{ fromJSON(inputs.job_slots_json || '[1]') }}
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes || '30') }}
    env:
      PYTHONIOENCODING: utf-8
      CLOAKBROWSER_SUPPRESS_FONT_WARNING: "1"
      GA_COORDINATOR_URL: ${{ vars.GA_COORDINATOR_URL }}
      GA_COORDINATOR_TOKEN: ${{ secrets.GA_COORDINATOR_TOKEN }}
      SERVICE_ABUSE_EXPERIMENT_KEY: ${{ secrets.SERVICE_ABUSE_EXPERIMENT_KEY }}
      RECOVERY_SLOT: ${{ matrix.slot }}
      RECOVERY_NETWORK_MODE: ${{ inputs.recovery_network_mode || 'ga_own_ip' }}
      PROXY_POOL_SLOT_OFFSET: ${{ inputs.proxy_pool_slot_offset || '0' }}
      RECOVERY_HUMAN_MODE: ${{ inputs.recovery_human_mode || 'natural10' }}
      HUMAN_RUNTIME_REF: ${{ (inputs.recovery_human_mode || 'natural10') == 'exact5s' && '00b68437e041cbdcee2be209a18d7a5592f4c2dd' || '875b0571d5b9c88b89a5bbc64f30488ee9565962' }}
      EXACT5S_RELEASE_MODE: ${{ inputs.exact5s_release_mode || 'cdp_up' }}
      EXACT5S_MOVE_STEPS: ${{ inputs.exact5s_move_steps || '24' }}
      EXACT5S_HOLD_ATTEMPTS: ${{ inputs.exact5s_hold_attempts || '1' }}
      EXACT5S_FINAL_XGHM_TARGET: ${{ inputs.exact5s_final_xghm_target || '0' }}
      EXACT5S_FINAL_XGHM_START_INDEX: ${{ inputs.exact5s_final_xghm_start_index || '1' }}
      NATURAL_FINAL_PROOF_MODE: ${{ inputs.natural_final_proof_mode || 'minimal' }}
      NATURAL_W0_BRIDGE: ${{ inputs.natural_w0_bridge || 'false' }}
      NATURAL_FORCE_W0_AFTER_MINUS1: ${{ inputs.natural_force_w0_after_minus1 || 'false' }}
      NATURAL_SERVER_CHALLENGE_ROUNDS: ${{ inputs.natural_server_challenge_rounds || '1' }}
    steps:
      - name: Reject GitHub UI re-runs
        if: github.run_attempt != 1
        shell: bash
        run: |
          echo "Automatic recovery runs may not be re-run; dispatch a fresh runner instead." >&2
          exit 1

      - name: Validate bounded recovery matrix
        shell: bash
        env:
          JOB_SLOTS_JSON: ${{ inputs.job_slots_json || '[1]' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          slots = json.loads(os.environ["JOB_SLOTS_JSON"])
          current = int(os.environ["RECOVERY_SLOT"])
          valid = (
              isinstance(slots, list)
              and 1 <= len(slots) <= 20
              and all(type(item) is int and 1 <= item <= 20 for item in slots)
              and len(set(slots)) == len(slots)
              and current in slots
          )
          if not valid:
              raise SystemExit("job_slots_json must contain 1-20 unique integer slots in range 1..20")
          network_mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          if network_mode not in {"ga_own_ip", "proxy_pool"}:
              raise SystemExit("recovery_network_mode must be ga_own_ip or proxy_pool")
          proxy_offset = int(os.environ.get("PROXY_POOL_SLOT_OFFSET", "-1"))
          if not 0 <= proxy_offset <= 1000:
              raise SystemExit("proxy_pool_slot_offset must be in range 0..1000")
          human_mode = os.environ.get("RECOVERY_HUMAN_MODE", "")
          if human_mode not in {"natural10", "exact5s"}:
              raise SystemExit("recovery_human_mode must be natural10 or exact5s")
          release_mode = os.environ.get("EXACT5S_RELEASE_MODE", "")
          if release_mode not in {"cdp_up", "page_up"}:
              raise SystemExit("exact5s_release_mode must be cdp_up or page_up")
          move_steps = int(os.environ.get("EXACT5S_MOVE_STEPS", "0"))
          if not 1 <= move_steps <= 24:
              raise SystemExit("exact5s_move_steps must be in range 1..24")
          hold_attempts = int(os.environ.get("EXACT5S_HOLD_ATTEMPTS", "0"))
          if not 1 <= hold_attempts <= 2:
              raise SystemExit("exact5s_hold_attempts must be in range 1..2")
          xghm_target = float(os.environ.get("EXACT5S_FINAL_XGHM_TARGET", "-1"))
          if not 0 <= xghm_target <= 1000:
              raise SystemExit("exact5s_final_xghm_target must be in range 0..1000")
          xghm_start = int(os.environ.get("EXACT5S_FINAL_XGHM_START_INDEX", "-1"))
          if not 0 <= xghm_start <= 7:
              raise SystemExit("exact5s_final_xghm_start_index must be in range 0..7")
          mode = os.environ.get("NATURAL_FINAL_PROOF_MODE", "")
          if mode not in {"minimal", "ads_safe", "off"}:
              raise SystemExit("natural_final_proof_mode must be minimal, ads_safe, or off")
          bridge = os.environ.get("NATURAL_W0_BRIDGE", "")
          if bridge not in {"true", "false"}:
              raise SystemExit("natural_w0_bridge must be true or false")
          force_minus1 = os.environ.get("NATURAL_FORCE_W0_AFTER_MINUS1", "")
          if force_minus1 not in {"true", "false"}:
              raise SystemExit("natural_force_w0_after_minus1 must be true or false")
          rounds = int(os.environ.get("NATURAL_SERVER_CHALLENGE_ROUNDS", "0"))
          if not 1 <= rounds <= 8:
              raise SystemExit("natural_server_challenge_rounds must be in range 1..8")
          if human_mode == "exact5s" and (mode != "ads_safe" or bridge != "true"):
              raise SystemExit(
                  "exact5s requires natural_final_proof_mode=ads_safe and natural_w0_bridge=true"
              )
          if force_minus1 == "true" and rounds < 2:
              raise SystemExit("natural_force_w0_after_minus1 requires at least 2 rounds")
          if human_mode == "natural10" and force_minus1 == "true" and bridge != "true":
              raise SystemExit(
                  "natural10 force-W0 requires natural_w0_bridge=true"
              )
          print(f"recovery matrix slot={current} count={len(slots)}")
          print(f"recovery network mode={network_mode}")
          print(f"proxy pool slot offset={proxy_offset}")
          print(f"recovery human mode={human_mode}")
          print(f"exact5s release mode={release_mode}")
          print(f"exact5s move steps={move_steps}")
          print(f"exact5s hold attempts={hold_attempts}")
          print(f"exact5s final XGhm target={xghm_target}")
          print(f"exact5s final XGhm start index={xghm_start}")
          print(f"natural final proof mode={mode}")
          print(f"natural W0 bridge={bridge}")
          print(f"natural force W0 after minus1={force_minus1}")
          print(f"natural server challenge rounds={rounds}")
          PY

      - name: Checkout private recovery control plane
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ inputs.recovery_source_ref || '042d934e8fcf01070adbde875220af110bc8f1b3' }}
          ssh-key: ${{ secrets.PRIVATE_SOURCE_DEPLOY_KEY }}
          persist-credentials: false

      - name: Capture runner egress gate
        id: runner_egress
        shell: bash
        env:
          EGRESS_PREFIX_DENYLIST: ${{ inputs.egress_prefix_denylist || '4.,13.,20.,40.,52.,68.,74.249.' }}
        run: |
          set -euo pipefail
          ip=$(curl -fsS --max-time 10 https://api.ipify.org || true)
          IP="$ip" python3 - <<'PY'
          import hashlib, json, os

          ip = os.environ.get("IP", "").strip()
          network_mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          deny = [item.strip() for item in os.environ.get("EGRESS_PREFIX_DENYLIST", "").split(",") if item.strip()]
          present = bool(ip)
          direct_admitted = present and not any(ip.startswith(prefix) for prefix in deny)
          prepare = network_mode == "proxy_pool" or direct_admitted
          sha16 = hashlib.sha256(ip.encode()).hexdigest()[:16] if present else "unknown"
          if ip.count(".") == 3:
              parts = ip.split(".")
              prefix = f"{parts[0]}.{parts[1]}."
          else:
              prefix = "unknown"
          if network_mode == "proxy_pool":
              reason = "proxy_setup_pending"
          elif direct_admitted:
              reason = "direct_egress_admitted"
          elif present:
              reason = "direct_egress_denylist"
          else:
              reason = "direct_egress_unavailable"
          safe = {
              "network_mode": network_mode,
              "public_ip_present": present,
              "prepare": prepare,
              "runner_egress_sha16": sha16,
              "runner_egress_prefix": prefix,
              "reason": reason,
          }
          path = os.path.join(os.environ["RUNNER_TEMP"], "runner-egress-safe.json")
          with open(path, "w", encoding="utf-8") as fh:
              json.dump(safe, fh, ensure_ascii=False, indent=2)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key in ("prepare", "runner_egress_sha16", "runner_egress_prefix", "reason"):
                  value = safe[key]
                  if isinstance(value, bool):
                      value = str(value).lower()
                  fh.write(f"{key}={value}\n")
          print(json.dumps(safe, ensure_ascii=False))
          PY

      - name: Record skipped runner egress
        if: steps.runner_egress.outputs.prepare != 'true'
        shell: bash
        run: |
          echo "Runner egress was skipped before environment setup: ${{ steps.runner_egress.outputs.reason }}"

      - name: Checkout admitted HumanCaptcha runtime
        if: steps.runner_egress.outputs.prepare == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ (inputs.recovery_human_mode || 'natural10') == 'exact5s' && '00b68437e041cbdcee2be209a18d7a5592f4c2dd' || '875b0571d5b9c88b89a5bbc64f30488ee9565962' }}
          path: .production-human-runtime
          ssh-key: ${{ secrets.PRIVATE_SOURCE_DEPLOY_KEY }}
          persist-credentials: false

      - name: System dependencies
        if: steps.runner_egress.outputs.prepare == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xauth ca-certificates fontconfig \
            fonts-liberation fonts-noto fonts-noto-cjk \
            fonts-crosextra-carlito fonts-crosextra-caladea
          sudo apt-get install -y --no-install-recommends fonts-selawik || true
          sudo add-apt-repository -y multiverse || true
          sudo apt-get update || true
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" \
            | sudo debconf-set-selections || true
          sudo apt-get install -y --no-install-recommends ttf-mscorefonts-installer || true
          fc-cache -f

      - name: Python environment
        if: steps.runner_egress.outputs.prepare == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          set +e
          python -m cloakbrowser install
          cb_code=$?
          set -e
          if [ "$cb_code" -ne 0 ]; then
            test -x "$(ls -1d "$HOME"/.cloakbrowser/chromium-*/chrome 2>/dev/null | tail -1)"
          fi

      - name: Install registration-compatible Windows font aliases
        if: steps.runner_egress.outputs.prepare == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          . .venv/bin/activate
          python - <<'PY'
          from fontTools.ttLib import TTFont
          from pathlib import Path

          out = Path.home() / ".local/share/fonts/windows-ctf"
          out.mkdir(parents=True, exist_ok=True)

          def pick(*paths):
              return next((Path(path) for path in paths if Path(path).exists()), None)

          default_src = pick(
              "/usr/share/fonts/truetype/liberation2/LiberationSans-Regular.ttf",
              "/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf",
              "/usr/share/fonts/truetype/msttcorefonts/Arial.ttf",
              "/usr/share/fonts/truetype/crosextra/Carlito-Regular.ttf",
          )
          selawik_src = pick(
              "/usr/share/fonts/truetype/selawik/Selawik.ttf",
              "/usr/share/fonts/truetype/selawik/Selawik-Regular.ttf",
          ) or default_src
          calibri_src = pick(
              "/usr/share/fonts/truetype/crosextra/Carlito-Regular.ttf",
              "/usr/share/fonts/truetype/msttcorefonts/Arial.ttf",
          ) or default_src
          msgothic_src = pick(
              "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc",
              "/usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc",
          ) or default_src
          if not default_src:
              raise SystemExit("no base font found")

          def set_name(font, name_id, value):
              font["name"].setName(value, name_id, 3, 1, 0x409)
              font["name"].setName(value, name_id, 1, 0, 0)

          families = [
              ("Segoe UI", "Regular", selawik_src),
              ("Segoe UI Light", "Regular", selawik_src),
              ("Calibri", "Regular", calibri_src),
              ("Cambria", "Regular", pick("/usr/share/fonts/truetype/crosextra/Caladea-Regular.ttf") or calibri_src),
              ("Marlett", "Regular", default_src),
              ("MS UI Gothic", "Regular", msgothic_src),
              ("Franklin Gothic", "Regular", default_src),
          ]
          for family, subfamily, src in families:
              try:
                  font = TTFont(str(src))
              except Exception as exc:
                  if exc.__class__.__name__ == "TTLibFileIsCollectionError":
                      font = TTFont(str(src), fontNumber=0)
                  else:
                      raise
              set_name(font, 1, family)
              set_name(font, 2, subfamily)
              set_name(font, 16, family)
              set_name(font, 17, subfamily)
              ps = family.replace(" ", "") + "-" + subfamily.replace(" ", "")
              set_name(font, 6, ps)
              font.save(str(out / f"{ps}.ttf"))
          PY
          fc-cache -f "$HOME/.local/share/fonts"

      - name: Start isolated recovery proxy
        if: steps.runner_egress.outputs.prepare == 'true' && env.RECOVERY_NETWORK_MODE == 'proxy_pool'
        shell: bash
        env:
          PROXY_POOL_GZIP_B64: ${{ secrets.CTF_PROXY_POOL_GZIP_B64 }}
        run: |
          set -euo pipefail
          test -n "${PROXY_POOL_GZIP_B64:-}"
          mkdir -p "$RUNNER_TEMP/service-abuse-proxy" .mihomo-ga
          python3 - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          encoded = os.environ.get("PROXY_POOL_GZIP_B64", "").strip()
          raw = gzip.decompress(base64.b64decode(encoded, validate=True))
          if not raw or len(raw) > 2_000_000:
              raise SystemExit("invalid compressed proxy pool")
          path = Path(os.environ["RUNNER_TEMP"]) / "service-abuse-proxy" / "pool.yaml"
          path.write_bytes(raw)
          PY
          proxy_node_slot=$((PROXY_POOL_SLOT_OFFSET + RECOVERY_SLOT))
          if ! .venv/bin/python tools/setup_ga_subscription_proxy.py \
            --config "$RUNNER_TEMP/service-abuse-proxy/pool.yaml" \
            --node-slot "$proxy_node_slot" \
            --out-dir .mihomo-ga \
            --http-port 17890 \
            --socks-port 17891 \
            --controller-port 19090 \
            >"$RUNNER_TEMP/service-abuse-proxy/setup.private.log" 2>&1; then
            echo "Proxy pool setup failed before account selection" >&2
            exit 1
          fi
          asset_url="https://github.com/MetaCubeX/mihomo/releases/download/v1.19.28/mihomo-linux-amd64-v1-v1.19.28.gz"
          curl -fsSL "$asset_url" -o .mihomo-ga/mihomo.gz
          gzip -dc .mihomo-ga/mihomo.gz > .mihomo-ga/mihomo
          chmod +x .mihomo-ga/mihomo
          nohup .mihomo-ga/mihomo -d .mihomo-ga -f .mihomo-ga/config.yaml \
            >"$RUNNER_TEMP/service-abuse-proxy/mihomo.private.log" 2>&1 &
          echo "$!" > .mihomo-ga/mihomo.pid
          for _ in $(seq 1 20); do
            if curl -fsS --max-time 2 http://127.0.0.1:19090/version >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS --max-time 2 http://127.0.0.1:19090/version >/dev/null
          echo "OUTLOOK_PROXY_URL=http://127.0.0.1:17890" >> "$GITHUB_ENV"
          echo "Isolated proxy process is ready for effective-egress checks"

      - name: Admit effective Microsoft egress
        id: egress
        if: steps.runner_egress.outputs.prepare == 'true'
        shell: bash
        env:
          EGRESS_PREFIX_DENYLIST: ${{ inputs.egress_prefix_denylist || '4.,13.,20.,40.,52.,68.,74.249.' }}
        run: |
          set -euo pipefail
          proxy_args=()
          if [ "$RECOVERY_NETWORK_MODE" = "proxy_pool" ]; then
            test -n "${OUTLOOK_PROXY_URL:-}"
            proxy_args=(--proxy "$OUTLOOK_PROXY_URL")
          fi
          ip1=$(curl -fsS --max-time 15 "${proxy_args[@]}" https://api.ipify.org 2>/dev/null || true)
          sleep 1
          ip2=$(curl -fsS --max-time 15 "${proxy_args[@]}" https://api.ipify.org 2>/dev/null || true)
          login_http=""
          token_http=""
          graph_http=""
          if [ "$RECOVERY_NETWORK_MODE" = "proxy_pool" ]; then
            login_http=$(curl -sS -L --max-time 20 "${proxy_args[@]}" -o /dev/null -w '%{http_code}' \
              https://login.live.com/ 2>/dev/null || true)
            token_http=$(curl -sS --max-time 20 "${proxy_args[@]}" -o /dev/null -w '%{http_code}' \
              -X POST --data 'grant_type=client_credentials' \
              https://login.microsoftonline.com/common/oauth2/v2.0/token 2>/dev/null || true)
            graph_http=$(curl -sS --max-time 20 "${proxy_args[@]}" -o /dev/null -w '%{http_code}' \
              'https://graph.microsoft.com/v1.0/$metadata' 2>/dev/null || true)
          fi
          IP1="$ip1" IP2="$ip2" LOGIN_HTTP="$login_http" TOKEN_HTTP="$token_http" GRAPH_HTTP="$graph_http" python3 - <<'PY'
          import hashlib, json, os

          mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          ip1 = os.environ.get("IP1", "").strip()
          ip2 = os.environ.get("IP2", "").strip()
          deny = [item.strip() for item in os.environ.get("EGRESS_PREFIX_DENYLIST", "").split(",") if item.strip()]
          present = bool(ip1)
          stable = present and ip1 == ip2
          denied = present and any(ip1.startswith(prefix) for prefix in deny)
          login_http = int(os.environ.get("LOGIN_HTTP") or 0) or None
          token_http = int(os.environ.get("TOKEN_HTTP") or 0) or None
          graph_http = int(os.environ.get("GRAPH_HTTP") or 0) or None
          transport_ok = mode != "proxy_pool" or (
              login_http is not None
              and 200 <= login_http < 400
              and token_http == 400
              and graph_http == 200
          )
          admitted = stable and not denied and transport_ok
          sha16 = hashlib.sha256(ip1.encode()).hexdigest()[:16] if present else "unknown"
          if ip1.count(".") == 3:
              parts = ip1.split(".")
              prefix = f"{parts[0]}.{parts[1]}."
          else:
              prefix = "unknown"
          if admitted:
              reason = "effective_egress_admitted"
          elif not present:
              reason = "effective_egress_unavailable"
          elif not stable:
              reason = "effective_egress_unstable"
          elif denied:
              reason = "effective_egress_denylist"
          else:
              reason = "microsoft_transport_rejected"
          safe = {
              "network_mode": mode,
              "public_ip_present": present,
              "stable_egress": stable,
              "admitted": admitted,
              "egress_sha16": sha16,
              "egress_prefix": prefix,
              "login_http": login_http,
              "token_http": token_http,
              "graph_http": graph_http,
              "reason": reason,
          }
          path = os.path.join(os.environ["RUNNER_TEMP"], "recovery-egress-safe.json")
          with open(path, "w", encoding="utf-8") as fh:
              json.dump(safe, fh, ensure_ascii=False, indent=2)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key in ("admitted", "egress_sha16", "egress_prefix", "reason"):
                  value = safe[key]
                  if isinstance(value, bool):
                      value = str(value).lower()
                  fh.write(f"{key}={value}\n")
          print(json.dumps(safe, ensure_ascii=False))
          PY

      - name: Record rejected effective egress
        if: steps.runner_egress.outputs.prepare == 'true' && steps.egress.outputs.admitted != 'true'
        shell: bash
        run: |
          echo "Effective Microsoft egress was rejected before account selection: ${{ steps.egress.outputs.reason }}"

      - name: Materialize private control configuration
        if: steps.egress.outputs.admitted == 'true'
        id: materialize
        shell: bash
        env:
          SERVICE_ABUSE_BROWSER_ENV_B64: ${{ secrets.SERVICE_ABUSE_BROWSER_ENV_B64 }}
          OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64: ${{ secrets.OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "${SERVICE_ABUSE_BROWSER_ENV_B64:-}"
          test -n "${OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64:-}"
          test -n "${SERVICE_ABUSE_EXPERIMENT_KEY:-}"
          test -n "${GA_COORDINATOR_URL:-}"
          test -n "${GA_COORDINATOR_TOKEN:-}"
          private="$RUNNER_TEMP/service-abuse-auto-private"
          mkdir -p "$private"
          printf '%s' "$SERVICE_ABUSE_BROWSER_ENV_B64" | base64 --decode > "$private/browser-env.json"
          printf '%s' "$OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64" | base64 --decode > "$private/outlook-email.json"
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          private = Path(os.environ["RUNNER_TEMP"]) / "service-abuse-auto-private"
          browser = json.loads(private.joinpath("browser-env.json").read_text(encoding="utf-8"))
          network_mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          if network_mode == "proxy_pool":
              proxy = os.environ.get("OUTLOOK_PROXY_URL", "").strip()
              if proxy != "http://127.0.0.1:17890":
                  raise SystemExit("proxy_pool requires the isolated local proxy")
              browser["proxy"] = proxy
              browser["recovery_network_override"] = {
                  "mode": "proxy_pool",
                  "local_proxy": True,
              }
              private.joinpath("browser-env.json").write_text(
                  json.dumps(browser, ensure_ascii=False, indent=2),
                  encoding="utf-8",
              )
          elif browser.get("proxy"):
              raise SystemExit("ga_own_ip requires a proxy-free browser manifest")
          cloak = browser.get("cloakbrowser") or {}
          context = browser.get("context") or {}
          args = [str(item) for item in (cloak.get("args") or [])]
          valid = (
              sum(item.startswith("--fingerprint=") for item in args) == 1
              and "--fingerprint-platform=windows" in args
              and sum(item.startswith("--window-size=") for item in args) == 1
              and "viewport" in context
              and context["viewport"] is None
              and bool(context.get("locale"))
              and bool(context.get("user_agent"))
              and bool((context.get("extra_http_headers") or {}).get("Accept-Language"))
              and (
                  not bool((browser.get("recovery_provenance") or {}).get("proxy_was_configured"))
                  or bool(browser.get("proxy"))
              )
          )
          if not valid:
              raise SystemExit("Registration environment manifest is incomplete")
          private.joinpath("secret.json").write_text(
              json.dumps({"secret_key": os.environ["SERVICE_ABUSE_EXPERIMENT_KEY"]}),
              encoding="utf-8",
          )
          PY
          chmod 600 "$private"/*.json
          echo "private_dir=$private" >> "$GITHUB_OUTPUT"

      - name: Atomically lease oldest service-abuse account
        if: steps.egress.outputs.admitted == 'true'
        id: acquire
        shell: bash
        env:
          LEASE_TTL_SECONDS: ${{ inputs.lease_ttl_seconds || '1500' }}
          MAX_CANDIDATES: ${{ inputs.max_candidates || '500' }}
        run: |
          set -euo pipefail
          private='${{ steps.materialize.outputs.private_dir }}'
          safe="$RUNNER_TEMP/recovery-lease-safe.json"
          .venv/bin/python -u tools/outlook_email_recovery_coordinator.py acquire \
            --outlook-config "$private/outlook-email.json" \
            --coordinator-url "$GA_COORDINATOR_URL" \
            --request-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${RECOVERY_SLOT}" \
            --run-id "${GITHUB_RUN_ID}-${RECOVERY_SLOT}" \
            --fixture-output "$private/fixture.json" \
            --lease-output "$private/lease.json" \
            --safe-output "$safe" \
            --max-candidates "$MAX_CANDIDATES" \
            --lease-ttl-seconds "$LEASE_TTL_SECONDS"
          SAFE="$safe" python3 - <<'PY'
          import json, os
          row = json.load(open(os.environ["SAFE"], encoding="utf-8"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"leased={str(bool(row.get('leased'))).lower()}\n")
              fh.write(f"account_id={int(row.get('account_id') or 0)}\n")
              fh.write(f"attempt_number={int(row.get('attempt_number') or 0)}\n")
          PY
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Run production recovery on fresh GA runner
        if: steps.acquire.outputs.leased == 'true'
        id: recovery
        continue-on-error: true
        shell: bash
        run: |
          set +e
          private='${{ steps.materialize.outputs.private_dir }}'
          runtime="$GITHUB_WORKSPACE/.production-human-runtime"
          result="$private/recovery-result.json"
          safe="$RUNNER_TEMP/recovery-runtime-safe.json"
          writeback_safe="$RUNNER_TEMP/recovery-writeback-safe.json"
          probe_safe="$RUNNER_TEMP/recovery-probe-safe.log"
          log="$RUNNER_TEMP/recovery-runtime.log"
          err="$RUNNER_TEMP/recovery-runtime.err.log"
          human_mode_args=()
          if [ "$RECOVERY_HUMAN_MODE" = "exact5s" ]; then
            human_mode_args+=(
              --semiprotocol-human
              --semiprotocol-out-dir "$RUNNER_TEMP/service-abuse-auto-semiprotocol"
              --semiprotocol-server-challenge-rounds "$NATURAL_SERVER_CHALLENGE_ROUNDS"
              --semiprotocol-release-mode "$EXACT5S_RELEASE_MODE"
              --semiprotocol-move-steps "$EXACT5S_MOVE_STEPS"
              --semiprotocol-hold-attempts "$EXACT5S_HOLD_ATTEMPTS"
              --semiprotocol-final-xghm-target "$EXACT5S_FINAL_XGHM_TARGET"
              --semiprotocol-final-xghm-start-index "$EXACT5S_FINAL_XGHM_START_INDEX"
            )
          else
            human_mode_args+=(
              --natural-hold-profile registration_10s
              --natural-final-proof-mode "$NATURAL_FINAL_PROOF_MODE"
              --natural-server-challenge-rounds "$NATURAL_SERVER_CHALLENGE_ROUNDS"
            )
          fi
          bridge_args=()
          if [ "$NATURAL_W0_BRIDGE" = "true" ]; then
            bridge_args+=(--natural-w0-bridge)
          fi
          if [ "$NATURAL_FORCE_W0_AFTER_MINUS1" = "true" ]; then
            bridge_args+=(--natural-force-w0-after-minus1)
          fi
          proxy_args=()
          if [ -n "${OUTLOOK_PROXY_URL:-}" ]; then
            proxy_args+=(--network-proxy "$OUTLOOK_PROXY_URL")
          fi
          test "$(git -C "$runtime" rev-parse HEAD)" = "$HUMAN_RUNTIME_REF"
          test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD:protocol_runtime_probe.py)" = 'c634a3939fd159a3c79ac6ee394ee22922d4c24c'
          cp "$GITHUB_WORKSPACE/tools/service_abuse_recovery.py" "$runtime/tools/service_abuse_recovery.py"
          cp "$GITHUB_WORKSPACE/protocol_runtime_probe.py" "$runtime/protocol_runtime_probe.py"
          cd "$runtime"
          timeout --signal=TERM --kill-after=15s 900s \
            xvfb-run -a -s '-screen 0 2560x1440x24' \
            "$GITHUB_WORKSPACE/.venv/bin/python" -u tools/service_abuse_recovery.py \
              --fixture "$private/fixture.json" \
              --secret-file "$private/secret.json" \
              --output "$result" \
              --safe-status-output "$safe" \
              --profile-dir "$RUNNER_TEMP/service-abuse-auto-profile" \
              --browser-config "$private/browser-env.json" \
              --entry-url 'https://outlook.live.com/mail/0/?prompt=select_account' \
              --timeout-seconds 720 \
              --omit-email-output \
              --require-service-abuse-preflight \
              "${human_mode_args[@]}" \
              "${bridge_args[@]}" \
              "${proxy_args[@]}" \
              --parent-retry-max 2 \
              --writeback-outlook-email \
              --outlook-email-config "$private/outlook-email.json" \
              --outlook-email-writeback-safe-output "$writeback_safe" \
              >"$log" 2>"$err"
          code=$?
          set -e
          if [ "$code" -eq 124 ] || [ "$code" -eq 137 ]; then
            if [ ! -s "$safe" ]; then
              SAFE="$safe" python3 - <<'PY'
          import json, os
          from pathlib import Path

          Path(os.environ["SAFE"]).write_text(
              json.dumps({
                  "runner_completed": True,
                  "run_succeeded": False,
                  "result_present": False,
                  "service_abuse_cleared": False,
                  "graph_ok": False,
                  "imap_ok": False,
                  "production_writeback_attempted": False,
                  "production_writeback_ok": False,
                  "production_health_enrolled": False,
                  "error_code": "RECOVERY_PROCESS_WATCHDOG_TIMEOUT",
              }, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY
            fi
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "safe_status=$safe" >> "$GITHUB_OUTPUT"
          echo "writeback_safe=$writeback_safe" >> "$GITHUB_OUTPUT"
          echo "probe_safe=$probe_safe" >> "$GITHUB_OUTPUT"
          LOG="$log" OUT="$probe_safe" python3 - <<'PY' || : > "$probe_safe"
          import os
          import re
          from pathlib import Path
          from urllib.parse import urlsplit, urlunsplit

          source = Path(os.environ["LOG"])
          target = Path(os.environ["OUT"])
          allowed = ("[recovery]", "[Captcha]", "[Probe]")

          def scrub_url(match):
              raw = match.group(0).rstrip("'\"),]}")
              suffix = match.group(0)[len(raw):]
              try:
                  parts = urlsplit(raw)
                  safe = urlunsplit((parts.scheme, parts.netloc, parts.path, "", ""))
              except Exception:
                  safe = "[url-redacted]"
              return safe + suffix

          rows = []
          if source.exists():
              for raw in source.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not raw.startswith(allowed):
                      continue
                  line = re.sub(r"https?://[^\s]+", scrub_url, raw)
                  line = re.sub(r"[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+", "[email-redacted]", line)
                  line = re.sub(r"(?<!\d)(?:\d{1,3}\.){3}\d{1,3}(?!\d)", "[ip-redacted]", line)
                  line = re.sub(
                      r"(?i)\b(token|code|qi|seq|rsc|uuid|endpoint)=([^\s,}\]]+)",
                      lambda m: f"{m.group(1)}=[redacted]",
                      line,
                  )
                  line = re.sub(
                      r'(?i)"(current_qi|last_seq|hintedQi)"\s*:\s*"[^"]*"',
                      lambda m: f'"{m.group(1)}":"[redacted]"',
                      line,
                  )
                  rows.append(line[:1200])
                  if len(rows) >= 300:
                      break
          target.write_text("\n".join(rows) + ("\n" if rows else ""), encoding="utf-8")
          PY
          if [ -f "$probe_safe" ]; then
            head -n 220 "$probe_safe" || true
          fi
          if [ -f "$err" ]; then
            tail -n 40 "$err" || true
          fi
          exit "$code"

      - name: Complete recovery lease and classify retry
        if: always() && steps.acquire.outputs.leased == 'true'
        id: complete
        shell: bash
        run: |
          set -euo pipefail
          private='${{ steps.materialize.outputs.private_dir }}'
          safe_status='${{ steps.recovery.outputs.safe_status }}'
          if [ -z "$safe_status" ]; then
            safe_status="$RUNNER_TEMP/recovery-runtime-safe.json"
          fi
          completion="$RUNNER_TEMP/recovery-completion-safe.json"
          .venv/bin/python -u tools/outlook_email_recovery_coordinator.py complete \
            --outlook-config "$private/outlook-email.json" \
            --coordinator-url "$GA_COORDINATOR_URL" \
            --lease-input "$private/lease.json" \
            --safe-status "$safe_status" \
            --safe-output "$completion"
          echo "safe=$completion" >> "$GITHUB_OUTPUT"

      - name: Build redacted automatic-recovery verdict
        if: always()
        shell: bash
        env:
          EGRESS_ADMITTED: ${{ steps.egress.outputs.admitted }}
          EGRESS_SHA16: ${{ steps.egress.outputs.egress_sha16 }}
          EGRESS_PREFIX: ${{ steps.egress.outputs.egress_prefix }}
          EGRESS_REASON: ${{ steps.egress.outputs.reason }}
          LEASE_SAFE: ${{ steps.acquire.outputs.safe }}
          RUNTIME_SAFE: ${{ steps.recovery.outputs.safe_status }}
          WRITEBACK_SAFE: ${{ steps.recovery.outputs.writeback_safe }}
          COMPLETION_SAFE: ${{ steps.complete.outputs.safe }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          def load(path):
              if not path:
                  return {}
              candidate = Path(path)
              if not candidate.exists():
                  return {}
              try:
                  value = json.loads(candidate.read_text(encoding="utf-8"))
                  return value if isinstance(value, dict) else {}
              except Exception:
                  return {}

          lease = load(os.environ.get("LEASE_SAFE", ""))
          runtime = load(os.environ.get("RUNTIME_SAFE", ""))
          writeback = load(os.environ.get("WRITEBACK_SAFE", ""))
          completion = load(os.environ.get("COMPLETION_SAFE", ""))
          verdict = {
              "schema": 1,
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "slot": int(os.environ.get("RECOVERY_SLOT") or 0),
              "recovery_network_mode": os.environ.get("RECOVERY_NETWORK_MODE") or None,
              "proxy_pool_slot_offset": int(os.environ.get("PROXY_POOL_SLOT_OFFSET") or 0),
              "recovery_human_mode": os.environ.get("RECOVERY_HUMAN_MODE") or None,
              "exact5s_release_mode": os.environ.get("EXACT5S_RELEASE_MODE") or None,
              "exact5s_move_steps": int(os.environ.get("EXACT5S_MOVE_STEPS") or 24),
              "exact5s_hold_attempts": int(os.environ.get("EXACT5S_HOLD_ATTEMPTS") or 1),
              "exact5s_final_xghm_target": float(os.environ.get("EXACT5S_FINAL_XGHM_TARGET") or 0),
              "exact5s_final_xghm_start_index": int(os.environ.get("EXACT5S_FINAL_XGHM_START_INDEX") or 1),
              "natural_final_proof_mode": os.environ.get("NATURAL_FINAL_PROOF_MODE") or None,
              "natural_w0_bridge": os.environ.get("NATURAL_W0_BRIDGE") == "true",
              "natural_force_w0_after_minus1": os.environ.get("NATURAL_FORCE_W0_AFTER_MINUS1") == "true",
              "natural_server_challenge_rounds": int(os.environ.get("NATURAL_SERVER_CHALLENGE_ROUNDS") or 1),
              "runner": "ubuntu-22.04",
              "egress_admitted": os.environ.get("EGRESS_ADMITTED") == "true",
              "egress_sha16": os.environ.get("EGRESS_SHA16") or None,
              "egress_prefix": os.environ.get("EGRESS_PREFIX") or None,
              "egress_reason": os.environ.get("EGRESS_REASON") or None,
              "leased": bool(lease.get("leased")),
              "account_id": int(lease.get("account_id") or 0) or None,
              "attempt_number": int(lease.get("attempt_number") or 0) or None,
              "candidate_count": int(lease.get("candidate_count") or 0),
              "lease_sha12": lease.get("lease_sha12") or None,
              "service_abuse_cleared": bool(runtime.get("service_abuse_cleared")),
              "graph_ok": bool(runtime.get("graph_ok")),
              "production_writeback_ok": bool(runtime.get("production_writeback_ok")),
              "production_health_enrolled": bool(runtime.get("production_health_enrolled")),
              "writeback_post_refresh_token_present": bool(writeback.get("post_refresh_token_present")),
              "outcome": completion.get("outcome") or None,
              "error_code": completion.get("error_code") or runtime.get("error_code") or "",
              "exhausted": bool(completion.get("exhausted")),
          }
          out = Path(os.environ["RUNNER_TEMP"]) / "ga-auto-recovery-verdict.json"
          out.write_text(json.dumps(verdict, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(verdict, ensure_ascii=False))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## Automatic service-abuse recovery\n\n```json\n")
              fh.write(json.dumps(verdict, ensure_ascii=False, indent=2))
              fh.write("\n```\n")
          PY

      - name: Upload redacted automatic-recovery verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ga-auto-recovery-safe-${{ github.run_id }}-${{ matrix.slot }}
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/ga-auto-recovery-verdict.json
            ${{ runner.temp }}/runner-egress-safe.json
            ${{ runner.temp }}/recovery-egress-safe.json
            ${{ steps.acquire.outputs.safe }}
            ${{ steps.recovery.outputs.safe_status }}
            ${{ steps.recovery.outputs.writeback_safe }}
            ${{ steps.recovery.outputs.probe_safe }}
            ${{ steps.complete.outputs.safe }}

      - name: Cleanup private recovery material
        if: always()
        shell: bash
        run: |
          if [ -f .mihomo-ga/mihomo.pid ]; then
            kill "$(cat .mihomo-ga/mihomo.pid)" 2>/dev/null || true
          fi
          rm -rf "$RUNNER_TEMP/service-abuse-auto-private" \
            "$RUNNER_TEMP/service-abuse-auto-profile" \
            "$RUNNER_TEMP/service-abuse-auto-semiprotocol" \
            "$RUNNER_TEMP/service-abuse-proxy" \
            "$GITHUB_WORKSPACE/.production-human-runtime" \
            .mihomo-ga \
            .tmp/service-abuse-diagnostics || true

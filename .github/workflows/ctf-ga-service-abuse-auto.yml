name: CTF GA public-runner private-source Camoufox recovery

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Whole fresh-runner timeout"
        required: true
        default: "40"
      runner:
        description: "Hosted runner OS used for the recovery browser"
        required: true
        default: "windows-2022"
        type: choice
        options:
          - ubuntu-22.04
          - windows-2022
      recovery_browser_engine:
        description: "Recovery browser: Camoufox Firefox control or legacy Cloak Chromium"
        required: true
        default: "camoufox"
        type: choice
        options:
          - camoufox
          - cloak
      recovery_fingerprint_mode:
        description: "Cloak manifest: preserve private values, derive a seed per slot, or reproduce the local TierRestore-success browser inputs"
        required: true
        default: "fixed"
        type: choice
        options:
          - fixed
          - per_slot
          - historical_success
      lease_ttl_seconds:
        description: "Coordinator lease TTL; must cover browser recovery and writeback"
        required: true
        default: "1500"
      max_candidates:
        description: "Oldest quarantined service-abuse accounts offered to the coordinator"
        required: true
        default: "500"
      job_slots_json:
        description: "Bounded fresh-runner slots; use [1] normally or [1..20] for a batch"
        required: true
        default: "[1]"
      recovery_network_mode:
        description: "Microsoft transport: direct GA runner egress or isolated curated proxy pool"
        required: true
        default: "proxy_pool"
      proxy_pool_profile:
        description: "Proxy evidence cohort: unseen candidates or the single previously proven recovery egress"
        required: true
        default: "unseen"
      proxy_pool_slot_offset:
        description: "Zero-based curated proxy-pool wave offset (0-1000)"
        required: true
        default: "0"
      recovery_human_mode:
        description: "HumanCaptcha execution path: natural10 production control or exact5s historical recovery path"
        required: true
        default: "exact5s"
      historical_protocol_overlay:
        description: "Use the byte-exact protocol runtime from the two verified local TierRestore recoveries"
        required: true
        default: "true"
      registration_natural_overlay:
        description: "Use the byte-exact 875b057 thin-natural registration protocol"
        required: true
        default: "false"
      exact5s_release_mode:
        description: "Exact5s release backend: historical cdp_up control or paired page_up treatment"
        required: true
        default: "cdp_up"
      exact5s_move_steps:
        description: "Exact5s dense pressed-move count (1-24); 24 is the historical control"
        required: true
        default: "24"
      exact5s_historical_input_treatment:
        description: "Historical exact5s arm: input transport controls or bounded empty-Dz rescue"
        required: true
        default: "control"
        type: choice
        options:
          - control
          - move8
          - page_up
          - page_moves24
          - empty_dz
          - empty_dz_control
      exact5s_hold_attempts:
        description: "Maximum physical holds per rendered exact5s challenge (1-2)"
        required: true
        default: "1"
      exact5s_final_xghm_target:
        description: "Experimental final XGhm target; 0 preserves live values"
        required: true
        default: "0"
      exact5s_final_xghm_start_index:
        description: "Zero-based exact5s final index where the XGhm target begins (0-7)"
        required: true
        default: "1"
      natural_final_proof_mode:
        description: "Natural-hold final PX561 treatment: minimal, ads_safe, or off control"
        required: true
        default: "ads_safe"
      natural_w0_bridge:
        description: "Exercise the verified neutral-final to W0 bridge while keeping a natural 10s hold"
        required: true
        default: "true"
      natural_force_w0_after_minus1:
        description: "Experimental: force synthetic W0 result0 after a live final result-1 to reach another bounded host challenge"
        required: true
        default: "false"
      natural_server_challenge_rounds:
        description: "Maximum fresh Microsoft HumanCaptcha rounds after accepted result|0 (1-8)"
        required: true
        default: "8"
      recovery_source_ref:
        description: "Immutable private recovery-control source commit"
        required: true
        default: "f2aa79971fc5d97715b6bfd6667327889e3bd921"
      egress_prefix_denylist:
        description: "Known-bad GA egress prefixes skipped before an account lease is acquired"
        required: false
        default: "4.,13.,20.,40.,52.,68.,74.249."
concurrency:
  group: public-runner-private-source-camoufox-recovery
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recover:
    name: recover (${{ matrix.slot }})
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        slot: ${{ fromJSON(inputs.job_slots_json || '[1]') }}
    runs-on: ${{ github.event_name == 'schedule' && 'ubuntu-22.04' || inputs.runner || 'windows-2022' }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes || '30') }}
    env:
      PYTHONIOENCODING: utf-8
      CLOAKBROWSER_SUPPRESS_FONT_WARNING: "1"
      GA_COORDINATOR_URL: ${{ vars.GA_COORDINATOR_URL }}
      GA_COORDINATOR_TOKEN: ${{ secrets.GA_COORDINATOR_TOKEN }}
      SERVICE_ABUSE_EXPERIMENT_KEY: ${{ secrets.SERVICE_ABUSE_EXPERIMENT_KEY }}
      PRIVATE_SOURCE_SHA: ${{ inputs.recovery_source_ref || '342a9560575f7da818a583992613b7018773d027' }}
      PUBLIC_RUNNER_REPOSITORY: ${{ github.repository }}
      RECOVERY_SLOT: ${{ matrix.slot }}
      RECOVERY_RUNNER_LABEL: ${{ github.event_name == 'schedule' && 'ubuntu-22.04' || inputs.runner || 'windows-2022' }}
      RECOVERY_BROWSER_ENGINE: ${{ github.event_name == 'schedule' && 'cloak' || inputs.recovery_browser_engine || 'camoufox' }}
      RECOVERY_FINGERPRINT_MODE: ${{ inputs.recovery_fingerprint_mode || 'fixed' }}
      CAMOUFOX_PACKAGE_VERSION: "0.5.4"
      CAMOUFOX_PLAYWRIGHT_VERSION: "1.60.0"
      CAMOUFOX_PATCHRIGHT_VERSION: "1.60.1"
      CAMOUFOX_BROWSERFORGE_VERSION: "1.2.4"
      CAMOUFOX_APIFY_FINGERPRINT_VERSION: "0.13.0"
      CAMOUFOX_BROWSER_VERSION: "official/152.0.4-beta.28"
      CAMOUFOX_BROWSER_SPEC: "official/152.0.4-beta.28-386fc2f4"
      CAMOUFOX_BROWSER_SHA256: "386fc2f41139685f9a1a9cef0d024bc041d899c315ea538d561171b5b282e57d"
      SEMIPROTOCOL_STOP_BEFORE_SERVER_ROUND: "4"
      BOOTSTRAP_PYTHON: ${{ (github.event_name == 'schedule' && 'ubuntu-22.04' || inputs.runner || 'windows-2022') == 'windows-2022' && 'python' || 'python3' }}
      VENV_PYTHON: ${{ (github.event_name == 'schedule' && 'ubuntu-22.04' || inputs.runner || 'windows-2022') == 'windows-2022' && '.venv/Scripts/python.exe' || '.venv/bin/python' }}
      RECOVERY_NETWORK_MODE: ${{ github.event_name == 'schedule' && 'ga_own_ip' || inputs.recovery_network_mode || 'proxy_pool' }}
      PROXY_POOL_PROFILE: ${{ inputs.proxy_pool_profile || 'unseen' }}
      PROXY_POOL_SLOT_OFFSET: ${{ inputs.proxy_pool_slot_offset || '0' }}
      RECOVERY_HUMAN_MODE: ${{ github.event_name == 'schedule' && 'natural10' || inputs.recovery_human_mode || 'exact5s' }}
      HISTORICAL_PROTOCOL_OVERLAY: ${{ github.event_name == 'schedule' && 'false' || inputs.historical_protocol_overlay || 'true' }}
      REGISTRATION_NATURAL_OVERLAY: ${{ inputs.registration_natural_overlay || 'false' }}
      HUMAN_RUNTIME_REF: ${{ (github.event_name == 'schedule' && 'natural10' || inputs.recovery_human_mode || 'exact5s') == 'exact5s' && '00b68437e041cbdcee2be209a18d7a5592f4c2dd' || '875b0571d5b9c88b89a5bbc64f30488ee9565962' }}
      EXACT5S_RELEASE_MODE: ${{ inputs.exact5s_release_mode || 'cdp_up' }}
      EXACT5S_MOVE_STEPS: ${{ inputs.exact5s_move_steps || '24' }}
      EXACT5S_HISTORICAL_INPUT_TREATMENT: ${{ inputs.exact5s_historical_input_treatment || 'control' }}
      EXACT5S_HOLD_ATTEMPTS: ${{ inputs.exact5s_hold_attempts || '1' }}
      EXACT5S_FINAL_XGHM_TARGET: ${{ inputs.exact5s_final_xghm_target || '0' }}
      EXACT5S_FINAL_XGHM_START_INDEX: ${{ inputs.exact5s_final_xghm_start_index || '1' }}
      NATURAL_FINAL_PROOF_MODE: ${{ github.event_name == 'schedule' && 'minimal' || inputs.natural_final_proof_mode || 'ads_safe' }}
      NATURAL_HOLD_PROFILE: ${{ inputs.registration_natural_overlay == 'true' && 'registration_875b_one_shot' || 'registration_10s' }}
      NATURAL_W0_BRIDGE: ${{ github.event_name == 'schedule' && 'false' || inputs.natural_w0_bridge || 'true' }}
      NATURAL_FORCE_W0_AFTER_MINUS1: ${{ inputs.natural_force_w0_after_minus1 || 'false' }}
      NATURAL_SERVER_CHALLENGE_ROUNDS: ${{ github.event_name == 'schedule' && '1' || inputs.natural_server_challenge_rounds || '8' }}
    steps:
      - name: Reject GitHub UI re-runs
        if: github.run_attempt != 1
        shell: bash
        run: |
          echo "Automatic recovery runs may not be re-run; dispatch a fresh runner instead." >&2
          exit 1

      - name: Select Python on Windows
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate bounded recovery matrix
        shell: bash
        env:
          JOB_SLOTS_JSON: ${{ inputs.job_slots_json || '[1]' }}
        run: |
          set -euo pipefail
          "$BOOTSTRAP_PYTHON" - <<'PY'
          import json, os
          slots = json.loads(os.environ["JOB_SLOTS_JSON"])
          current = int(os.environ["RECOVERY_SLOT"])
          valid = (
              isinstance(slots, list)
              and 1 <= len(slots) <= 20
              and all(type(item) is int and 1 <= item <= 20 for item in slots)
              and len(set(slots)) == len(slots)
              and current in slots
          )
          if not valid:
              raise SystemExit("job_slots_json must contain 1-20 unique integer slots in range 1..20")
          runner_label = os.environ.get("RECOVERY_RUNNER_LABEL", "")
          if runner_label not in {"ubuntu-22.04", "windows-2022"}:
              raise SystemExit("runner must be ubuntu-22.04 or windows-2022")
          browser_engine = os.environ.get("RECOVERY_BROWSER_ENGINE", "cloak")
          if browser_engine not in {"cloak", "camoufox"}:
              raise SystemExit("recovery_browser_engine must be cloak or camoufox")
          fingerprint_mode = os.environ.get("RECOVERY_FINGERPRINT_MODE", "fixed")
          if fingerprint_mode not in {"fixed", "per_slot", "historical_success"}:
              raise SystemExit(
                  "recovery_fingerprint_mode must be fixed, per_slot, or historical_success"
              )
          if fingerprint_mode in {"per_slot", "historical_success"} and browser_engine != "cloak":
              raise SystemExit(
                  f"recovery_fingerprint_mode={fingerprint_mode} requires the Cloak browser"
              )
          stop_before_round = int(
              os.environ.get("SEMIPROTOCOL_STOP_BEFORE_SERVER_ROUND", "4")
          )
          if stop_before_round != 4:
              raise SystemExit("semiprotocol stop-loss must remain fixed at round 4")
          network_mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          if network_mode not in {"ga_own_ip", "proxy_pool"}:
              raise SystemExit("recovery_network_mode must be ga_own_ip or proxy_pool")
          proxy_profile = os.environ.get("PROXY_POOL_PROFILE", "")
          if proxy_profile not in {"unseen", "known_success"}:
              raise SystemExit("proxy_pool_profile must be unseen or known_success")
          proxy_offset = int(os.environ.get("PROXY_POOL_SLOT_OFFSET", "-1"))
          if not 0 <= proxy_offset <= 1000:
              raise SystemExit("proxy_pool_slot_offset must be in range 0..1000")
          if proxy_profile == "known_success" and (
              network_mode != "proxy_pool" or slots != [1] or proxy_offset != 0
          ):
              raise SystemExit(
                  "known_success proxy profile requires proxy_pool mode, job_slots_json=[1], and offset 0"
              )
          human_mode = os.environ.get("RECOVERY_HUMAN_MODE", "")
          if human_mode not in {"natural10", "exact5s"}:
              raise SystemExit("recovery_human_mode must be natural10 or exact5s")
          historical_overlay = os.environ.get("HISTORICAL_PROTOCOL_OVERLAY", "false")
          if historical_overlay not in {"true", "false"}:
              raise SystemExit("historical_protocol_overlay must be true or false")
          registration_natural_overlay = os.environ.get(
              "REGISTRATION_NATURAL_OVERLAY", "false"
          )
          if registration_natural_overlay not in {"true", "false"}:
              raise SystemExit("registration_natural_overlay must be true or false")
          release_mode = os.environ.get("EXACT5S_RELEASE_MODE", "")
          if release_mode not in {"cdp_up", "page_up"}:
              raise SystemExit("exact5s_release_mode must be cdp_up or page_up")
          move_steps = int(os.environ.get("EXACT5S_MOVE_STEPS", "0"))
          if not 1 <= move_steps <= 24:
              raise SystemExit("exact5s_move_steps must be in range 1..24")
          historical_input_treatment = os.environ.get(
              "EXACT5S_HISTORICAL_INPUT_TREATMENT", "control"
          )
          if historical_input_treatment not in {
              "control", "move8", "page_up", "page_moves24", "empty_dz",
              "empty_dz_control"
          }:
              raise SystemExit(
                  "exact5s_historical_input_treatment must be control, move8, page_up, "
                  "page_moves24, empty_dz, or empty_dz_control"
              )
          historical_move_override = (
              "true" if historical_input_treatment == "move8" else "false"
          )
          historical_release_override = (
              "true" if historical_input_treatment == "page_up" else "false"
          )
          if historical_input_treatment in {"page_moves24", "empty_dz"} and (
              historical_overlay != "true"
              or release_mode != "cdp_up"
              or move_steps != 24
          ):
              raise SystemExit(
                  "exact5s page-move treatment requires historical overlay, cdp_up, and 24 moves"
              )
          if historical_move_override == "true" and (
              historical_overlay != "true"
              or release_mode != "cdp_up"
              or move_steps != 8
          ):
              raise SystemExit(
                  "exact5s historical move override requires historical overlay, cdp_up, and exactly 8 moves"
              )
          if historical_release_override == "true" and (
              historical_overlay != "true"
              or release_mode != "page_up"
              or move_steps != 24
          ):
              raise SystemExit(
                  "exact5s historical release override requires historical overlay, page_up, and 24 moves"
              )
          hold_attempts = int(os.environ.get("EXACT5S_HOLD_ATTEMPTS", "0"))
          if not 1 <= hold_attempts <= 2:
              raise SystemExit("exact5s_hold_attempts must be in range 1..2")
          xghm_target = float(os.environ.get("EXACT5S_FINAL_XGHM_TARGET", "-1"))
          if not 0 <= xghm_target <= 1000:
              raise SystemExit("exact5s_final_xghm_target must be in range 0..1000")
          xghm_start = int(os.environ.get("EXACT5S_FINAL_XGHM_START_INDEX", "-1"))
          if not 0 <= xghm_start <= 7:
              raise SystemExit("exact5s_final_xghm_start_index must be in range 0..7")
          mode = os.environ.get("NATURAL_FINAL_PROOF_MODE", "")
          if mode not in {"minimal", "minimal_natural_hold", "ads_safe", "off"}:
              raise SystemExit(
                  "natural_final_proof_mode must be minimal, minimal_natural_hold, "
                  "ads_safe, or off"
              )
          natural_hold_profile = os.environ.get(
              "NATURAL_HOLD_PROFILE", "registration_10s"
          )
          if natural_hold_profile not in {
              "registration_10s", "registration_875b_one_shot"
          }:
              raise SystemExit("invalid natural hold profile")
          bridge = os.environ.get("NATURAL_W0_BRIDGE", "")
          if bridge not in {"true", "false"}:
              raise SystemExit("natural_w0_bridge must be true or false")
          force_minus1 = os.environ.get("NATURAL_FORCE_W0_AFTER_MINUS1", "")
          if force_minus1 not in {"true", "false"}:
              raise SystemExit("natural_force_w0_after_minus1 must be true or false")
          rounds = int(os.environ.get("NATURAL_SERVER_CHALLENGE_ROUNDS", "0"))
          if not 1 <= rounds <= 8:
              raise SystemExit("natural_server_challenge_rounds must be in range 1..8")
          if human_mode == "exact5s" and (mode != "ads_safe" or bridge != "true"):
              raise SystemExit(
                  "exact5s requires natural_final_proof_mode=ads_safe and natural_w0_bridge=true"
              )
          if force_minus1 == "true" and rounds < 2:
              raise SystemExit("natural_force_w0_after_minus1 requires at least 2 rounds")
          if human_mode == "natural10" and force_minus1 == "true" and bridge != "true":
              raise SystemExit(
                  "natural10 force-W0 requires natural_w0_bridge=true"
              )
          if historical_input_treatment in {"empty_dz", "empty_dz_control"} and (
              historical_overlay != "true"
              or human_mode != "exact5s"
              or release_mode != "cdp_up"
              or move_steps != 24
              or hold_attempts != 1
              or xghm_target != 0
              or xghm_start != 1
              or mode != "ads_safe"
              or bridge != "true"
              or force_minus1 != "false"
              or rounds != 8
          ):
              raise SystemExit(
                  "exact5s empty-Dz treatments require historical control timing, one "
                  "hold, live XGhm, ads_safe, no force-W0, and eight rounds"
              )
          if historical_overlay == "true" and (
              human_mode != "exact5s"
              or (release_mode != "cdp_up" and historical_release_override != "true")
              or (move_steps != 24 and historical_move_override != "true")
              or hold_attempts != 1
              or xghm_target != 0
              or xghm_start != 1
              or force_minus1 != "false"
              or rounds != 8
          ):
              raise SystemExit(
                  "historical protocol overlay requires exact5s, the cdp_up/24-move control "
                  "or one explicit input treatment, one hold, live XGhm, no newer force-W0 "
                  "option, and eight server rounds"
              )
          if browser_engine == "camoufox" and (
              runner_label != "windows-2022"
              or network_mode not in {"ga_own_ip", "proxy_pool"}
              or human_mode != "exact5s"
              or historical_overlay != "true"
          ):
              raise SystemExit(
                  "Camoufox rollout requires windows-2022, ga_own_ip or proxy_pool, "
                  "one-to-twenty unique slots, and the exact5s historical protocol overlay"
              )
          if registration_natural_overlay == "true" and (
              historical_overlay != "false"
              or human_mode != "natural10"
              or natural_hold_profile != "registration_875b_one_shot"
              or mode != "minimal_natural_hold"
              or bridge != "false"
              or force_minus1 != "false"
              or rounds != 1
              or release_mode != "cdp_up"
              or move_steps != 24
              or hold_attempts != 1
              or xghm_target != 0
              or xghm_start != 1
          ):
              raise SystemExit(
                  "registration natural overlay requires natural10, "
                  "minimal_natural_hold, no W0 treatments, one server round, "
                  "and untouched exact5s controls"
              )
          if mode == "minimal_natural_hold" and registration_natural_overlay != "true":
              raise SystemExit(
                  "minimal_natural_hold requires registration_natural_overlay=true"
              )
          if (
              natural_hold_profile == "registration_875b_one_shot"
              and registration_natural_overlay != "true"
          ):
              raise SystemExit(
                  "registration_875b_one_shot requires registration_natural_overlay=true"
              )
          print(f"recovery matrix slot={current} count={len(slots)}")
          print(f"recovery runner={runner_label}")
          print(f"recovery browser engine={browser_engine}")
          print(f"recovery fingerprint mode={fingerprint_mode}")
          print(f"recovery network mode={network_mode}")
          print(f"proxy pool profile={proxy_profile}")
          print(f"proxy pool slot offset={proxy_offset}")
          print(f"recovery human mode={human_mode}")
          print(f"historical protocol overlay={historical_overlay}")
          print(f"registration natural overlay={registration_natural_overlay}")
          print(f"exact5s release mode={release_mode}")
          print(f"exact5s move steps={move_steps}")
          print(f"exact5s historical input treatment={historical_input_treatment}")
          print(f"exact5s hold attempts={hold_attempts}")
          print(f"exact5s final XGhm target={xghm_target}")
          print(f"exact5s final XGhm start index={xghm_start}")
          print(f"natural final proof mode={mode}")
          print(f"natural hold profile={natural_hold_profile}")
          print(f"natural W0 bridge={bridge}")
          print(f"natural force W0 after minus1={force_minus1}")
          print(f"natural server challenge rounds={rounds}")
          print(f"semiprotocol stop before server round={stop_before_round}")
          PY

      - name: Checkout pinned private recovery control plane
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ inputs.recovery_source_ref || 'f2aa79971fc5d97715b6bfd6667327889e3bd921' }}
          ssh-key: ${{ secrets.PRIVATE_SOURCE_DEPLOY_KEY }}
          persist-credentials: false

      - name: Verify pinned private source
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$PRIVATE_SOURCE_SHA" = "342a9560575f7da818a583992613b7018773d027"
          test "$actual" = "$PRIVATE_SOURCE_SHA"
          echo "private_source_commit=$actual"
          echo "public_runner_repository=$PUBLIC_RUNNER_REPOSITORY"

      - name: Verify historical protocol overlay source
        if: env.HISTORICAL_PROTOCOL_OVERLAY == 'true'
        shell: bash
        run: |
          set -euo pipefail
          "$BOOTSTRAP_PYTHON" - <<'PY'
          import hashlib
          from pathlib import Path

          source = Path("runtime_overlays/protocol_runtime_probe_00b6843.py")
          actual = hashlib.sha256(source.read_bytes()).hexdigest()
          expected = "3143e2f5c4f62964269a92cc5a9ecb07b0779444b33c335a2ecaf5b4783f93a4"
          if actual != expected:
              raise SystemExit(f"historical protocol overlay mismatch: {actual}")
          print(f"historical protocol overlay verified sha256={actual}")
          PY

      - name: Verify registration natural protocol overlay source
        if: env.REGISTRATION_NATURAL_OVERLAY == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD:runtime_overlays/protocol_runtime_probe_875b057.py)" = \
            '6a95bc27c418e6e759d59ef6f2061c4c20fea090'
          "$BOOTSTRAP_PYTHON" - <<'PY'
          import hashlib
          from pathlib import Path

          source = Path("runtime_overlays/protocol_runtime_probe_875b057.py")
          actual = hashlib.sha256(source.read_bytes()).hexdigest()
          expected = "f87e09b29d1dd268e6ce4d5125a51c865a95ebd40687cf36a2875c6d395f9cf6"
          if actual != expected:
              raise SystemExit(f"registration natural protocol overlay mismatch: {actual}")
          print(f"registration natural protocol overlay verified sha256={actual}")
          PY

      - name: Capture runner egress gate
        id: runner_egress
        shell: bash
        env:
          EGRESS_PREFIX_DENYLIST: ${{ inputs.egress_prefix_denylist || '4.,13.,20.,40.,52.,68.,74.249.' }}
        run: |
          set -euo pipefail
          ip=$(curl -fsS --max-time 10 https://api.ipify.org || true)
          IP="$ip" "$BOOTSTRAP_PYTHON" - <<'PY'
          import hashlib, json, os

          ip = os.environ.get("IP", "").strip()
          network_mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          deny = [item.strip() for item in os.environ.get("EGRESS_PREFIX_DENYLIST", "").split(",") if item.strip()]
          present = bool(ip)
          direct_admitted = present and not any(ip.startswith(prefix) for prefix in deny)
          prepare = network_mode == "proxy_pool" or direct_admitted
          sha16 = hashlib.sha256(ip.encode()).hexdigest()[:16] if present else "unknown"
          if ip.count(".") == 3:
              parts = ip.split(".")
              prefix = f"{parts[0]}.{parts[1]}."
          else:
              prefix = "unknown"
          if network_mode == "proxy_pool":
              reason = "proxy_setup_pending"
          elif direct_admitted:
              reason = "direct_egress_admitted"
          elif present:
              reason = "direct_egress_denylist"
          else:
              reason = "direct_egress_unavailable"
          safe = {
              "network_mode": network_mode,

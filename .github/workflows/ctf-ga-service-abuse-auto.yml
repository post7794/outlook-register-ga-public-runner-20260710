      - name: Install registration-compatible Windows font aliases
        if: steps.runner_egress.outputs.prepare == 'true' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          . .venv/bin/activate
          python - <<'PY'
          from fontTools.ttLib import TTFont
          from pathlib import Path

          out = Path.home() / ".local/share/fonts/windows-ctf"
          out.mkdir(parents=True, exist_ok=True)

          def pick(*paths):
              return next((Path(path) for path in paths if Path(path).exists()), None)

          default_src = pick(
              "/usr/share/fonts/truetype/liberation2/LiberationSans-Regular.ttf",
              "/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf",
              "/usr/share/fonts/truetype/msttcorefonts/Arial.ttf",
              "/usr/share/fonts/truetype/crosextra/Carlito-Regular.ttf",
          )
          selawik_src = pick(
              "/usr/share/fonts/truetype/selawik/Selawik.ttf",
              "/usr/share/fonts/truetype/selawik/Selawik-Regular.ttf",
          ) or default_src
          calibri_src = pick(
              "/usr/share/fonts/truetype/crosextra/Carlito-Regular.ttf",
              "/usr/share/fonts/truetype/msttcorefonts/Arial.ttf",
          ) or default_src
          msgothic_src = pick(
              "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc",
              "/usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc",
          ) or default_src
          if not default_src:
              raise SystemExit("no base font found")

          def set_name(font, name_id, value):
              font["name"].setName(value, name_id, 3, 1, 0x409)
              font["name"].setName(value, name_id, 1, 0, 0)

          families = [
              ("Segoe UI", "Regular", selawik_src),
              ("Segoe UI Light", "Regular", selawik_src),
              ("Calibri", "Regular", calibri_src),
              ("Cambria", "Regular", pick("/usr/share/fonts/truetype/crosextra/Caladea-Regular.ttf") or calibri_src),
              ("Marlett", "Regular", default_src),
              ("MS UI Gothic", "Regular", msgothic_src),
              ("Franklin Gothic", "Regular", default_src),
          ]
          for family, subfamily, src in families:
              try:
                  font = TTFont(str(src))
              except Exception as exc:
                  if exc.__class__.__name__ == "TTLibFileIsCollectionError":
                      font = TTFont(str(src), fontNumber=0)
                  else:
                      raise
              set_name(font, 1, family)
              set_name(font, 2, subfamily)
              set_name(font, 16, family)
              set_name(font, 17, subfamily)
              ps = family.replace(" ", "") + "-" + subfamily.replace(" ", "")
              set_name(font, 6, ps)
              font.save(str(out / f"{ps}.ttf"))
          PY
          fc-cache -f "$HOME/.local/share/fonts"

      - name: Start isolated recovery proxy
        if: steps.runner_egress.outputs.prepare == 'true' && env.RECOVERY_NETWORK_MODE == 'proxy_pool'
        shell: bash
        env:
          UNSEEN_PROXY_POOL_GZIP_B64: ${{ secrets.CTF_PROXY_POOL_GZIP_B64 }}
          KNOWN_SUCCESS_PROXY_POOL_GZIP_B64: ${{ secrets.CTF_PROXY_KNOWN_SUCCESS_GZIP_B64 }}
        run: |
          set -euo pipefail
          if [ "$PROXY_POOL_PROFILE" = "known_success" ]; then
            PROXY_POOL_GZIP_B64="${KNOWN_SUCCESS_PROXY_POOL_GZIP_B64:-}"
          else
            PROXY_POOL_GZIP_B64="${UNSEEN_PROXY_POOL_GZIP_B64:-}"
          fi
          export PROXY_POOL_GZIP_B64
          test -n "${PROXY_POOL_GZIP_B64:-}"
          mkdir -p "$RUNNER_TEMP/service-abuse-proxy" .mihomo-ga
          "$VENV_PYTHON" - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          encoded = os.environ.get("PROXY_POOL_GZIP_B64", "").strip()
          raw = gzip.decompress(base64.b64decode(encoded, validate=True))
          if not raw or len(raw) > 2_000_000:
              raise SystemExit("invalid compressed proxy pool")
          path = Path(os.environ["RUNNER_TEMP"]) / "service-abuse-proxy" / "pool.yaml"
          path.write_bytes(raw)
          PY
          proxy_node_slot=$((PROXY_POOL_SLOT_OFFSET + RECOVERY_SLOT))
          if ! "$VENV_PYTHON" tools/setup_ga_subscription_proxy.py \
            --config "$RUNNER_TEMP/service-abuse-proxy/pool.yaml" \
            --node-slot "$proxy_node_slot" \
            --out-dir .mihomo-ga \
            --http-port 17890 \
            --socks-port 17891 \
            --controller-port 19090 \
            >"$RUNNER_TEMP/service-abuse-proxy/setup.private.log" 2>&1; then
            echo "Proxy pool setup failed before account selection" >&2
            exit 1
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            asset_url="https://github.com/MetaCubeX/mihomo/releases/download/v1.19.28/mihomo-windows-amd64-v1-v1.19.28.zip"
            curl -fsSL "$asset_url" -o .mihomo-ga/mihomo.zip
            "$VENV_PYTHON" - <<'PY'
          import shutil
          import zipfile
          from pathlib import Path

          root = Path(".mihomo-ga")
          archive = root / "mihomo.zip"
          extracted = root / "archive"
          with zipfile.ZipFile(archive) as bundle:
              bundle.extractall(extracted)
          matches = list(extracted.rglob("mihomo*.exe"))
          if len(matches) != 1:
              raise SystemExit(f"expected one mihomo executable, got {len(matches)}")
          shutil.copy2(matches[0], root / "mihomo.exe")
          PY
            mihomo_executable=".mihomo-ga/mihomo.exe"
          else
            asset_url="https://github.com/MetaCubeX/mihomo/releases/download/v1.19.28/mihomo-linux-amd64-v1-v1.19.28.gz"
            curl -fsSL "$asset_url" -o .mihomo-ga/mihomo.gz
            gzip -dc .mihomo-ga/mihomo.gz > .mihomo-ga/mihomo
            chmod +x .mihomo-ga/mihomo
            mihomo_executable=".mihomo-ga/mihomo"
          fi
          nohup "$mihomo_executable" -d .mihomo-ga -f .mihomo-ga/config.yaml \
            >"$RUNNER_TEMP/service-abuse-proxy/mihomo.private.log" 2>&1 &
          echo "$!" > .mihomo-ga/mihomo.pid
          for _ in $(seq 1 20); do
            if curl -fsS --max-time 2 http://127.0.0.1:19090/version >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS --max-time 2 http://127.0.0.1:19090/version >/dev/null
          echo "OUTLOOK_PROXY_URL=http://127.0.0.1:17890" >> "$GITHUB_ENV"
          echo "Isolated proxy process is ready for effective-egress checks"

      - name: Admit effective Microsoft egress
        id: egress
        if: steps.runner_egress.outputs.prepare == 'true'
        shell: bash
        env:
          EGRESS_PREFIX_DENYLIST: ${{ inputs.egress_prefix_denylist || '4.,13.,20.,40.,52.,68.,74.249.' }}
          KNOWN_SUCCESS_EGRESS_SHA16: ${{ secrets.CTF_PROXY_KNOWN_SUCCESS_EGRESS_SHA16 }}
        run: |
          set -euo pipefail
          proxy_args=()
          if [ "$RECOVERY_NETWORK_MODE" = "proxy_pool" ]; then
            test -n "${OUTLOOK_PROXY_URL:-}"
            proxy_args=(--proxy "$OUTLOOK_PROXY_URL")
          fi
          ip1=$(curl -fsS --max-time 15 "${proxy_args[@]}" https://api.ipify.org 2>/dev/null || true)
          sleep 1
          ip2=$(curl -fsS --max-time 15 "${proxy_args[@]}" https://api.ipify.org 2>/dev/null || true)
          login_http=""
          token_http=""
          graph_http=""
          if [ "$RECOVERY_NETWORK_MODE" = "proxy_pool" ]; then
            login_http=$(curl -sS -L --max-time 20 "${proxy_args[@]}" -o /dev/null -w '%{http_code}' \
              https://login.live.com/ 2>/dev/null || true)
            token_http=$(curl -sS --max-time 20 "${proxy_args[@]}" -o /dev/null -w '%{http_code}' \
              -X POST --data 'grant_type=client_credentials' \
              https://login.microsoftonline.com/common/oauth2/v2.0/token 2>/dev/null || true)
            graph_http=$(curl -sS --max-time 20 "${proxy_args[@]}" -o /dev/null -w '%{http_code}' \
              'https://graph.microsoft.com/v1.0/$metadata' 2>/dev/null || true)
          fi
          IP1="$ip1" IP2="$ip2" LOGIN_HTTP="$login_http" TOKEN_HTTP="$token_http" GRAPH_HTTP="$graph_http" \
            SELECTED_PROXY_SAFE_PATH="$GITHUB_WORKSPACE/.mihomo-ga/selected_proxy.safe.json" \
            "$VENV_PYTHON" - <<'PY'
          import hashlib, json, os
          from pathlib import Path

          mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          ip1 = os.environ.get("IP1", "").strip()
          ip2 = os.environ.get("IP2", "").strip()
          deny = [item.strip() for item in os.environ.get("EGRESS_PREFIX_DENYLIST", "").split(",") if item.strip()]
          present = bool(ip1)
          stable = present and ip1 == ip2
          denied = present and any(ip1.startswith(prefix) for prefix in deny)
          proxy_profile = os.environ.get("PROXY_POOL_PROFILE", "")
          login_http = int(os.environ.get("LOGIN_HTTP") or 0) or None
          token_http = int(os.environ.get("TOKEN_HTTP") or 0) or None
          graph_http = int(os.environ.get("GRAPH_HTTP") or 0) or None
          transport_ok = mode != "proxy_pool" or (
              login_http is not None
              and 200 <= login_http < 400
              and token_http in {400, 401}
              and graph_http == 200
          )
          sha16 = hashlib.sha256(ip1.encode()).hexdigest()[:16] if present else "unknown"
          expected_known_sha16 = os.environ.get("KNOWN_SUCCESS_EGRESS_SHA16", "").strip()
          known_reference_present = len(expected_known_sha16) == 16
          known_egress_match = (
              proxy_profile != "known_success"
              or (known_reference_present and sha16 == expected_known_sha16)
          )
          selected_name_sha12 = None
          selected_safe_path = os.environ.get("SELECTED_PROXY_SAFE_PATH", "").strip()
          if mode == "proxy_pool" and selected_safe_path:
              try:
                  selected_safe = json.loads(Path(selected_safe_path).read_text(encoding="utf-8"))
                  candidate_hash = str(selected_safe.get("selected_name_sha12") or "")
                  if len(candidate_hash) == 12:
                      selected_name_sha12 = candidate_hash
              except Exception:
                  pass
          admitted = stable and not denied and transport_ok and known_egress_match
          if ip1.count(".") == 3:
              parts = ip1.split(".")
              prefix = f"{parts[0]}.{parts[1]}."
          else:
              prefix = "unknown"
          if admitted:
              reason = "effective_egress_admitted"
          elif not present:
              reason = "effective_egress_unavailable"
          elif not stable:
              reason = "effective_egress_unstable"
          elif proxy_profile == "known_success" and not known_reference_present:
              reason = "known_success_egress_reference_missing"
          elif proxy_profile == "known_success" and not known_egress_match:
              reason = "known_success_egress_mismatch"
          elif denied:
              reason = "effective_egress_denylist"
          else:
              reason = "microsoft_transport_rejected"
          safe = {
              "network_mode": mode,
              "proxy_pool_profile": proxy_profile,
              "public_ip_present": present,
              "stable_egress": stable,
              "admitted": admitted,
              "egress_sha16": sha16,
              "egress_prefix": prefix,
              "selected_name_sha12": selected_name_sha12,
              "login_http": login_http,
              "token_http": token_http,
              "graph_http": graph_http,
              "reason": reason,
          }
          path = os.path.join(os.environ["RUNNER_TEMP"], "recovery-egress-safe.json")
          with open(path, "w", encoding="utf-8") as fh:
              json.dump(safe, fh, ensure_ascii=False, indent=2)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key in ("admitted", "egress_sha16", "egress_prefix", "selected_name_sha12", "reason"):
                  value = safe[key]
                  if isinstance(value, bool):
                      value = str(value).lower()
                  fh.write(f"{key}={value}\n")
          print(json.dumps(safe, ensure_ascii=False))
          PY
          if [ -n "$ip1" ]; then
            printf 'CAMOUFOX_GEOIP=%s\n' "$ip1" >> "$GITHUB_ENV"
          fi

      - name: Record rejected effective egress
        if: steps.runner_egress.outputs.prepare == 'true' && steps.egress.outputs.admitted != 'true'
        shell: bash
        run: |
          echo "Effective Microsoft egress was rejected before account selection: ${{ steps.egress.outputs.reason }}"

      - name: Fetch and smoke-test pinned Camoufox runtime
        if: steps.egress.outputs.admitted == 'true' && env.RECOVERY_BROWSER_ENGINE == 'camoufox'
        id: camoufox_runtime
        shell: bash
        env:
          CACHE_HIT: ${{ steps.camoufox_cache.outputs.cache-hit }}
          EXPECTED_EGRESS_SHA16: ${{ steps.egress.outputs.egress_sha16 }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          "$VENV_PYTHON" -m camoufox fetch "$CAMOUFOX_BROWSER_SPEC"
          "$VENV_PYTHON" - <<'PY'
          import hashlib
          import importlib.metadata
          import json
          import os
          import shutil
          from pathlib import Path

          import maxminddb  # noqa: F401 - proves the geoip extra is installed
          from camoufox.addons import DefaultAddons
          from camoufox.pkgman import camoufox_path, launch_path
          from camoufox.sync_api import NewBrowser
          from playwright.sync_api import sync_playwright

          expected_package = os.environ["CAMOUFOX_PACKAGE_VERSION"]
          expected_playwright = os.environ["CAMOUFOX_PLAYWRIGHT_VERSION"]
          versions = {
              "camoufox": importlib.metadata.version("camoufox"),
              "playwright": importlib.metadata.version("playwright"),
              "browserforge": importlib.metadata.version("browserforge"),
              "apify_fingerprint_datapoints": importlib.metadata.version(
                  "apify_fingerprint_datapoints"
              ),
              "patchright": importlib.metadata.version("patchright"),
          }
          expected_versions = {
              "camoufox": expected_package,
              "playwright": expected_playwright,
              "browserforge": os.environ["CAMOUFOX_BROWSERFORGE_VERSION"],
              "apify_fingerprint_datapoints": os.environ[
                  "CAMOUFOX_APIFY_FINGERPRINT_VERSION"
              ],
              "patchright": os.environ["CAMOUFOX_PATCHRIGHT_VERSION"],
          }
          if versions != expected_versions:
              raise SystemExit("Camoufox Python runtime version mismatch")

          browser_dir = Path(camoufox_path(download_if_missing=False))
          metadata = json.loads((browser_dir / "version.json").read_text(encoding="utf-8"))
          actual_version = f"official/{metadata['version']}-{metadata['build']}"
          if actual_version != os.environ["CAMOUFOX_BROWSER_VERSION"]:
              raise SystemExit("Camoufox browser version mismatch")
          if metadata.get("sha256") != os.environ["CAMOUFOX_BROWSER_SHA256"]:
              raise SystemExit("Camoufox browser release hash mismatch")
          executable = Path(launch_path(browser_dir)).resolve()
          if not executable.is_file():
              raise SystemExit("Camoufox browser executable is missing")

          geoip = os.environ.get("CAMOUFOX_GEOIP", "").strip()
          if not geoip:
              raise SystemExit("Camoufox admitted egress IP is missing")
          network_mode = os.environ.get("RECOVERY_NETWORK_MODE", "").strip()
          proxy_url = os.environ.get("OUTLOOK_PROXY_URL", "").strip()
          proxy_options = {}
          if network_mode == "proxy_pool":
              if proxy_url != "http://127.0.0.1:17890":
                  raise SystemExit("Camoufox proxy_pool rollout requires the isolated proxy")
              proxy_options["proxy"] = {
                  "server": proxy_url,
                  "bypass": "localhost,127.0.0.1",
              }
          elif network_mode == "ga_own_ip":
              if proxy_url:
                  raise SystemExit("Camoufox ga_own_ip rollout must remain proxy-free")
          else:
              raise SystemExit("Unsupported Camoufox recovery network mode")
          smoke_profile = Path(os.environ["RUNNER_TEMP"]) / "camoufox-smoke-profile"
          try:
              with sync_playwright() as playwright:
                  context = NewBrowser(
                      playwright,
                      persistent_context=True,
                      user_data_dir=str(smoke_profile),
                      executable_path=str(executable),
                      headless=False,
                      os="windows",
                      locale=["en-US", "en"],
                      humanize=True,
                      geoip=geoip,
                      enable_cache=True,
                      exclude_addons=[DefaultAddons.UBO],
                      **proxy_options,
                  )
                  page = context.pages[0] if context.pages else context.new_page()
                  response = page.goto(
                      "https://api.ipify.org",
                      wait_until="domcontentloaded",
                      timeout=30000,
                  )
                  if response is None or response.status != 200:
                      raise SystemExit("Camoufox smoke egress probe failed")
                  browser_ip = page.locator("body").inner_text().strip()
                  browser_egress_sha16 = hashlib.sha256(
                      browser_ip.encode()
                  ).hexdigest()[:16]
                  if browser_egress_sha16 != os.environ["EXPECTED_EGRESS_SHA16"]:
                      raise SystemExit("Camoufox smoke egress mismatch")
                  environment = page.evaluate(
                      """() => ({
                        platform: navigator.platform,
                        language: navigator.language,
                        languages: navigator.languages,
                        webdriver: navigator.webdriver,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                      })"""
                  )
                  context.close()
          finally:
              shutil.rmtree(smoke_profile, ignore_errors=True)
          if environment.get("platform") != "Win32":
              raise SystemExit("Camoufox smoke platform mismatch")
          if environment.get("language") != "en-US":
              raise SystemExit("Camoufox smoke language mismatch")
          if environment.get("languages") != ["en-US", "en"]:
              raise SystemExit("Camoufox smoke languages mismatch")
          if environment.get("webdriver") is not False:
              raise SystemExit("Camoufox smoke webdriver mismatch")
          if not environment.get("timezone"):
              raise SystemExit("Camoufox smoke timezone missing")

          safe = {
              "schema": 1,
              "engine": "camoufox",
              "versions": versions,
              "browser_version": actual_version,
              "browser_sha256": metadata["sha256"],
              "executable_bound": True,
              "runner_os": os.environ.get("RUNNER_OS"),
              "runner_arch": os.environ.get("RUNNER_ARCH"),
              "cache_hit": os.environ.get("CACHE_HIT") == "true",
              "smoke_ok": True,
              "platform": environment["platform"],
              "language": environment["language"],
              "languages": environment["languages"],
              "webdriver": environment["webdriver"],
              "timezone_present": bool(environment["timezone"]),
              "browser_egress_match": True,
              "network_mode": network_mode,
              "proxy_configured": bool(proxy_options),
              "configured_input_backend": "firefox_page_mouse_fallback",
          }
          output = Path(os.environ["RUNNER_TEMP"]) / "camoufox-runtime-safe.json"
          output.write_text(json.dumps(safe, indent=2), encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"CAMOUFOX_EXECUTABLE_PATH={executable}\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"safe={output}\n")
          print(
              "Camoufox runtime verified "
              f"package={expected_package} playwright={expected_playwright} "
              f"browser={actual_version} smoke_ok=true"
          )
          PY

      - name: Stage verified recovery runtime
        if: steps.egress.outputs.admitted == 'true'
        id: runtime_stage
        shell: bash
        run: |
          set -euo pipefail
          runtime="$GITHUB_WORKSPACE/.production-human-runtime"
          test "$(git -C "$runtime" rev-parse HEAD)" = "$HUMAN_RUNTIME_REF"
          test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD:early_w0_state.py)" = 'c964217e8ed825fea140287e5198441cfb5f1daf'
          test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD:protocol_runtime_probe.py)" = 'fa69c406d6dbee5563d8e6075952074855eb3c32'
          test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD:tools/service_abuse_recovery.py)" = '4ec34bf18ffc27759fc5a901ddbbd0638feda424'
          controller_overridden=false
          if [ "$RECOVERY_BROWSER_ENGINE" = "camoufox" ]; then
            test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD:controllers/patchright_controller.py)" = '2ccc22a5948dd9b1d7cef0e58d044ac57ed6f5ec'
            test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD:requirements-camoufox.txt)" = '7d2db5dec9df33c78ac89fdbb27a553aa339424e'
            controller_overridden=true
          fi
          protocol_source="$GITHUB_WORKSPACE/protocol_runtime_probe.py"
          protocol_sha256=""
          if [ "$HISTORICAL_PROTOCOL_OVERLAY" = "true" ]; then
            protocol_source="$GITHUB_WORKSPACE/runtime_overlays/protocol_runtime_probe_00b6843.py"
            protocol_sha256=$("$VENV_PYTHON" -c \
              'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' \
              "$protocol_source")
            test "$protocol_sha256" = '3143e2f5c4f62964269a92cc5a9ecb07b0779444b33c335a2ecaf5b4783f93a4'
          elif [ "$REGISTRATION_NATURAL_OVERLAY" = "true" ]; then
            protocol_source="$GITHUB_WORKSPACE/runtime_overlays/protocol_runtime_probe_875b057.py"
            protocol_sha256=$("$VENV_PYTHON" -c \
              'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' \
              "$protocol_source")
            test "$protocol_sha256" = 'f87e09b29d1dd268e6ce4d5125a51c865a95ebd40687cf36a2875c6d395f9cf6'
          fi
          cp "$GITHUB_WORKSPACE/tools/service_abuse_recovery.py" "$runtime/tools/service_abuse_recovery.py"
          cp "$GITHUB_WORKSPACE/early_w0_state.py" "$runtime/early_w0_state.py"
          cp "$GITHUB_WORKSPACE/protocol_runtime_probe.py" "$runtime/recovery_observability_probe.py"
          if [ "$RECOVERY_BROWSER_ENGINE" = "camoufox" ]; then
            cp "$GITHUB_WORKSPACE/controllers/patchright_controller.py" "$runtime/controllers/patchright_controller.py"
          fi
          cp "$protocol_source" "$runtime/protocol_runtime_probe.py"
          "$VENV_PYTHON" -m py_compile \
            "$runtime/early_w0_state.py" \
            "$runtime/recovery_observability_probe.py" \
            "$runtime/protocol_runtime_probe.py" \
            "$runtime/controllers/patchright_controller.py" \
            "$runtime/tools/service_abuse_recovery.py"
          safe="$RUNNER_TEMP/recovery-runtime-provenance.safe.json"
          SAFE="$safe" PROTOCOL_SHA256="$protocol_sha256" "$VENV_PYTHON" - <<'PY'
          import json
          import os
          from pathlib import Path

          safe = {
              "schema": 1,
              "control_commit": os.environ.get("PRIVATE_SOURCE_SHA"),
              "public_runner_commit": os.environ.get("GITHUB_SHA"),
              "public_runner_repository": os.environ.get("PUBLIC_RUNNER_REPOSITORY"),
              "human_runtime_commit": os.environ.get("HUMAN_RUNTIME_REF"),
              "browser_engine": os.environ.get("RECOVERY_BROWSER_ENGINE"),
              "fingerprint_mode": os.environ.get("RECOVERY_FINGERPRINT_MODE"),
              "historical_success_manifest": (
                  os.environ.get("RECOVERY_FINGERPRINT_MODE") == "historical_success"
              ),
              "historical_protocol_overlay": os.environ.get("HISTORICAL_PROTOCOL_OVERLAY") == "true",
              "historical_empty_dz_rescue": os.environ.get(
                  "EXACT5S_HISTORICAL_INPUT_TREATMENT"
              ) in {"empty_dz", "empty_dz_control"},
              "historical_empty_dz_rescue_version": (
                  1
                  if os.environ.get("EXACT5S_HISTORICAL_INPUT_TREATMENT") in {
                      "empty_dz", "empty_dz_control"
                  }
                  else None
              ),
              "historical_input_observer": os.environ.get(
                  "EXACT5S_HISTORICAL_INPUT_TREATMENT"
              ) in {"empty_dz", "empty_dz_control"},
              "historical_input_observer_version": (
                  1
                  if os.environ.get("EXACT5S_HISTORICAL_INPUT_TREATMENT") in {
                      "empty_dz", "empty_dz_control"
                  }
                  else None
              ),
              "registration_natural_overlay": os.environ.get("REGISTRATION_NATURAL_OVERLAY") == "true",
              "protocol_sha256": os.environ.get("PROTOCOL_SHA256") or None,
              "controller_overridden": os.environ.get("RECOVERY_BROWSER_ENGINE") == "camoufox",
              "py_compile_ok": True,
          }
          Path(os.environ["SAFE"]).write_text(json.dumps(safe, indent=2), encoding="utf-8")
          PY
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Materialize private control configuration
        if: steps.egress.outputs.admitted == 'true'
        id: materialize
        shell: bash
        env:
          SERVICE_ABUSE_BROWSER_ENV_B64: ${{ secrets.SERVICE_ABUSE_BROWSER_ENV_B64 }}
          OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64: ${{ secrets.OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "${SERVICE_ABUSE_BROWSER_ENV_B64:-}"
          test -n "${OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64:-}"
          test -n "${SERVICE_ABUSE_EXPERIMENT_KEY:-}"
          test -n "${GA_COORDINATOR_URL:-}"
          test -n "${GA_COORDINATOR_TOKEN:-}"
          private="$RUNNER_TEMP/service-abuse-auto-private"
          mkdir -p "$private"
          "$VENV_PYTHON" - <<'PY'
          import base64, hashlib, json, os
          from pathlib import Path

          private = Path(os.environ["RUNNER_TEMP"]) / "service-abuse-auto-private"
          private.joinpath("browser-env.json").write_bytes(
              base64.b64decode(os.environ["SERVICE_ABUSE_BROWSER_ENV_B64"], validate=True)
          )
          private.joinpath("outlook-email.json").write_bytes(
              base64.b64decode(os.environ["OUTLOOK_EMAIL_WRITEBACK_CONFIG_B64"], validate=True)
          )
          browser = json.loads(private.joinpath("browser-env.json").read_text(encoding="utf-8"))
          network_mode = os.environ.get("RECOVERY_NETWORK_MODE", "")
          browser_engine = os.environ.get("RECOVERY_BROWSER_ENGINE", "cloak")
          fingerprint_mode = os.environ.get("RECOVERY_FINGERPRINT_MODE", "fixed")
          if network_mode == "proxy_pool":
              proxy = os.environ.get("OUTLOOK_PROXY_URL", "").strip()
              if proxy != "http://127.0.0.1:17890":
                  raise SystemExit("proxy_pool requires the isolated local proxy")
              browser["proxy"] = proxy
              browser["recovery_network_override"] = {
                  "mode": "proxy_pool",
                  "local_proxy": True,
              }
          elif browser.get("proxy"):
              raise SystemExit("ga_own_ip requires a proxy-free browser manifest")
          if browser_engine == "camoufox":
              geoip = os.environ.get("CAMOUFOX_GEOIP", "").strip()
              if not geoip:
                  raise SystemExit("Camoufox admitted egress IP is missing")
              executable_path = os.environ.get("CAMOUFOX_EXECUTABLE_PATH", "").strip()
              if not executable_path or not Path(executable_path).is_file():
                  raise SystemExit("Camoufox verified executable path is missing")
              browser["camoufox"] = {
                  "headless": False,
                  "os": "windows",
                  "locale": ["en-US", "en"],
                  "humanize": True,
                  "geoip": geoip,
                  "enable_cache": True,
                  "executable_path": executable_path,
              }
              browser["recovery_browser_override"] = {
                  "engine": "camoufox",
                  "chromium_manifest_ignored": True,
                  "ublock_excluded": True,
              }
              network_valid = (
                  network_mode == "proxy_pool"
                  and browser.get("proxy") == "http://127.0.0.1:17890"
              ) or (
                  network_mode == "ga_own_ip"
                  and not browser.get("proxy")
              )
              valid = (
                  network_valid
                  and browser["camoufox"]["os"] == "windows"
                  and browser["camoufox"]["locale"] == ["en-US", "en"]
                  and browser["camoufox"]["headless"] is False
                  and browser["camoufox"]["humanize"] is True
                  and browser["camoufox"]["geoip"] == geoip
                  and browser["camoufox"]["enable_cache"] is True
                  and browser["camoufox"]["executable_path"] == executable_path
              )
          else:
              cloak = browser.get("cloakbrowser") or {}
              if fingerprint_mode == "historical_success":
                  historical_ua = (
                      "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                      "AppleWebKit/537.36 (KHTML, like Gecko) "
                      "Chrome/148.0.7728.121 Safari/537.36"
                  )
                  cloak = {
                      "locale": "en-US",
                      "humanize": True,
                      "human_preset": "careful",
                      "headless": False,
                      "args": [
                          "--fingerprint=96290",
                          "--fingerprint-platform=windows",
                          "--window-size=1010,1084",
                      ],
                  }
                  browser["cloakbrowser"] = cloak
                  browser["context"] = {
                      "locale": "en-US",
                      "viewport": None,
                      "user_agent": historical_ua,
                      "extra_http_headers": {
                          "Accept-Language": "en-US,en;q=0.9",
                      },
                  }
                  browser["recovery_fingerprint_override"] = {
                      "mode": "historical_success",
                      "schema": 1,
                  }
              elif fingerprint_mode == "per_slot":
                  run_id = os.environ.get("GITHUB_RUN_ID", "").strip()
                  slot = os.environ.get("RECOVERY_SLOT", "").strip()
                  if not run_id or not slot:
                      raise SystemExit("per-slot fingerprint derivation inputs are missing")
                  material = f"{run_id}:{slot}"
                  seed = 10000 + int(
                      hashlib.sha256(material.encode()).hexdigest()[:8], 16
                  ) % 90000
                  args = [str(item) for item in (cloak.get("args") or [])]
                  args = [item for item in args if not item.startswith("--fingerprint=")]
                  args.insert(0, f"--fingerprint={seed}")
                  cloak["args"] = args
                  browser["cloakbrowser"] = cloak
                  profile = browser.setdefault("ads_like_profile", {})
                  profile["seed"] = str(seed)
                  profile["source"] = "GA per-run deterministic seed"
              context = browser.get("context") or {}
              args = [str(item) for item in (cloak.get("args") or [])]
              provenance_proxy_valid = (
                  not bool((browser.get("recovery_provenance") or {}).get("proxy_was_configured"))
                  or bool(browser.get("proxy"))
              )
              if fingerprint_mode == "historical_success":
                  valid = (
                      args == [
                          "--fingerprint=96290",
                          "--fingerprint-platform=windows",
                          "--window-size=1010,1084",
                      ]
                      and cloak.get("locale") == "en-US"
                      and cloak.get("humanize") is True
                      and cloak.get("human_preset") == "careful"
                      and cloak.get("headless") is False
                      and context == {
                          "locale": "en-US",
                          "viewport": None,
                          "user_agent": (
                              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                              "AppleWebKit/537.36 (KHTML, like Gecko) "
                              "Chrome/148.0.7728.121 Safari/537.36"
                          ),
                          "extra_http_headers": {
                              "Accept-Language": "en-US,en;q=0.9",
                          },
                      }
                      and browser.get("recovery_fingerprint_override") == {
                          "mode": "historical_success",
                          "schema": 1,
                      }
                      and provenance_proxy_valid
                  )
              else:
                  valid = (
                      sum(item.startswith("--fingerprint=") for item in args) == 1
                      and "--fingerprint-platform=windows" in args
                      and sum(item.startswith("--window-size=") for item in args) == 1
                      and "viewport" in context
                      and context["viewport"] is None
                      and bool(context.get("locale"))
                      and bool(context.get("user_agent"))
                      and bool((context.get("extra_http_headers") or {}).get("Accept-Language"))
                      and provenance_proxy_valid
                  )
          if not valid:
              raise SystemExit("Registration environment manifest is incomplete")
          private.joinpath("browser-env.json").write_text(
              json.dumps(browser, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          private.joinpath("secret.json").write_text(
              json.dumps({"secret_key": os.environ["SERVICE_ABUSE_EXPERIMENT_KEY"]}),
              encoding="utf-8",
          )
          PY
          chmod 600 "$private"/*.json
          echo "private_dir=$private" >> "$GITHUB_OUTPUT"

      - name: Atomically lease oldest service-abuse account
        if: steps.egress.outputs.admitted == 'true'
        id: acquire
        shell: bash
        env:
          LEASE_TTL_SECONDS: ${{ inputs.lease_ttl_seconds || '1500' }}
          MAX_CANDIDATES: ${{ inputs.max_candidates || '500' }}
        run: |
          set -euo pipefail
          private='${{ steps.materialize.outputs.private_dir }}'
          safe="$RUNNER_TEMP/recovery-lease-safe.json"
          "$VENV_PYTHON" -u tools/outlook_email_recovery_coordinator.py acquire \
            --outlook-config "$private/outlook-email.json" \
            --coordinator-url "$GA_COORDINATOR_URL" \
            --request-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${RECOVERY_SLOT}" \
            --run-id "${GITHUB_RUN_ID}-${RECOVERY_SLOT}" \
            --fixture-output "$private/fixture.json" \
            --lease-output "$private/lease.json" \
            --safe-output "$safe" \
            --max-candidates "$MAX_CANDIDATES" \
            --lease-ttl-seconds "$LEASE_TTL_SECONDS"
          SAFE="$safe" "$VENV_PYTHON" - <<'PY'
          import json, os
          row = json.load(open(os.environ["SAFE"], encoding="utf-8"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"leased={str(bool(row.get('leased'))).lower()}\n")
              fh.write(f"account_id={int(row.get('account_id') or 0)}\n")
              fh.write(f"attempt_number={int(row.get('attempt_number') or 0)}\n")
          PY
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Run production recovery on fresh GA runner
        if: steps.acquire.outputs.leased == 'true'
        id: recovery
        continue-on-error: true
        shell: bash
        run: |
          set +e
          private='${{ steps.materialize.outputs.private_dir }}'
          runtime="$GITHUB_WORKSPACE/.production-human-runtime"
          result="$private/recovery-result.json"
          safe="$RUNNER_TEMP/recovery-runtime-safe.json"
          writeback_safe="$RUNNER_TEMP/recovery-writeback-safe.json"
          probe_safe="$RUNNER_TEMP/recovery-probe-safe.log"
          log="$RUNNER_TEMP/recovery-runtime.log"
          err="$RUNNER_TEMP/recovery-runtime.err.log"
          human_mode_args=()
          if [ "$RECOVERY_HUMAN_MODE" = "exact5s" ]; then
            human_mode_args+=(
              --semiprotocol-human
              --semiprotocol-out-dir "$RUNNER_TEMP/service-abuse-auto-semiprotocol"
              --semiprotocol-server-challenge-rounds "$NATURAL_SERVER_CHALLENGE_ROUNDS"
              --semiprotocol-stop-before-server-round "$SEMIPROTOCOL_STOP_BEFORE_SERVER_ROUND"
              --semiprotocol-release-mode "$EXACT5S_RELEASE_MODE"
              --semiprotocol-move-steps "$EXACT5S_MOVE_STEPS"
              --semiprotocol-hold-attempts "$EXACT5S_HOLD_ATTEMPTS"
              --semiprotocol-final-xghm-target "$EXACT5S_FINAL_XGHM_TARGET"
              --semiprotocol-final-xghm-start-index "$EXACT5S_FINAL_XGHM_START_INDEX"
            )
          else
            human_mode_args+=(
              --natural-hold-profile "$NATURAL_HOLD_PROFILE"
              --natural-final-proof-mode "$NATURAL_FINAL_PROOF_MODE"
              --natural-server-challenge-rounds "$NATURAL_SERVER_CHALLENGE_ROUNDS"
            )
          fi
          bridge_args=()
          if [ "$NATURAL_W0_BRIDGE" = "true" ]; then
            bridge_args+=(--natural-w0-bridge)
          fi
          if [ "$NATURAL_FORCE_W0_AFTER_MINUS1" = "true" ]; then
            bridge_args+=(--natural-force-w0-after-minus1)
          fi
          historical_move_args=()
          if [ "$EXACT5S_HISTORICAL_INPUT_TREATMENT" = "move8" ]; then
            historical_move_args+=(--semiprotocol-allow-historical-move-override)
          fi
          historical_release_args=()
          if [ "$EXACT5S_HISTORICAL_INPUT_TREATMENT" = "page_up" ]; then
            historical_release_args+=(--semiprotocol-allow-historical-release-override)
          fi
          historical_page_move_args=()
          if [ "$EXACT5S_HISTORICAL_INPUT_TREATMENT" = "page_moves24" ] || \
             [ "$EXACT5S_HISTORICAL_INPUT_TREATMENT" = "empty_dz" ]; then
            historical_page_move_args+=(
              --semiprotocol-page-move-count 24
              --semiprotocol-allow-historical-page-move-override
            )
          fi
          historical_empty_dz_args=()
          if [ "$EXACT5S_HISTORICAL_INPUT_TREATMENT" = "empty_dz" ] || \
             [ "$EXACT5S_HISTORICAL_INPUT_TREATMENT" = "empty_dz_control" ]; then
            historical_empty_dz_args+=(--semiprotocol-historical-empty-dz-rescue)
          fi
          proxy_args=()
          if [ -n "${OUTLOOK_PROXY_URL:-}" ]; then
            proxy_args+=(--network-proxy "$OUTLOOK_PROXY_URL")
          fi
          entry_args=()
          if [ "$RECOVERY_BROWSER_ENGINE" = "cloak" ]; then
            entry_args+=(--entry-url 'https://outlook.live.com/mail/0/?prompt=select_account')
          fi
          venv_python="$GITHUB_WORKSPACE/$VENV_PYTHON"
          if [ "$RUNNER_OS" = "Windows" ]; then
            recovery_prefix=("$venv_python")
          else
            recovery_prefix=(
              xvfb-run -a -s '-screen 0 2560x1440x24'
              "$venv_python"
            )
          fi
          cd "$runtime"
          "$venv_python" "$GITHUB_WORKSPACE/tools/run_process_watchdog.py" \
            --timeout-seconds 900 \
            --kill-after-seconds 15 \
            --stdout "$log" \
            --stderr "$err" \
            -- "${recovery_prefix[@]}" -u tools/service_abuse_recovery.py \
              --fixture "$private/fixture.json" \
              --secret-file "$private/secret.json" \
              --output "$result" \
              --safe-status-output "$safe" \
              --profile-dir "$RUNNER_TEMP/service-abuse-auto-profile" \
              --browser-engine "$RECOVERY_BROWSER_ENGINE" \
              --browser-config "$private/browser-env.json" \
              --timeout-seconds 720 \
              --omit-email-output \
              --require-service-abuse-preflight \
              "${human_mode_args[@]}" \
              "${historical_move_args[@]}" \
              "${historical_release_args[@]}" \
              "${historical_page_move_args[@]}" \
              "${historical_empty_dz_args[@]}" \
              "${bridge_args[@]}" \
              "${proxy_args[@]}" \
              "${entry_args[@]}" \
              --parent-retry-max 2 \
              --writeback-outlook-email \
              --outlook-email-config "$private/outlook-email.json" \
              --outlook-email-writeback-safe-output "$writeback_safe"
          code=$?
          set -e
          if [ "$code" -eq 124 ] || [ "$code" -eq 137 ]; then
            if [ ! -s "$safe" ]; then
              SAFE="$safe" "$venv_python" - <<'PY'
          import json, os
          from pathlib import Path

          Path(os.environ["SAFE"]).write_text(
              json.dumps({
                  "runner_completed": True,
                  "run_succeeded": False,
                  "result_present": False,
                  "service_abuse_cleared": False,
                  "graph_ok": False,
                  "imap_ok": False,
                  "production_writeback_attempted": False,
                  "production_writeback_ok": False,
                  "production_health_enrolled": False,
                  "error_code": "RECOVERY_PROCESS_WATCHDOG_TIMEOUT",
              }, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY
            fi
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "safe_status=$safe" >> "$GITHUB_OUTPUT"
          echo "writeback_safe=$writeback_safe" >> "$GITHUB_OUTPUT"
          echo "probe_safe=$probe_safe" >> "$GITHUB_OUTPUT"
          observer_safe="$RUNNER_TEMP/historical-input-observer.safe.json"
          observer_source="$RUNNER_TEMP/service-abuse-auto-semiprotocol/historical-input-observer.safe.json"
          if [ -s "$observer_source" ]; then
            cp "$observer_source" "$observer_safe"
          fi
          echo "historical_input_observer_safe=$observer_safe" >> "$GITHUB_OUTPUT"
          runtime_kind_safe="$RUNNER_TEMP/historical-runtime-kinds.safe.json"
          runtime_kind_source="$RUNNER_TEMP/service-abuse-auto-semiprotocol/historical-runtime-kinds.safe.json"
          if [ -s "$runtime_kind_source" ]; then
            cp "$runtime_kind_source" "$runtime_kind_safe"
          fi
          echo "historical_runtime_kind_safe=$runtime_kind_safe" >> "$GITHUB_OUTPUT"
          LOG="$log" OUT="$probe_safe" "$venv_python" - <<'PY' || : > "$probe_safe"
          import os
          import re
          from pathlib import Path
          from urllib.parse import urlsplit, urlunsplit

          source = Path(os.environ["LOG"])
          target = Path(os.environ["OUT"])
          allowed = ("[recovery]", "[Captcha]", "[Probe]")
          allowed_frame_state = (
              "  runtime frame[",
              "  frame[",
              "  knp frame[",
          )

          def scrub_url(match):
              raw = match.group(0).rstrip("'\"),]}")
              suffix = match.group(0)[len(raw):]
              try:
                  parts = urlsplit(raw)
                  safe = urlunsplit((parts.scheme, parts.netloc, parts.path, "", ""))
              except Exception:
                  safe = "[url-redacted]"
              return safe + suffix

          rows = []
          if source.exists():
              for raw in source.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not raw.startswith(allowed) and not raw.startswith(allowed_frame_state):
                      continue
                  line = re.sub(r"https?://[^\s]+", scrub_url, raw)
                  line = re.sub(r"[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+", "[email-redacted]", line)
                  line = re.sub(r"(?<!\d)(?:\d{1,3}\.){3}\d{1,3}(?!\d)", "[ip-redacted]", line)
                  line = re.sub(
                      r"(?i)\b(token|code|qi|seq|rsc|uuid|endpoint)=([^\s,}\]]+)",
                      lambda m: f"{m.group(1)}=[redacted]",
                      line,
                  )
                  line = re.sub(
                      r'(?i)"(current_qi|last_seq|hintedQi)"\s*:\s*"[^"]*"',
                      lambda m: f'"{m.group(1)}":"[redacted]"',
                      line,
                  )
                  rows.append(line[:1200])
                  if len(rows) >= 300:
                      break
          target.write_text("\n".join(rows) + ("\n" if rows else ""), encoding="utf-8")
          PY
          if [ -f "$probe_safe" ]; then
            head -n 220 "$probe_safe" || true
          fi
          if [ -f "$err" ]; then
            tail -n 40 "$err" || true
          fi
          exit "$code"

      - name: Complete recovery lease and classify retry
        if: always() && steps.acquire.outputs.leased == 'true'
        id: complete
        shell: bash
        run: |
          set -euo pipefail
          private='${{ steps.materialize.outputs.private_dir }}'
          safe_status='${{ steps.recovery.outputs.safe_status }}'
          if [ -z "$safe_status" ]; then
            safe_status="$RUNNER_TEMP/recovery-runtime-safe.json"
          fi
          completion="$RUNNER_TEMP/recovery-completion-safe.json"
          set +e
          "$VENV_PYTHON" -u tools/outlook_email_recovery_coordinator.py complete \
            --outlook-config "$private/outlook-email.json" \
            --coordinator-url "$GA_COORDINATOR_URL" \
            --lease-input "$private/lease.json" \
            --safe-status "$safe_status" \
            --safe-output "$completion"
          code=$?
          set -e
          echo "safe=$completion" >> "$GITHUB_OUTPUT"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ]; then
            echo "recovery lease completion failed after cleanup attempt (exit=$code)" >&2
            exit "$code"
          fi

      - name: Build redacted automatic-recovery verdict
        if: always()
        shell: bash
        env:
          EGRESS_ADMITTED: ${{ steps.egress.outputs.admitted }}
          EGRESS_SHA16: ${{ steps.egress.outputs.egress_sha16 }}
          EGRESS_PREFIX: ${{ steps.egress.outputs.egress_prefix }}
          SELECTED_NAME_SHA12: ${{ steps.egress.outputs.selected_name_sha12 }}
          EGRESS_REASON: ${{ steps.egress.outputs.reason }}
          RUNNER_EGRESS_PREPARE: ${{ steps.runner_egress.outputs.prepare }}
          RUNNER_EGRESS_SHA16: ${{ steps.runner_egress.outputs.runner_egress_sha16 }}
          RUNNER_EGRESS_PREFIX: ${{ steps.runner_egress.outputs.runner_egress_prefix }}
          RUNNER_EGRESS_REASON: ${{ steps.runner_egress.outputs.reason }}
          LEASE_SAFE: ${{ steps.acquire.outputs.safe }}
          RUNTIME_SAFE: ${{ steps.recovery.outputs.safe_status }}
          WRITEBACK_SAFE: ${{ steps.recovery.outputs.writeback_safe }}
          COMPLETION_SAFE: ${{ steps.complete.outputs.safe }}
          CAMOUFOX_RUNTIME_SAFE: ${{ steps.camoufox_runtime.outputs.safe }}
          RUNTIME_STAGE_SAFE: ${{ steps.runtime_stage.outputs.safe }}
        run: |
          set -euo pipefail
          "$BOOTSTRAP_PYTHON" - <<'PY'
          import json, os
          from pathlib import Path

          def load(path):
              if not path:
                  return {}
              candidate = Path(path)
              if not candidate.exists():
                  return {}
              try:
                  value = json.loads(candidate.read_text(encoding="utf-8"))
                  return value if isinstance(value, dict) else {}
              except Exception:
                  return {}

          lease = load(os.environ.get("LEASE_SAFE", ""))
          runtime = load(os.environ.get("RUNTIME_SAFE", ""))
          writeback = load(os.environ.get("WRITEBACK_SAFE", ""))
          completion = load(os.environ.get("COMPLETION_SAFE", ""))
          camoufox_runtime = load(os.environ.get("CAMOUFOX_RUNTIME_SAFE", ""))
          runtime_stage = load(os.environ.get("RUNTIME_STAGE_SAFE", ""))
          verdict = {
              "schema": 2,
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "slot": int(os.environ.get("RECOVERY_SLOT") or 0),
              "recovery_network_mode": os.environ.get("RECOVERY_NETWORK_MODE") or None,
              "proxy_pool_profile": os.environ.get("PROXY_POOL_PROFILE") or None,
              "proxy_pool_slot_offset": int(os.environ.get("PROXY_POOL_SLOT_OFFSET") or 0),
              "recovery_human_mode": os.environ.get("RECOVERY_HUMAN_MODE") or None,
              "recovery_browser_engine": os.environ.get("RECOVERY_BROWSER_ENGINE") or None,
              "recovery_fingerprint_mode": os.environ.get("RECOVERY_FINGERPRINT_MODE") or None,
              "configured_input_backend": (
                  "firefox_page_mouse_fallback"
                  if os.environ.get("RECOVERY_BROWSER_ENGINE") == "camoufox"
                  else os.environ.get("EXACT5S_RELEASE_MODE") or None
              ),
              "semiprotocol_stop_before_server_round": int(
                  os.environ.get("SEMIPROTOCOL_STOP_BEFORE_SERVER_ROUND") or 4
              ),
              "camoufox_runtime": camoufox_runtime or None,
              "runtime_stage": runtime_stage or None,
              "historical_protocol_overlay": os.environ.get("HISTORICAL_PROTOCOL_OVERLAY") == "true",
              "historical_protocol_sha256": (
                  "3143e2f5c4f62964269a92cc5a9ecb07b0779444b33c335a2ecaf5b4783f93a4"
                  if os.environ.get("HISTORICAL_PROTOCOL_OVERLAY") == "true"
                  else None
              ),
              "registration_natural_overlay": os.environ.get("REGISTRATION_NATURAL_OVERLAY") == "true",
              "registration_natural_protocol_sha256": (
                  "f87e09b29d1dd268e6ce4d5125a51c865a95ebd40687cf36a2875c6d395f9cf6"
                  if os.environ.get("REGISTRATION_NATURAL_OVERLAY") == "true"
                  else None
              ),
              "registration_natural_one_shot": (
                  True if os.environ.get("REGISTRATION_NATURAL_OVERLAY") == "true" else None
              ),
              "registration_retry_budget_equivalent": (
                  False if os.environ.get("REGISTRATION_NATURAL_OVERLAY") == "true" else None
              ),
              "exact5s_release_mode": os.environ.get("EXACT5S_RELEASE_MODE") or None,
              "exact5s_move_steps": int(os.environ.get("EXACT5S_MOVE_STEPS") or 24),
              "exact5s_historical_input_treatment": os.environ.get("EXACT5S_HISTORICAL_INPUT_TREATMENT") or "control",
              "historical_empty_dz_rescue": os.environ.get(
                  "EXACT5S_HISTORICAL_INPUT_TREATMENT"
              ) in {"empty_dz", "empty_dz_control"},
              "historical_empty_dz_rescue_version": (
                  1
                  if os.environ.get("EXACT5S_HISTORICAL_INPUT_TREATMENT") in {
                      "empty_dz", "empty_dz_control"
                  }
                  else None
              ),
              "historical_input_observer": os.environ.get(
                  "EXACT5S_HISTORICAL_INPUT_TREATMENT"
              ) in {"empty_dz", "empty_dz_control"},
              "historical_input_observer_version": (
                  1
                  if os.environ.get("EXACT5S_HISTORICAL_INPUT_TREATMENT") in {
                      "empty_dz", "empty_dz_control"
                  }
                  else None
              ),
              "exact5s_hold_attempts": int(os.environ.get("EXACT5S_HOLD_ATTEMPTS") or 1),
              "exact5s_final_xghm_target": float(os.environ.get("EXACT5S_FINAL_XGHM_TARGET") or 0),
              "exact5s_final_xghm_start_index": int(os.environ.get("EXACT5S_FINAL_XGHM_START_INDEX") or 1),
              "natural_final_proof_mode": os.environ.get("NATURAL_FINAL_PROOF_MODE") or None,
              "natural_hold_profile": os.environ.get("NATURAL_HOLD_PROFILE") or None,
              "natural_w0_bridge": os.environ.get("NATURAL_W0_BRIDGE") == "true",
              "natural_force_w0_after_minus1": os.environ.get("NATURAL_FORCE_W0_AFTER_MINUS1") == "true",
              "natural_server_challenge_rounds": int(os.environ.get("NATURAL_SERVER_CHALLENGE_ROUNDS") or 1),
              "runner": os.environ.get("RECOVERY_RUNNER_LABEL") or None,
              "egress_admitted": os.environ.get("EGRESS_ADMITTED") == "true",
              "egress_sha16": (
                  os.environ.get("EGRESS_SHA16")
                  or os.environ.get("RUNNER_EGRESS_SHA16")
                  or None
              ),
              "egress_prefix": (
                  os.environ.get("EGRESS_PREFIX")
                  or os.environ.get("RUNNER_EGRESS_PREFIX")
                  or None
              ),
              "selected_name_sha12": os.environ.get("SELECTED_NAME_SHA12") or None,
              "egress_reason": (
                  os.environ.get("EGRESS_REASON")
                  or os.environ.get("RUNNER_EGRESS_REASON")
                  or None
              ),
              "runner_egress_prepare": os.environ.get("RUNNER_EGRESS_PREPARE") == "true",
              "runner_egress_sha16": os.environ.get("RUNNER_EGRESS_SHA16") or None,
              "runner_egress_prefix": os.environ.get("RUNNER_EGRESS_PREFIX") or None,
              "runner_egress_reason": os.environ.get("RUNNER_EGRESS_REASON") or None,
              "leased": bool(lease.get("leased")),
              "account_id": int(lease.get("account_id") or 0) or None,
              "attempt_number": int(lease.get("attempt_number") or 0) or None,
              "candidate_count": int(lease.get("candidate_count") or 0),
              "lease_sha12": lease.get("lease_sha12") or None,
              "service_abuse_cleared": bool(runtime.get("service_abuse_cleared")),
              "graph_ok": bool(runtime.get("graph_ok")),
              "production_writeback_ok": bool(runtime.get("production_writeback_ok")),
              "production_health_enrolled": bool(runtime.get("production_health_enrolled")),
              "writeback_post_refresh_token_present": bool(writeback.get("post_refresh_token_present")),
              "outcome": completion.get("outcome") or None,
              "error_code": completion.get("error_code") or runtime.get("error_code") or "",
              "exhausted": bool(completion.get("exhausted")),
          }
          out = Path(os.environ["RUNNER_TEMP"]) / "ga-auto-recovery-verdict.json"
          out.write_text(json.dumps(verdict, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(verdict, ensure_ascii=False))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## Automatic service-abuse recovery\n\n```json\n")
              fh.write(json.dumps(verdict, ensure_ascii=False, indent=2))
              fh.write("\n```\n")
          PY

      - name: Upload redacted automatic-recovery verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ga-auto-recovery-safe-${{ github.run_id }}-${{ matrix.slot }}
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/ga-auto-recovery-verdict.json
            ${{ runner.temp }}/runner-egress-safe.json
            ${{ runner.temp }}/recovery-egress-safe.json
            ${{ steps.camoufox_runtime.outputs.safe }}
            ${{ steps.runtime_stage.outputs.safe }}
            ${{ steps.acquire.outputs.safe }}
            ${{ steps.recovery.outputs.safe_status }}
            ${{ steps.recovery.outputs.writeback_safe }}
            ${{ steps.recovery.outputs.probe_safe }}
            ${{ steps.recovery.outputs.historical_input_observer_safe }}
            ${{ steps.recovery.outputs.historical_runtime_kind_safe }}
            ${{ steps.complete.outputs.safe }}

      - name: Cleanup private recovery material
        if: always()
        timeout-minutes: 2
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$BOOTSTRAP_PYTHON" tools/cleanup_recovery_material.py \
              --workspace "$GITHUB_WORKSPACE" \
              --runner-temp "$RUNNER_TEMP" \
              --process-timeout-seconds 15 || true
          else
            if [ -f .mihomo-ga/mihomo.pid ]; then
              kill "$(cat .mihomo-ga/mihomo.pid)" 2>/dev/null || true
            fi
            rm -rf "$RUNNER_TEMP/service-abuse-auto-private" \
              "$RUNNER_TEMP/service-abuse-auto-profile" \
              "$RUNNER_TEMP/service-abuse-auto-semiprotocol" \
              "$RUNNER_TEMP/service-abuse-proxy" \
              "$RUNNER_TEMP/camoufox-smoke-profile" \
              "$GITHUB_WORKSPACE/.production-human-runtime" \
              .mihomo-ga \
              .tmp/service-abuse-diagnostics || true
          fi
